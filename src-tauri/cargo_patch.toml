# ── Добавить в src-tauri/Cargo.toml ──
# В секцию [dependencies] добавь:

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-ico", "image-png"] }
tauri-plugin-opener = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
tauri-plugin-shell = "2"
tauri-plugin-http = "2"

# ВАЖНО: фича "tray-icon" — это ключевое изменение
# Без неё трей не скомпилируется

# ── В секцию [target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies] ──
# Если такой секции нет — создай её:

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-single-instance = "2"
