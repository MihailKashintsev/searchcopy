// ── State ──
let state = {query:"", progs:["Excel"], tab:"search", lang:"ru"};

// ── Logic ──
function extractColumns(q){
  const parts = q.toUpperCase().split(/[\s,+иand&]+/);
  const cols=[];
  for(const p of parts) if(/^[A-Z]{1,2}$/.test(p.trim())) cols.push(p.trim());
  return [...new Set(cols)];
}

function scoreItem(query,item){
  const q=query.toLowerCase().trim(); let s=0;
  const lang=state.lang;
  const desc = typeof item.desc==='object' ? item.desc[lang] : item.desc;
  const tags = typeof item.tags==='object' ? (item.tags[lang]||[]) : (item.tags||[]);
  const fields=[desc.toLowerCase(), item.keys.toLowerCase(), ...tags];
  for(const f of fields){
    if(f===q){s+=10;continue}
    if(f.includes(q)){s+=5;continue}
    for(const w of q.split(/[\s,]+/)) if(w.length>2&&f.includes(w)) s+=2;
  }
  return s;
}

function doSearch(query,progs){
  if(query.trim().length<2) return [];
  const out=[];
  for(const prog of progs)
    for(const item of DB[prog]||[]){
      const s=scoreItem(query,item);
      if(s>0) out.push({...item,program:prog,score:s});
    }
  return out.sort((a,b)=>b.score-a.score).slice(0,14);
}

function buildChain(query,items){
  const cols=extractColumns(query);
  if(cols.length<2) return null;
  const base=items.find(i=>i.template)||items[0];
  if(!base) return null;
  return cols.map((col,i)=>({
    step:i+1, col,
    formula: base.template ? base.template.replace(/\{col\}/g,col) : (base.example||base.keys),
    desc: typeof base.desc==='object' ? base.desc[state.lang] : base.desc,
    program:base.program
  }));
}

function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="✓";
    btn.style.color="#4ade80";
    btn.style.borderColor="rgba(34,197,94,0.5)";
    btn.style.background="rgba(34,197,94,0.2)";
    setTimeout(()=>{
      btn.textContent="⎘";
      btn.style.color="#64748b";
      btn.style.borderColor="rgba(255,255,255,0.12)";
      btn.style.background="rgba(255,255,255,0.06)";
    },1400);
  });
}

function makeCopyBtn(text){
  const btn=document.createElement('button');
  btn.textContent="⎘";
  btn.style.cssText="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#64748b;border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;font-weight:700;transition:all 0.18s;flex-shrink:0;font-family:inherit";
  btn.onclick=()=>copyText(text,btn);
  return btn;
}

function el(tag,style,html){
  const e=document.createElement(tag);
  if(style) e.style.cssText=style;
  if(html!==undefined) e.innerHTML=html;
  return e;
}

// ── Lang switcher ──
function makeLangBtn(){
  const wrap=el('div',"display:flex;gap:3px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:3px");
  ['ru','en'].forEach(l=>{
    const on=state.lang===l;
    const btn=el('button',`background:${on?"rgba(99,102,241,0.25)":"transparent"};border:1px solid ${on?"rgba(99,102,241,0.4)":"transparent"};border-radius:6px;padding:4px 10px;font-size:11px;font-weight:800;color:${on?"#c7d2fe":"#475569"};cursor:pointer;transition:all 0.18s;letter-spacing:1px`);
    btn.textContent=l.toUpperCase();
    btn.onclick=()=>{state.lang=l;state.query="";render()};
    wrap.appendChild(btn);
  });
  return wrap;
}

// ── Chain card ──
function renderChainCard(chain){
  const t=T[state.lang];
  const prog=chain[0]?.program||"Excel";
  const color=COLORS[prog]||"#818cf8";
  const wrap=el('div',"position:relative;overflow:hidden;background:rgba(12,10,28,0.97);border:1px solid rgba(139,92,246,0.35);border-radius:14px;padding:18px 20px;margin-bottom:10px;animation:fadeUp 0.3s ease both");
  wrap.appendChild(el('div',"position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7c3aed,#4f46e5,#0ea5e9)"));

  const hdr=el('div',"display:flex;align-items:center;gap:10px;margin-bottom:16px");
  hdr.innerHTML=`<div style="background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(79,70,229,0.25));border:1px solid rgba(139,92,246,0.5);border-radius:8px;padding:4px 12px;font-size:10px;color:#c4b5fd;font-weight:800;text-transform:uppercase;letter-spacing:1.5px">${t.chainTitle}</div><span style="font-size:11px;color:#475569">${t.chainSteps(chain.length)}</span>`;
  wrap.appendChild(hdr);

  const steps=el('div',"display:flex;flex-direction:column;gap:10px");
  chain.forEach(step=>{
    const row=el('div',"display:flex;align-items:flex-start;gap:12px");
    const num=el('div',`width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-top:2px;background:${color}20;border:1.5px solid ${color}60;display:flex;align-items:center;justify-content:center;font-size:12px;color:${color};font-weight:800`);
    num.textContent=step.step;
    row.appendChild(num);
    const content=el('div',"flex:1");
    const meta=el('div',"display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap");
    meta.innerHTML=`<span style="background:rgba(99,102,241,0.18);border:1px solid rgba(99,102,241,0.4);border-radius:6px;padding:3px 10px;font-size:12px;color:#c7d2fe;font-weight:700">${t.chainCol(step.col)}</span><span style="font-size:11px;color:#475569">${step.desc}</span>`;
    content.appendChild(meta);
    const fr=el('div',"display:flex;align-items:center;gap:8px");
    const fb=el('div',"background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.3);border-radius:8px;padding:8px 14px;font-size:13px;color:#bae6fd;font-weight:700;flex:1;word-break:break-all");
    fb.textContent=step.formula;
    fr.appendChild(fb);
    fr.appendChild(makeCopyBtn(step.formula));
    content.appendChild(fr);
    row.appendChild(content);
    steps.appendChild(row);
  });
  wrap.appendChild(steps);

  const footer=el('div',"margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center");
  footer.appendChild(el('span',"font-size:10px;color:#334155",t.chainCopyAll));
  footer.appendChild(makeCopyBtn(chain.map(s=>s.formula).join('\n')));
  wrap.appendChild(footer);
  return wrap;
}

// ── Result card ──
function renderResultCard(item,idx,detectedCols){
  const t=T[state.lang];
  const color=COLORS[item.program]||"#818cf8";
  const desc = typeof item.desc==='object' ? item.desc[state.lang] : item.desc;
  let display=item.example||"";
  let adapted=false;
  if(item.template&&detectedCols.length>0){
    display=item.template.replace(/\{col\}/g,detectedCols[0]);
    adapted=true;
  }
  const card=el('div',`background:rgba(12,12,22,0.92);border:1px solid rgba(255,255,255,0.06);border-left:3px solid ${color};border-radius:12px;padding:14px 18px;display:flex;align-items:flex-start;gap:14px;animation:fadeUp 0.3s ease ${idx*0.04}s both`);

  const progTag=el('div',`background:${color}14;border:1px solid ${color}40;border-radius:7px;padding:3px 8px;font-size:10px;color:${color};font-weight:800;text-transform:uppercase;white-space:nowrap;margin-top:2px`);
  progTag.textContent=`${ICONS[item.program]} ${item.program}`;
  card.appendChild(progTag);

  const body=el('div',"flex:1;min-width:0");
  const meta=el('div',"display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px");

  const keyBadge=el('span',"background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:6px;padding:3px 10px;font-size:13px;color:#c7d2fe;font-weight:700");
  keyBadge.textContent=item.keys;
  meta.appendChild(keyBadge);

  const isFormula=item.type==="formula";
  const typeBadge=el('span',`font-size:10px;padding:2px 8px;border-radius:999px;background:${isFormula?"rgba(34,197,94,0.1)":"rgba(251,191,36,0.1)"};border:1px solid ${isFormula?"rgba(34,197,94,0.25)":"rgba(251,191,36,0.25)"};color:${isFormula?"#4ade80":"#fbbf24"}`);
  typeBadge.textContent=isFormula?t.typeFormula:t.typeHotkey;
  meta.appendChild(typeBadge);

  if(adapted){
    meta.appendChild(el('span',"font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.3);color:#38bdf8",t.adapted));
  }
  body.appendChild(meta);

  const descEl=el('p',"margin:0 0 7px;color:#64748b;font-size:12px");
  descEl.textContent=desc;
  body.appendChild(descEl);

  if(display){
    const fr=el('div',"display:flex;align-items:center;gap:8px");
    const fb=el('div',"background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:6px 12px;font-size:12px;color:#93c5fd;flex:1;word-break:break-all;font-weight:600");
    fb.textContent=display;
    fr.appendChild(fb);
    fr.appendChild(makeCopyBtn(display));
    body.appendChild(fr);
  }
  card.appendChild(body);
  return card;
}

// ── About tab ──
function renderAbout(){
  const t=T[state.lang];
  const wrap=el('div',"animation:fadeUp 0.35s ease both");

  function infoRow(icon,title,body){
    const d=el('div',"display:flex;gap:14px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px 16px;margin-bottom:8px");
    d.innerHTML=`<span style="font-size:20px;flex-shrink:0;line-height:1;margin-top:1px">${icon}</span><div><div style="font-size:12px;font-weight:700;color:#c7d2fe;margin-bottom:5px">${title}</div><div style="font-size:12px;color:#64748b;line-height:1.65">${body}</div></div>`;
    return d;
  }
  function errRow(title,fix){
    const d=el('div',"background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.18);border-radius:10px;padding:14px 16px;margin-bottom:8px");
    d.innerHTML=`<div style="font-size:12px;font-weight:700;color:#fca5a5;margin-bottom:5px">⚠ ${title}</div><div style="font-size:12px;color:#64748b;line-height:1.65">${fix}</div>`;
    return d;
  }
  function heading(txt){
    const d=el('p',"color:#334155;font-size:10px;text-transform:uppercase;letter-spacing:2px;font-weight:800;margin:24px 0 10px");
    d.textContent=txt; return d;
  }

  const hero=el('div',"background:linear-gradient(135deg,rgba(79,70,229,0.1),rgba(14,165,233,0.07));border:1px solid rgba(99,102,241,0.2);border-radius:16px;padding:24px;text-align:center;margin-bottom:6px");
  hero.innerHTML=`<div style="font-size:32px;margin-bottom:10px">⌘</div><h2 style="margin:0 0 5px;font-size:20px;font-weight:900;color:#e2e8f0;letter-spacing:-0.5px">SearchCopy</h2><p style="margin:0 0 10px;color:#818cf8;font-size:10px;letter-spacing:2.5px;text-transform:uppercase">by RENDERGAMES</p><p style="margin:0;color:#475569;font-size:12px;line-height:1.6">${t.aboutHero}</p>`;
  wrap.appendChild(hero);

  wrap.appendChild(heading(t.h_howto));
  t.rows.slice(0,3).forEach(r=>wrap.appendChild(infoRow(r[0],r[1],r[2])));
  wrap.appendChild(heading(t.h_filters));
  wrap.appendChild(infoRow(t.rows[3][0],t.rows[3][1],t.rows[3][2]));
  wrap.appendChild(heading(t.h_updates));
  wrap.appendChild(infoRow(t.rows[4][0],t.rows[4][1],t.rows[4][2]));
  wrap.appendChild(heading(t.h_errors));
  t.errs.forEach(r=>wrap.appendChild(errRow(r[0],r[1])));
  wrap.appendChild(el('div',"text-align:center;color:#1e293b;font-size:10px;margin-top:28px;padding-bottom:8px",t.footer));
  return wrap;
}

// ── Main render ──
function render(){
  const t=T[state.lang];
  const app=document.getElementById('app');
  app.innerHTML='';

  // Header
  const hdr=el('div',"text-align:center;margin-bottom:30px");
  const topRow=el('div',"display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:14px;position:relative");
  const badge=el('div',"display:inline-flex;align-items:center;gap:8px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.22);border-radius:999px;padding:5px 16px;font-size:10px;color:#818cf8;letter-spacing:2.5px;text-transform:uppercase");
  badge.innerHTML=`<span style="animation:pulse 2.5s infinite">●</span> RENDERGAMES`;
  topRow.appendChild(badge);

  // Lang switcher next to badge
  const langWrap=el('div',"position:absolute;right:0;top:50%;transform:translateY(-50%)");
  langWrap.appendChild(makeLangBtn());
  topRow.appendChild(langWrap);

  hdr.appendChild(topRow);
  hdr.innerHTML+=`<h1 style="font-size:clamp(30px,6vw,48px);font-weight:900;margin:0 0 7px;background:linear-gradient(135deg,#f1f5f9 0%,#c7d2fe 50%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-2px;line-height:1">SearchCopy</h1><p style="color:#334155;font-size:11px;margin:0;letter-spacing:0.5px">${t.tagline}</p>`;
  app.appendChild(hdr);

  // Tabs
  const tabBar=el('div',"display:flex;gap:4px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:4px;margin-bottom:22px");
  [{id:"search",label:t.tabSearch},{id:"about",label:t.tabAbout}].forEach(tb=>{
    const on=state.tab===tb.id;
    const btn=el('button',`flex:1;background:${on?"rgba(99,102,241,0.18)":"transparent"};border:1px solid ${on?"rgba(99,102,241,0.35)":"transparent"};border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;color:${on?"#c7d2fe":"#475569"};cursor:pointer;transition:all 0.2s;letter-spacing:0.3px`);
    btn.textContent=tb.label;
    btn.onclick=()=>{state.tab=tb.id;render()};
    tabBar.appendChild(btn);
  });
  app.appendChild(tabBar);

  if(state.tab==="about"){app.appendChild(renderAbout());return;}

  // Search tab
  const sw=el('div',"animation:fadeUp 0.3s ease both");

  // Filters
  const filters=el('div',"display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:18px");
  PROGRAMS.forEach(p=>{
    const on=state.progs.includes(p);
    const c=COLORS[p];
    const btn=el('button',`background:${on?c+"16":"rgba(255,255,255,0.03)"};border:1px solid ${on?c+"70":"rgba(255,255,255,0.07)"};color:${on?c:"#475569"};border-radius:999px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:5px`);
    btn.innerHTML=`<span style="font-size:10px">${ICONS[p]}</span>${p}`;
    btn.onclick=()=>{
      if(on&&state.progs.length===1) return;
      state.progs=on?state.progs.filter(x=>x!==p):[...state.progs,p];
      render();
    };
    filters.appendChild(btn);
  });
  sw.appendChild(filters);

  // Input
  const iw=el('div',"position:relative;margin-bottom:16px;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,0.4);transition:box-shadow 0.3s");
  iw.appendChild(el('span',"position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:17px;color:#4f46e5;pointer-events:none;font-weight:700","⌘"));

  const input=document.createElement('input');
  input.value=state.query;
  input.placeholder=t.placeholder;
  input.style.cssText="width:100%;background:rgba(12,12,22,0.98);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:16px 46px 16px 48px;font-size:15px;color:#e2e8f0;outline:none;font-family:inherit;transition:border 0.25s";
  input.oninput=e=>{state.query=e.target.value;renderResults()};
  input.onfocus=()=>{iw.style.boxShadow="0 0 0 2px rgba(99,102,241,0.4),0 24px 60px rgba(0,0,0,0.55)";input.style.borderColor="rgba(99,102,241,0.55)"};
  input.onblur=()=>{iw.style.boxShadow="0 8px 40px rgba(0,0,0,0.4)";input.style.borderColor="rgba(255,255,255,0.07)"};
  iw.appendChild(input);

  const clrBtn=el('button',"position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.07);border:none;color:#64748b;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center","✕");
  clrBtn.style.display=state.query?"flex":"none";
  clrBtn.onclick=()=>{state.query="";render()};
  iw.appendChild(clrBtn);
  sw.appendChild(iw);

  // Suggestions
  const sugWrap=el('div',"margin-bottom:28px");
  sugWrap.style.display=state.query?"none":"block";
  sugWrap.appendChild(el('p',"color:#1e293b;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px",t.tryLabel));
  const sugRow=el('div',"display:flex;flex-wrap:wrap;gap:6px");
  t.suggestions.forEach(s=>{
    const btn=el('button',"background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:7px;padding:5px 11px;font-size:11px;color:#475569;cursor:pointer;transition:all 0.15s");
    btn.textContent=s;
    btn.onmouseenter=()=>{btn.style.color="#a5b4fc";btn.style.borderColor="rgba(99,102,241,0.3)"};
    btn.onmouseleave=()=>{btn.style.color="#475569";btn.style.borderColor="rgba(255,255,255,0.06)"};
    btn.onclick=()=>{state.query=s;render();document.querySelector('input').focus()};
    sugRow.appendChild(btn);
  });
  sugWrap.appendChild(sugRow);
  sw.appendChild(sugWrap);

  const rw=el('div',"");rw.id="results-wrap";
  sw.appendChild(rw);
  app.appendChild(sw);
  renderResults();

  function renderResults(){
    const rw=document.getElementById('results-wrap');
    if(!rw) return;
    rw.innerHTML='';
    const q=state.query;
    const results=doSearch(q,state.progs);
    const chain=buildChain(q,results);
    const cols=extractColumns(q);
    if(sugWrap) sugWrap.style.display=q?"none":"block";
    if(clrBtn) clrBtn.style.display=q?"flex":"none";

    if(chain||results.length>0){
      const label=el('p',"color:#1e293b;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px");
      label.textContent=chain?t.foundChain(results.length):t.found(results.length);
      rw.appendChild(label);
      if(chain) rw.appendChild(renderChainCard(chain));
      const list=el('div',"display:flex;flex-direction:column;gap:8px");
      results.forEach((item,i)=>list.appendChild(renderResultCard(item,i,cols)));
      rw.appendChild(list);
    } else if(q.trim().length>1){
      const empty=el('div',"text-align:center;padding:60px 20px;color:#1e293b");
      empty.innerHTML=`<div style="font-size:36px;margin-bottom:12px;opacity:0.4">⌕</div><p style="margin:0;font-size:13px">${t.notFound(q)}</p><p style="margin:6px 0 0;font-size:11px;color:#0f172a">${t.notFoundHint}</p>`;
      rw.appendChild(empty);
    }
  }
}

render();

// ── Auto-updater ──
async function checkForUpdates() {
  try {
    const { check } = await import('@tauri-apps/plugin-updater');
    const { relaunch } = await import('@tauri-apps/plugin-process');
    const update = await check();
    if (!update) return;

    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;bottom:60px;right:20px;background:rgba(12,10,28,0.97);border:1px solid rgba(99,102,241,0.4);border-radius:12px;padding:14px 18px;z-index:999;display:flex;align-items:center;gap:14px;backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(0,0,0,0.6);animation:fadeUp 0.4s ease both;max-width:320px';
    banner.innerHTML = `
      <div style="flex:1">
        <div style="font-size:11px;font-weight:800;color:#c7d2fe;margin-bottom:3px">🔔 Новая версия ${update.version}</div>
        <div style="font-size:10px;color:#475569">${update.body || 'Доступно обновление'}</div>
      </div>
      <button id="install-btn" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:800;color:#fff;cursor:pointer;white-space:nowrap;font-family:inherit">Установить</button>
    `;
    document.body.appendChild(banner);

    document.getElementById('install-btn').onclick = async () => {
      document.getElementById('install-btn').textContent = '⏳';
      await update.downloadAndInstall();
      await relaunch();
    };
  } catch(e) {
    console.log('Updater:', e);
  }
}

if (window.__TAURI__) {
  setTimeout(checkForUpdates, 2000);
}

</script>
