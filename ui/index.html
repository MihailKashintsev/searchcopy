// VERSION — читается из Tauri автоматически, фоллбек для браузера
let VERSION="1.0.0";
(async()=>{
  try{
    const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
    if(invoke){
      const v=await invoke('get_version');
      if(v){VERSION=v;document.getElementById('vnum').textContent=v;}
    }
  }catch(e){console.log('version:',e);}
})();

function detectOS(){
  const p=navigator.platform||navigator.userAgent;
  if(/Mac/.test(p)) return 'mac';
  if(/Linux|Android/.test(p)) return 'linux';
  return 'win';
}
const detectedOS=detectOS();
const SETTINGS_KEY='sc_settings_v2';
function loadSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')}catch{return{}}}
function saveSettings(s){localStorage.setItem(SETTINGS_KEY,JSON.stringify(s))}
let settings={lang:'ru',theme:'dark',os:detectedOS,autoUpdate:true,aiKey:'',gigaKey:'',aiProvider:'claude',...loadSettings()};
function applyTheme(){document.body.classList.toggle('light',settings.theme==='light')}
applyTheme();

function adaptKeys(keys){
  if(!keys) return keys;
  if(typeof keys==='object'){
    return keys[settings.os]||keys.win||keys;
  }
  if(settings.os==='mac'){
    return keys.replace(/\bCtrl\b/g,'⌘').replace(/\bAlt\b/g,'⌥').replace(/\bShift\b/g,'⇧').replace(/\bWin\b/g,'⌘');
  }
  if(settings.os==='linux'){
    return keys.replace(/\bWin\b/g,'Super');
  }
  return keys;
}

function extractColumns(q){
  const parts=q.toUpperCase().split(/[\s,+иand&]+/);
  const cols=[];
  for(const p of parts) if(/^[A-Z]{1,2}$/.test(p.trim())) cols.push(p.trim());
  return [...new Set(cols)];
}
function getDesc(item){return typeof item.desc==='object'?item.desc[settings.lang]:item.desc}
function getTags(item){return typeof item.tags==='object'?(item.tags[settings.lang]||[]):(item.tags||[])}
function getKeys(item){return adaptKeys(item.keys)}

function scoreItem(query,item){
  const q=query.toLowerCase().trim();let s=0;
  const k=typeof item.keys==='object'?Object.values(item.keys).join(' '):item.keys;
  const fields=[getDesc(item).toLowerCase(),k.toLowerCase(),...getTags(item)];
  for(const f of fields){
    if(f===q){s+=10;continue}
    if(f.includes(q)){s+=5;continue}
    for(const w of q.split(/[\s,]+/)) if(w.length>2&&f.includes(w)) s+=2;
  }
  return s;
}

function doSearch(query,progs){
  if(query.trim().length<2) return [];
  const out=[];
  for(const prog of progs)
    for(const item of DB[prog]||[]){
      const s=scoreItem(query,item);
      if(s>0) out.push({...item,program:prog,score:s});
    }
  return out.sort((a,b)=>b.score-a.score).slice(0,14);
}

function buildChain(query,items){
  const cols=extractColumns(query);
  if(cols.length<2) return null;
  const base=items.find(i=>i.template&&!i.complex)||items[0];
  if(!base||!base.template) return null;
  return cols.map((col,i)=>({
    step:i+1,col,
    formula:base.template.replace(/\{col\}/g,col),
    desc:getDesc(base),program:base.program
  }));
}

function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="✓";btn.style.color="#4ade80";btn.style.borderColor="rgba(34,197,94,0.5)";btn.style.background="rgba(34,197,94,0.2)";
    setTimeout(()=>{btn.textContent="⎘";btn.style.color="";btn.style.borderColor="";btn.style.background=""},1400);
  });
}
function makeCopyBtn(text){
  const btn=document.createElement('button');btn.textContent="⎘";
  btn.style.cssText="background:var(--copy-bg);border:1px solid var(--copy-border);color:var(--copy-color);border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;font-weight:700;transition:all 0.18s;flex-shrink:0;font-family:inherit";
  btn.onclick=()=>copyText(text,btn);return btn;
}
function el(tag,style,html){
  const e=document.createElement(tag);if(style)e.style.cssText=style;
  if(html!==undefined)e.innerHTML=html;return e;
}

// ── AI Search ──
async function doAiSearch(query){
  const provider=settings.aiProvider||'claude';
  const hasKey=provider==='claude'?!!settings.aiKey:!!settings.gigaKey;
  if(!hasKey){
    state.aiResult={error:true,msg:T[settings.lang].aiNoKey};
    state.aiLoading=false;renderResults();return;
  }
  const lang=settings.lang;
  const osName=settings.os==='mac'?'macOS':settings.os==='linux'?'Linux':'Windows';
  const systemPrompt=lang==='ru'
    ?`Ты эксперт по горячим клавишам и командам. Отвечай ТОЛЬКО в формате JSON массива. Каждый элемент: {"keys":"...","desc":"...","example":"...","program":"..."}. Клавиши для ${osName}. Максимум 8 результатов. Только JSON, без markdown.`
    :`You are a hotkey and command expert. Reply ONLY as a JSON array. Each item: {"keys":"...","desc":"...","example":"...","program":"..."}. Keys for ${osName}. Maximum 8 results. JSON only, no markdown.`;

  try{
    let items=[];

    if(provider==='claude'){
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':settings.aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:systemPrompt,messages:[{role:'user',content:query}]})
      });
      if(!res.ok)throw new Error('Claude API error '+res.status);
      const data=await res.json();
      const text=data.content?.[0]?.text||'[]';
      try{items=JSON.parse(text.replace(/```json|```/g,'').trim())}catch{items=[]}

    } else if(provider==='giga'){
      // GigaChat: весь запрос через Rust (giga_search) — обходит CORS и Sber SSL
      const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
      if(!invoke) throw new Error('GigaChat работает только в десктоп-приложении');
      const rawKey=settings.gigaKey.trim();
      const authKey=rawKey.startsWith('Basic ')?rawKey.slice(6).trim():rawKey;
      const text=await invoke('giga_search',{authKey,systemPrompt,query});
      try{items=JSON.parse(text.replace(/```json|```/g,'').trim())}catch{items=[]}
    }

    state.aiResult={items,query,provider};
  }catch(e){
    const errMsg=typeof e==='string'?e:(e?.message||String(e));
    console.error('AI search error:',errMsg);
    state.aiResult={error:true,msg:'❌ '+errMsg};
  }
  state.aiLoading=false;
  renderResults();
}

    const left=el('div',"display:flex;align-items:center;gap:12px;flex:1;min-width:0");
    const ic=el('div',"font-size:18px;flex-shrink:0");ic.textContent=icon;
    const tx=el('div',"");
    const ti=el('div',"font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px");ti.textContent=title;
    const de=el('div',"font-size:11px;color:var(--text2)");de.textContent=desc;
    tx.appendChild(ti);tx.appendChild(de);left.appendChild(ic);left.appendChild(tx);
    row.appendChild(left);row.appendChild(control);return row;
  }
  function segmented(options,current,onChange){
    const w=el('div',"display:flex;gap:2px;background:var(--seg-bg);border:1px solid var(--border);border-radius:8px;padding:3px;flex-shrink:0");
    options.forEach(({val,label})=>{
      const on=current===val;
      const btn=el('button',`background:${on?"rgba(99,102,241,0.25)":"transparent"};border:1px solid ${on?"rgba(99,102,241,0.45)":"transparent"};border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;color:${on?"#c7d2fe":"var(--text2)"};cursor:pointer;transition:all 0.18s;white-space:nowrap`);
      btn.textContent=label;btn.onclick=()=>onChange(val);w.appendChild(btn);
    });return w;
  }
  function toggle(current,onChange){
    const btn=el('button',`background:${current?"rgba(34,197,94,0.15)":"var(--toggle-off-bg)"};border:1px solid ${current?"rgba(34,197,94,0.4)":"var(--border)"};border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;color:${current?"#4ade80":"var(--text2)"};cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;flex-shrink:0`);
    btn.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${current?"#4ade80":"#475569"};display:inline-block"></span>${current?t.on:t.off}`;
    btn.onclick=()=>onChange(!current);return btn;

  // Search input + AI toggle
  const inputRow=el('div',"display:flex;gap:8px;margin-bottom:16px;align-items:stretch");
  const iw=el('div',"flex:1;position:relative;border-radius:14px;box-shadow:var(--shadow);transition:box-shadow 0.3s");
  iw.appendChild(el('span',"position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:17px;color:#4f46e5;pointer-events:none;font-weight:700","⌘"));
  const input=document.createElement('input');
  input.value=state.query;
  input.placeholder=state.aiMode?t.aiPlaceholder:t.placeholder;
  input.style.cssText="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:14px;padding:16px 46px 16px 48px;font-size:15px;color:var(--text);outline:none;font-family:inherit;transition:border 0.25s";
  input.oninput=e=>{state.query=e.target.value;if(!state.aiMode)renderResults()};
  input.onkeydown=e=>{if(e.key==='Enter'&&state.aiMode&&state.query.trim()){e.preventDefault();state.aiLoading=true;state.aiResult=null;renderResults();doAiSearch(state.query.trim())}};
  input.onfocus=()=>{iw.style.boxShadow="var(--shadow-focus)";input.style.borderColor="rgba(99,102,241,0.55)"};
  input.onblur=()=>{iw.style.boxShadow="var(--shadow)";input.style.borderColor="var(--border)"};
  iw.appendChild(input);
  const clrBtn=el('button',"position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center","✕");
  clrBtn.style.display=state.query?"flex":"none";
  clrBtn.onclick=()=>{state.query="";state.aiResult=null;render()};
  iw.appendChild(clrBtn);inputRow.appendChild(iw);

  // AI toggle button
  const aiBtn=el('button',`background:${state.aiMode?"rgba(168,85,247,0.2)":"var(--bg3)"};border:1px solid ${state.aiMode?"rgba(168,85,247,0.5)":"var(--border)"};color:${state.aiMode?"#c084fc":"var(--text2)"};border-radius:14px;padding:0 16px;font-size:12px;font-weight:800;cursor:pointer;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:6px`);
  const providerLabel=settings.aiProvider==='giga'?'GigaChat':'Claude';
  aiBtn.innerHTML=state.aiMode?`✦ ${providerLabel} вкл`:t.aiSearch;
  aiBtn.onclick=()=>{state.aiMode=!state.aiMode;state.aiResult=null;state.aiLoading=false;render();setTimeout(()=>document.querySelector('input')?.focus(),50)};
  inputRow.appendChild(aiBtn);
  sw.appendChild(inputRow);

  // AI mode hint
  if(state.aiMode){
    const hint=el('div',"background:rgba(168,85,247,0.07);border:1px solid rgba(168,85,247,0.2);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:#c084fc;display:flex;align-items:center;gap:8px");
    hint.innerHTML=`<span>✦</span><span>${settings.lang==='ru'?'Нажми Enter для поиска — Claude найдёт сочетания для любого приложения':'Press Enter to search — Claude will find shortcuts for any app'}</span>`;
    sw.appendChild(hint);
  }

  // Suggestions
  const sugWrap=el('div',"margin-bottom:28px");
  sugWrap.style.display=(state.query||state.aiMode)?"none":"block";
  sugWrap.appendChild(el('p',"color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px",t.tryLabel));
  const sugRow=el('div',"display:flex;flex-wrap:wrap;gap:6px");
  t.suggestions.forEach(s=>{
    const btn=el('button',"background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 11px;font-size:11px;color:var(--text2);cursor:pointer;transition:all 0.15s");
    btn.textContent=s;
    btn.onmouseenter=()=>{btn.style.color="#a5b4fc";btn.style.borderColor="rgba(99,102,241,0.35)";btn.style.background="rgba(99,102,241,0.07)"};
    btn.onmouseleave=()=>{btn.style.color="";btn.style.borderColor="";btn.style.background=""};
    btn.onclick=()=>{state.query=s;render();setTimeout(()=>document.querySelector('input')?.focus(),50)};
    sugRow.appendChild(btn);
  });
  sugWrap.appendChild(sugRow);sw.appendChild(sugWrap);

  const rw=el('div',"");rw.id="results-wrap";sw.appendChild(rw);app.appendChild(sw);
  renderResults();
}

function renderResults(){
  const rw=document.getElementById('results-wrap');if(!rw)return;rw.innerHTML='';
  const t=T[settings.lang];
  const q=state.query;
  const sugWrap=document.querySelector('#app .wrap > div > div[style*="margin-bottom:28px"]');
  const clrBtn=document.getElementById('clr-btn');

  // AI mode
  if(state.aiMode){
    if(state.aiLoading){
      const loading=el('div',"display:flex;align-items:center;justify-content:center;gap:12px;padding:40px;color:var(--text2)");
      loading.innerHTML=`<div class="spinner"></div><span style="font-size:13px">${t.aiSearching}</span>`;
      rw.appendChild(loading);return;
    }
    if(state.aiResult){
      if(state.aiResult.error){
        const err=el('div',"background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:16px;text-align:center;color:#fca5a5;font-size:12px");
        err.textContent=state.aiResult.msg;rw.appendChild(err);return;
      }
      const label=el('p',"color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px");
      label.innerHTML=`✦ AI · ${t.found(state.aiResult.items?.length||0)}`;rw.appendChild(label);
      const list=el('div',"display:flex;flex-direction:column;gap:8px");
      (state.aiResult.items||[]).forEach((item,i)=>list.appendChild(renderAiCard(item,i)));
      rw.appendChild(list);
    }
    return;
  }

  // Local search
  const results=doSearch(q,state.progs);
  const chain=buildChain(q,results);
  const cols=extractColumns(q);

  if(chain||results.length>0){
    const label=el('p',"color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px");
    label.textContent=chain?t.foundChain(results.length):t.found(results.length);rw.appendChild(label);
    if(chain)rw.appendChild(renderChainCard(chain));
    const list=el('div',"display:flex;flex-direction:column;gap:8px");
    results.forEach((item,i)=>list.appendChild(renderResultCard(item,i,cols)));
    rw.appendChild(list);
  } else if(q.trim().length>1){
    const empty=el('div',"text-align:center;padding:50px 20px;color:var(--empty-color)");
    empty.innerHTML=`<div style="font-size:36px;margin-bottom:12px;opacity:0.4">⌕</div><p style="margin:0;font-size:13px">${t.notFound(q)}</p><p style="margin:6px 0 0;font-size:11px">${t.notFoundHint}</p>`;
    rw.appendChild(empty);
  }
}

// ── Auto-updater via GitHub API ──
function compareVersions(a,b){
  const pa=a.replace(/^v/,'').split('.').map(Number);
  const pb=b.replace(/^v/,'').split('.').map(Number);
  for(let i=0;i<3;i++){if((pa[i]||0)>(pb[i]||0))return 1;if((pa[i]||0)<(pb[i]||0))return -1;}
  return 0;
}
async function checkForUpdates(){
  if(!settings.autoUpdate)return;
  try{
    const res=await fetch('https://api.github.com/repos/MihailKashintsev/searchcopy/releases/latest',{headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!res.ok)return;
    const data=await res.json();
    const latestVersion=data.tag_name||'';
    if(!latestVersion)return;
    if(compareVersions(latestVersion,VERSION)<=0)return;
    document.getElementById('update-banner')?.remove();
    const isMac=/Mac/.test(navigator.platform);
    const isWin=/Win/.test(navigator.platform);
    const assets=data.assets||[];
    const platformAsset=assets.find(a=>{const n=a.name.toLowerCase();if(isMac)return n.endsWith('.dmg');if(isWin)return n.endsWith('setup.exe');return n.endsWith('.appimage');});
    const releasePageUrl='https://github.com/MihailKashintsev/searchcopy/releases/latest';
    const finalUrl=platformAsset?platformAsset.browser_download_url:releasePageUrl;
    const fileName=platformAsset?platformAsset.name:'GitHub Releases';
    const fileSize=platformAsset?' · '+(platformAsset.size/1024/1024).toFixed(1)+' MB':'';
    const changelog=data.body?(data.body.split('\n').filter(l=>l.trim()).slice(0,2).join(' · ').slice(0,100)):'';
    const banner=el('div',"position:fixed;bottom:60px;right:20px;background:var(--chain-bg);border:1px solid rgba(99,102,241,0.4);border-radius:14px;padding:16px 18px;z-index:999;backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(0,0,0,0.5);animation:fadeUp 0.4s ease both;width:310px");
    banner.id='update-banner';
    banner.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div><div style="font-size:10px;color:#818cf8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">🔔 Обновление</div>
        <div style="font-size:16px;font-weight:900;color:var(--text)">v${latestVersion} <span style="font-size:11px;font-weight:400;color:var(--text2)">(сейчас v${VERSION})</span></div></div>
        <button id="close-banner-btn" style="background:transparent;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;padding:0 0 0 8px">×</button>
      </div>
      ${changelog?`<div style="font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.5;border-left:2px solid rgba(99,102,241,0.4);padding-left:8px;word-break:break-word">${changelog}</div>`:''}
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:10px;color:var(--text2)">📦 <span style="color:var(--text)">${fileName}</span><span style="color:var(--text3)">${fileSize}</span></div>
      <div style="display:flex;gap:8px">
        <button id="download-btn" style="flex:1;background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:9px;padding:9px 14px;font-size:12px;font-weight:800;color:#fff;cursor:pointer;font-family:inherit">⬇ Установить</button>
        <a href="${releasePageUrl}" target="_blank" style="background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-size:11px;font-weight:700;color:var(--text2);text-decoration:none;display:flex;align-items:center;white-space:nowrap">GitHub ↗</a>
      </div>`;
    document.body.appendChild(banner);
    document.getElementById('close-banner-btn').onclick=()=>banner.remove();
    document.getElementById('download-btn').onclick=()=>runSilentInstall(finalUrl,fileName,latestVersion);
  }catch(e){console.log('Updater:',e);}
}
setTimeout(checkForUpdates,3000);
setInterval(checkForUpdates,30*60*1000);

// ── Open URL in system browser (Tauri-safe) ──
async function openInBrowser(url){
  try{
    const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
    if(invoke){
      // Try opener plugin first
      try{ await invoke('plugin:opener|open-url',{url}); return; }catch{}
      // Fallback: shell open
      try{ await invoke('plugin:shell|open',{path:url}); return; }catch{}
    }
  }catch{}
  // Last resort
  window.open(url,'_blank');
}

// ── Silent installer ──
async function runSilentInstall(url, fileName, version){
  const isMac=/Mac/.test(navigator.platform);
  const isWin=/Win/.test(navigator.platform);
  document.getElementById('update-banner')?.remove();

  const overlay=el('div',"position:fixed;inset:0;background:rgba(7,7,16,0.88);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)");
  overlay.id='install-overlay';
  const box=el('div',"background:var(--chain-bg);border:1px solid rgba(99,102,241,0.4);border-radius:16px;padding:28px 32px;width:340px;text-align:center");
  box.innerHTML=`
    <div style="font-size:32px;margin-bottom:14px">⬇</div>
    <div style="font-size:15px;font-weight:900;color:var(--text);margin-bottom:6px">Установка обновления</div>
    <div id="install-status" style="font-size:12px;color:var(--text2);margin-bottom:18px">Подготовка…</div>
    <div style="background:var(--bg3);border-radius:999px;height:4px;overflow:hidden;margin-bottom:8px">
      <div id="install-bar" style="background:linear-gradient(90deg,#4f46e5,#7c3aed);height:4px;width:0%;transition:width 0.4s;border-radius:999px"></div>
    </div>
    <div id="install-percent" style="font-size:10px;color:var(--text3);margin-bottom:16px">0%</div>
    <button id="install-cancel" style="background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 16px;font-size:11px;cursor:pointer;font-family:inherit">Отмена</button>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  document.getElementById('install-cancel').onclick=()=>overlay.remove();

  function setStatus(msg){const el=document.getElementById('install-status');if(el)el.textContent=msg}
  function setProgress(pct){
    const bar=document.getElementById('install-bar');
    const pctEl=document.getElementById('install-percent');
    if(bar)bar.style.width=pct+'%';
    if(pctEl)pctEl.textContent=pct+'%';
  }

  const invoke=window.__TAURI__?.core?.invoke || window.__TAURI__?.tauri?.invoke;

  try{
    // Tauri 2: use shell plugin via invoke
    const runCmd=async(program,args)=>{
      return await invoke('plugin:shell|execute',{program,args,options:{}});
    };

    if(!invoke){
      // No Tauri — just open URL in browser
      setStatus('Открываю загрузку в браузере…');
      setProgress(30);
      setTimeout(()=>{overlay.remove();openInBrowser(url);},1200);
      return;
    }

    if(isMac){
      const tmpDmg='/tmp/SearchCopyUpdate.dmg';
      const mountPt='/Volumes/SearchCopyUpdate';

      setStatus('Скачиваю…');setProgress(5);
      await runCmd('curl',['-L','-o',tmpDmg,url]);
      setProgress(45);

      setStatus('Монтирую образ…');
      await runCmd('hdiutil',['attach',tmpDmg,'-mountpoint',mountPt,'-nobrowse','-quiet']);
      setProgress(60);

      setStatus('Устанавливаю приложение…');
      await runCmd('sh',['-c',`rm -rf /Applications/SearchCopy.app && cp -Rf "${mountPt}/SearchCopy.app" /Applications/`]);
      setProgress(82);

      setStatus('Финализирую…');
      await runCmd('hdiutil',['detach',mountPt,'-quiet']);
      await runCmd('rm',['-f',tmpDmg]);
      setProgress(97);

      setStatus('✅ Готово! Перезапуск…');setProgress(100);
      setTimeout(async()=>{
        overlay.remove();
        try{ await runCmd('open',['/Applications/SearchCopy.app']); }catch{}
        try{ await invoke('plugin:process|restart'); }catch{}
      },1400);

    } else if(isWin){
      const tmpExe='C:\\Users\\Public\\SearchCopySetup.exe';

      setStatus('Скачиваю…');setProgress(5);
      await runCmd('powershell',['-NoProfile','-Command',`Invoke-WebRequest -Uri '${url}' -OutFile '${tmpExe}'`]);
      setProgress(55);

      setStatus('Запускаю установщик…');setProgress(60);
      // /S = NSIS silent mode
      await runCmd('powershell',['-NoProfile','-Command',`Start-Process -FilePath '${tmpExe}' -ArgumentList '/S' -Wait`]);
      setProgress(92);

      setStatus('✅ Готово! Перезапуск…');setProgress(100);
      setTimeout(async()=>{
        overlay.remove();
        try{ await invoke('plugin:process|restart'); }catch{}
      },1400);

    } else {
      // Linux
      const tmpFile='/tmp/SearchCopy-update.AppImage';

      setStatus('Скачиваю AppImage…');setProgress(5);
      await runCmd('sh',['-c',`curl -L '${url}' -o '${tmpFile}' && chmod +x '${tmpFile}'`]);
      setProgress(85);

      setStatus('✅ Запускаю новую версию…');setProgress(100);
      setTimeout(async()=>{
        overlay.remove();
        try{ await runCmd('sh',['-c',`nohup '${tmpFile}' &`]); }catch{}
        try{ await invoke('plugin:process|restart'); }catch{}
      },1400);
    }

  }catch(e){
    console.error('Install error:',e);
    setStatus('❌ Ошибка установки');
    setProgress(0);
    const errBox=document.getElementById('install-status');
    if(errBox) errBox.style.color='#fca5a5';
    // Show fallback button
    const cancel=document.getElementById('install-cancel');
    if(cancel){
      cancel.textContent='Скачать вручную ↗';
      cancel.style.color='#c7d2fe';
      cancel.style.borderColor='rgba(99,102,241,0.4)';
      cancel.onclick=()=>{ overlay.remove(); openInBrowser(url); };
    }
  }
}


render();
</script>
