function renderResults(){
  const rw=document.getElementById('results-wrap');if(!rw)return;rw.innerHTML='';
  const t=T[settings.lang];
  const q=state.query.trim();
  const lang=settings.lang;

  if(!q && !state.aiResult){return;}

  const localResults = q.length>=2 ? doSearch(q, state.progs, state.typeFilter) : [];
  const actionChain  = q.length>=4 && state.typeFilter!=='hotkey' && state.typeFilter!=='formula'
    ? buildActionChain(q, state.progs) : null;
  const colChain     = q.length>=2 && state.typeFilter!=='hotkey'
    ? buildColumnChain(q, localResults) : null;
  const detectedCols = extractColumns(q);

  let sectionIndex = 0;

  // ── Цепочка действий ──
  if(actionChain){
    const inner = document.createElement('div');
    inner.appendChild(renderActionChainCard(actionChain));
    const label = lang==='ru'?'Цепочка действий':'Action chain';
    const badge = actionChain.length+(lang==='ru'?' шагов':' steps');
    const sec = makeSection('⛓', label, badge, '#fcd34d', inner, 'chain');
    sec.style.animationDelay = (sectionIndex++*0.07)+'s';
    rw.appendChild(sec);
  } else if(colChain){
    const inner = document.createElement('div');
    inner.appendChild(renderColumnChainCard(colChain));
    const sec = makeSection('⛓', lang==='ru'?'Цепочка столбцов':'Column chain', colChain.length+(lang==='ru'?' шагов':' steps'), '#fcd34d', inner, 'colchain');
    sec.style.animationDelay = (sectionIndex++*0.07)+'s';
    rw.appendChild(sec);
  }

  // ── База знаний ──
  if(localResults.length>0){
    const list = document.createElement('div');
    list.className = 'stagger-list';
    list.style.cssText = 'display:flex;flex-direction:column;gap:8px';
    localResults.forEach((item,i)=>list.appendChild(renderResultCard(item,i,detectedCols)));
    const sec = makeSection('📚', lang==='ru'?'База':'Database', t.found(localResults.length), '#818cf8', list, 'db');
    sec.style.animationDelay = (sectionIndex++*0.07)+'s';
    rw.appendChild(sec);
  } else if(q.length>=2 && !actionChain && !colChain && !state.aiLoading){
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:28px 20px;color:var(--empty-color);animation:fadeIn 0.3s ease';
    empty.innerHTML = '<div style="font-size:28px;margin-bottom:10px;opacity:0.35">⌕</div><p style="margin:0;font-size:13px">'+t.notFound(q)+'</p><p style="margin:5px 0 0;font-size:11px;opacity:0.55">'+t.notFoundHint+'</p>';
    rw.appendChild(empty);
  }

  // ── AI загрузка ──
  if(state.aiLoading){
    const loading = document.createElement('div');
    loading.style.cssText = 'margin-top:12px;animation:fadeIn 0.2s ease';
    loading.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;padding:16px;background:rgba(168,85,247,0.05);border:1px solid rgba(168,85,247,0.18);border-radius:12px;color:var(--text2)">
        <div class="spinner"></div>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;color:#c084fc;margin-bottom:4px">${t.aiSearching}</div>
          <div style="display:flex;gap:6px">
            <div class="skeleton" style="height:8px;width:140px"></div>
            <div class="skeleton" style="height:8px;width:80px"></div>
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">
        ${[1,2,3].map(()=>'<div class="skeleton" style="height:52px;border-radius:12px"></div>').join('')}
      </div>`;
    rw.appendChild(loading);
  }

  // ── AI результаты ──
  if(state.aiResult && !state.aiLoading){
    if(state.aiResult.error){
      const err = document.createElement('div');
      err.style.cssText = 'margin-top:12px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:14px;color:#fca5a5;font-size:12px;animation:fadeIn 0.25s ease';
      err.textContent = state.aiResult.msg;
      rw.appendChild(err);
    } else {
      const itemCount = state.aiResult.items?.length||0;
      const providerLabel = state.aiResult.provider==='giga'?'GigaChat':'Claude AI';
      const badge = state.aiResult.isChain
        ? (itemCount+(lang==='ru'?' шагов':' steps'))
        : t.found(itemCount);

      let inner;
      if(state.aiResult.isChain){
        inner = document.createElement('div');
        const steps=(state.aiResult.items||[]).map((item,i)=>({
          step:item.step||i+1, text:item.desc||item.keys, item:{...item,type:'hotkey'}
        }));
        inner.appendChild(renderActionChainCard(steps));
      } else {
        inner = document.createElement('div');
        inner.className = 'stagger-list';
        inner.style.cssText = 'display:flex;flex-direction:column;gap:8px';
        (state.aiResult.items||[]).forEach((item,i)=>inner.appendChild(renderAiCard(item,i)));
      }

      const sec = makeSection('✦', providerLabel, badge, '#c084fc', inner, 'ai');
      sec.style.animationDelay = (sectionIndex++*0.07)+'s';
      sec.classList.add('ai-result-new');
      sec.style.marginTop = (localResults.length>0||actionChain||colChain)?'8px':'0';
      rw.appendChild(sec);
    }
  }
}

  gotItBtn.onclick=()=>close();
  gotItWrap.appendChild(gotItBtn);

    });
    if(visible>=0)dots.forEach((d,i)=>d.classList.toggle('active',i===visible));

  overlay.appendChild(sheet);
  overlay.onclick=e=>{if(e.target===overlay)close();};
  document.body.appendChild(overlay);

  function close(){
    markOnboardingSeen();
    steps.forEach(s=>s._cleanup&&s._cleanup());
    overlay.style.animation='fadeIn 0.2s ease reverse both';
    sheet.style.animation='slideUp 0.25s cubic-bezier(.4,0,.2,1) reverse both';
    setTimeout(()=>overlay.remove(),250);
  }
}


// ── Sidebar navigation ──
function openSidebar(tabDefs, t){
  const overlay=document.createElement('div');
  overlay.className='sidebar-overlay';
  const sidebar=document.createElement('div');
  sidebar.className='sidebar';

  const hdr=document.createElement('div');
  hdr.className='sidebar-header';
  hdr.innerHTML=`<div class="sidebar-logo">⌘ SearchCopy</div>`;
  const closeBtn=document.createElement('button');
  closeBtn.className='sidebar-close';
  closeBtn.textContent='✕';
  hdr.appendChild(closeBtn);
  sidebar.appendChild(hdr);

  function close(){overlay.remove();sidebar.remove();}
  overlay.onclick=close;
  closeBtn.onclick=close;

  const groups={
    main: t.lang==='ru'?'Поиск':'Search',
    tools: t.lang==='ru'?'Инструменты':'Tools',
    ai: 'AI',
    info: t.lang==='ru'?'Информация':'Info',
  };
  const ru=t===T['ru']||settings.lang==='ru';
  const groupLabels={main:ru?'Поиск':'Search',tools:ru?'Инструменты':'Tools',ai:'AI',info:ru?'Информация':'Info'};
  let lastGroup='';
  tabDefs.forEach(({key,label,icon,group})=>{
    if(group!==lastGroup){
      const sec=document.createElement('div');
      sec.className='sidebar-section';
      sec.textContent=groupLabels[group]||group;
      sidebar.appendChild(sec);
      lastGroup=group;
    }
    const btn=document.createElement('button');
    btn.className='sidebar-btn'+(state.tab===key?' active':'');
    btn.innerHTML=`<span class="sb-icon">${icon}</span><span>${label.replace(/^[^\w\u0400-\u04FF]+/,'')}</span>`;
    parseEmoji(btn);
    if(state.tab===key){
      const dot=document.createElement('span');
      dot.style.cssText='margin-left:auto;width:6px;height:6px;border-radius:50%;background:#818cf8;flex-shrink:0';
      btn.appendChild(dot);
    }
    btn.onclick=()=>{state.tab=key;close();render();};
    sidebar.appendChild(btn);
  });

  // Version info at bottom
  const ver=document.createElement('div');
  ver.style.cssText='margin-top:auto;padding:16px;font-size:10px;color:var(--text3);text-align:center;border-top:1px solid var(--border);margin-top:12px';
  const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
  if(invoke){invoke('get_version').then(v=>{ver.textContent=`SearchCopy v${v} · RENDERGAMES`;}).catch(()=>{ver.textContent='SearchCopy · RENDERGAMES';});}
  else{ver.textContent='SearchCopy · RENDERGAMES';}
  sidebar.appendChild(ver);

  document.body.appendChild(overlay);
  document.body.appendChild(sidebar);
}

function render(){
  const t=T[settings.lang];
  const app=document.getElementById('app');
  app.innerHTML='';

  const glow1=document.createElement('div');glow1.className='glow1';app.appendChild(glow1);
  const glow2=document.createElement('div');glow2.className='glow2';app.appendChild(glow2);

  const wrap=el('div',"position:relative;z-index:1;max-width:760px;margin:0 auto;padding:32px 20px 80px");

  // ── Header ──
  const header=el('div',"text-align:center;margin-bottom:28px;animation:fadeUp 0.4s cubic-bezier(.4,0,.2,1) both");
  const isDark=settings.theme!=='light';
  const h1grad=isDark
    ?'linear-gradient(135deg,#fff 40%,#a5b4fc)'
    :'linear-gradient(135deg,#1e1b4b 30%,#4f46e5)';
  header.innerHTML=`

// ── Open in browser ──
function openInBrowser(url){
  const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
  if(!invoke){window.open(url,'_blank');return;}
  try{invoke('plugin:opener|open-url',{url});}catch{
    try{invoke('plugin:shell|open',{path:url});}catch{window.open(url,'_blank');}
  }
  // Show onboarding on first launch
  if(!hasSeenOnboarding()&&state.tab==='search'){
    setTimeout(showOnboarding, 700);
  }
  // Parse ALL emoji in app after each render
  requestAnimationFrame(()=>parseEmoji(document.getElementById('app')));
}

// ── Silent updater ──
async function runSilentInstall(url, fileName, version){
  document.getElementById('update-banner')?.remove();
  const overlay=document.createElement('div');
  overlay.id='install-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(7,7,16,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)';
  const box=document.createElement('div');
  box.style.cssText='background:var(--chain-bg,#0f0f1a);border:1px solid rgba(99,102,241,0.4);border-radius:16px;padding:28px 32px;width:340px;text-align:center';
  box.innerHTML=`
    <div style="font-size:32px;margin-bottom:14px">🔄</div>
    <div style="font-size:15px;font-weight:900;color:#e2e8f0;margin-bottom:6px">Установка обновления</div>
    <div id="inst-status" style="font-size:12px;color:#94a3b8;margin-bottom:18px">Скачиваю...</div>
    <div style="background:#1e1e2e;border-radius:999px;height:4px;overflow:hidden;margin-bottom:8px">
      <div id="inst-bar" style="background:linear-gradient(90deg,#4f46e5,#7c3aed);height:4px;width:0%;transition:width 0.4s;border-radius:999px"></div>
    </div>
    <div id="inst-pct" style="font-size:10px;color:#64748b;margin-bottom:16px">0%</div>
    <button id="inst-cancel" style="background:transparent;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:6px 16px;font-size:11px;cursor:pointer;font-family:inherit">Отмена</button>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  function setStatus(msg,color){
    const e=document.getElementById('inst-status');
    if(e){e.textContent=msg;if(color)e.style.color=color;}
  }
  function setProgress(pct){
    const b=document.getElementById('inst-bar');
    const p=document.getElementById('inst-pct');
    if(b)b.style.width=pct+'%';
    if(p)p.textContent=Math.round(pct)+'%';
  }

  document.getElementById('inst-cancel').onclick=()=>overlay.remove();

  const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
  if(!invoke){
    setStatus('Открываю в браузере...');setProgress(50);
    setTimeout(()=>{overlay.remove();openInBrowser(url);},800);
    return;
  }

  const ua=navigator.userAgent+navigator.platform;
  const platform=/Mac/.test(ua)?'mac':/Win/.test(ua)?'win':'linux';

  let prog=5;setProgress(prog);
  const timer=setInterval(()=>{
    if(prog<88){prog+=Math.random()*4;setProgress(Math.min(prog,88));}
  },350);

  try{
    const result=await invoke('download_and_install',{url,platform});
    clearInterval(timer);
    setProgress(100);

    if(result==='installed'){
      // Mac: тихая установка завершена — перезапускаем
      setStatus('✅ Готово! Перезапускаю...','#4ade80');
      setTimeout(async()=>{
        overlay.remove();
        try{await invoke('plugin:process|restart');}
        catch{try{await invoke('plugin:process|exit',{exitCode:0});}catch{}}
      },1500);
    } else {
      // Win/Linux: установщик запущен — принудительно закрываем
      setStatus('✅ Установщик запущен. Закрываю приложение...','#4ade80');
      setTimeout(async()=>{
        overlay.remove();
        // Принудительный выход — не сворачивание
        try{await invoke('plugin:process|exit',{exitCode:0});}
        catch{try{await invoke('plugin:process|restart');}catch{}}
      },2000);
    }
  }catch(e){
    clearInterval(timer);
    const msg=typeof e==='string'?e:(e?.message||String(e));
    setStatus('❌ '+msg.slice(0,120),'#fca5a5');
    setProgress(0);
    const btn=document.getElementById('inst-cancel');
    if(btn){
      btn.textContent='Скачать вручную ↗';
      btn.style.color='#c7d2fe';
      btn.onclick=()=>{overlay.remove();openInBrowser(url);};
    }
  }
}

// ── Dismiss update helpers ──
function dismissUpdate(version){
  try{localStorage.setItem('sc_dismissed_update',version);}catch{}
}
function isDismissedUpdate(version){
  try{return localStorage.getItem('sc_dismissed_update')===version;}catch{return false;}
}

// ── Check for updates ──
async function checkForUpdates(silent=false){
  const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
  if(!invoke){console.log('[Updater] no Tauri invoke');return;}
  try{
    const currentVersion=await invoke('get_version');
    console.log('[Updater] current:',currentVersion);
    const res=await fetch('https://api.github.com/repos/MihailKashintsev/searchcopy/releases/latest');
    if(!res.ok){console.log('[Updater] GitHub API error:',res.status);return;}
    const data=await res.json();
    const latest=data.tag_name?.replace('v','').trim();
    console.log('[Updater] latest:',latest,'dismissed:',isDismissedUpdate(latest));
    if(!latest||latest===currentVersion.trim()||isDismissedUpdate(latest))return;
    // Find asset — search by platform keywords, not just extension
    const ua=navigator.userAgent+navigator.platform;
    const isMac=/Mac/.test(ua);const isWin=/Win/.test(ua);
    const assets=data.assets||[];
    console.log('[Updater] assets:',assets.map(a=>a.name));
    let asset;
    if(isMac){
      asset=assets.find(a=>a.name.endsWith('.dmg'))||
            assets.find(a=>a.name.toLowerCase().includes('universal')&&a.name.endsWith('.dmg'))||
            assets.find(a=>a.name.toLowerCase().includes('mac'));
    } else if(isWin){
      asset=assets.find(a=>a.name.endsWith('.exe'))||
            assets.find(a=>a.name.toLowerCase().includes('setup'));
    } else {
      asset=assets.find(a=>a.name.endsWith('.AppImage'))||
            assets.find(a=>a.name.endsWith('.appimage'))||
            assets.find(a=>a.name.toLowerCase().includes('appimage'));
    }
    console.log('[Updater] chosen asset:',asset?.name);
    if(!asset){
      // Fallback: show banner with release page link
      showUpdateBanner(latest,data.html_url,'release page');
      return;
    }
    showUpdateBanner(latest,asset.browser_download_url,asset.name);
  }catch(e){console.log('[Updater] failed:',e);}
}

  const installBtn=document.createElement('button');
  installBtn.style.cssText='background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.5);color:#c7d2fe;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:inherit';
  installBtn.textContent=t.install;
  installBtn.onclick=()=>runSilentInstall(url,fileName,version);
  banner.innerHTML=`<div><div style="font-size:12px;font-weight:700;color:#e2e8f0">${t.updateBanner(version)}</div><div style="font-size:11px;color:#64748b;margin-top:2px">${t.updateBody}</div></div>`;
  banner.appendChild(installBtn);
  const close=document.createElement('button');
  close.style.cssText='background:transparent;border:none;color:#475569;cursor:pointer;padding:4px;font-size:14px;line-height:1';
  close.textContent='×';close.onclick=()=>{dismissUpdate(version);banner.remove();};
  banner.appendChild(close);
  document.body.appendChild(banner);
}

document.addEventListener("DOMContentLoaded",()=>{
  applyTheme();
  render();
  if(settings.autoUpdate!==false) checkForUpdates(true);
});
if(document.readyState!=="loading"){applyTheme();render();if(settings.autoUpdate!==false)checkForUpdates(true);}
</script>
