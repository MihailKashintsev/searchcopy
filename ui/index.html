<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SearchCopy — RENDERGAMES</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/twemoji.min.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070710;--bg2:rgba(20,18,35,0.98);--bg3:rgba(255,255,255,0.025);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e2e8f0;--text2:#64748b;--text3:#334155;--text4:#1e293b;
  --input-bg:rgba(12,12,22,0.98);--card-bg:rgba(12,12,22,0.92);--chain-bg:rgba(12,10,28,0.97);
  --formula-bg:rgba(14,165,233,0.1);--formula-border:rgba(14,165,233,0.3);--formula-color:#bae6fd;
  --code-bg:rgba(0,0,0,0.4);--code-border:rgba(255,255,255,0.07);--code-color:#93c5fd;
  --copy-bg:rgba(255,255,255,0.06);--copy-border:rgba(255,255,255,0.12);--copy-color:#64748b;
  --badge-bg:rgba(99,102,241,0.1);--badge-border:rgba(99,102,241,0.22);
  --seg-bg:rgba(0,0,0,0.2);--toggle-off-bg:rgba(255,255,255,0.04);--empty-color:#1e293b;
  --shadow:0 8px 40px rgba(0,0,0,0.4);--shadow-focus:0 0 0 2px rgba(99,102,241,0.4),0 24px 60px rgba(0,0,0,0.55);
}
.light{
  --bg:#f0f4ff;--bg2:#ffffff;--bg3:rgba(99,102,241,0.04);
  --border:rgba(99,102,241,0.12);--border2:rgba(99,102,241,0.2);
  --text:#0f172a;--text2:#374151;--text3:#6b7280;--text4:#d1d5db;
  --input-bg:#ffffff;--card-bg:#ffffff;--chain-bg:#f5f3ff;
  --formula-bg:rgba(14,165,233,0.07);--formula-border:rgba(14,165,233,0.25);--formula-color:#0369a1;
  --code-bg:rgba(99,102,241,0.06);--code-border:rgba(99,102,241,0.18);--code-color:#4338ca;
  --copy-bg:rgba(99,102,241,0.06);--copy-border:rgba(99,102,241,0.15);--copy-color:#6366f1;
  --badge-bg:rgba(99,102,241,0.08);--badge-border:rgba(99,102,241,0.18);
  --seg-bg:rgba(0,0,0,0.04);--toggle-off-bg:rgba(0,0,0,0.04);--empty-color:#9ca3af;
  --shadow:0 4px 24px rgba(99,102,241,0.1);--shadow-focus:0 0 0 3px rgba(99,102,241,0.15),0 8px 30px rgba(99,102,241,0.1);
}
body{min-height:100vh;background:var(--bg);font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;color:var(--text);overflow-x:hidden;transition:background 0.3s,color 0.3s}
input,button,textarea{font-family:inherit}button{cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.3);border-radius:4px}
input::placeholder,textarea::placeholder{color:var(--text3)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(99,102,241,0.2)}50%{box-shadow:0 0 22px rgba(99,102,241,0.55),0 0 40px rgba(99,102,241,0.15)}}
@keyframes glowPurple{0%,100%{box-shadow:0 0 8px rgba(168,85,247,0.2)}50%{box-shadow:0 0 22px rgba(168,85,247,0.6),0 0 40px rgba(168,85,247,0.15)}}
@keyframes glowGreen{0%,100%{box-shadow:0 0 6px rgba(52,211,153,0.2)}50%{box-shadow:0 0 18px rgba(52,211,153,0.5)}}
@keyframes pulseRing{0%{transform:scale(1);opacity:0.7}100%{transform:scale(1.6);opacity:0}}
@keyframes typewriter{from{width:0}to{width:100%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes dimPulse{0%,100%{opacity:0.35}50%{opacity:0.6}}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}60%{transform:translateY(-2px)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.6}100%{transform:scale(2.5);opacity:0}}
.anim-float{animation:floatY 3s ease-in-out infinite}
.anim-glow{animation:glow 2.5s ease-in-out infinite}
.anim-glow-purple{animation:glowPurple 2.5s ease-in-out infinite}
.ai-btn.no-key{opacity:0.38;cursor:not-allowed;animation:dimPulse 2.8s ease-in-out infinite;pointer-events:none}
.ai-btn.no-key:hover{background:var(--bg3)!important;border-color:var(--border)!important}
@keyframes bounceIn{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes ripple{0%{transform:scale(0);opacity:0.4}100%{transform:scale(2.5);opacity:0}}

/* Stagger children */
.stagger-list > *{animation:slideUp 0.22s ease both}
.stagger-list > *:nth-child(1){animation-delay:0.02s}
.stagger-list > *:nth-child(2){animation-delay:0.06s}
.stagger-list > *:nth-child(3){animation-delay:0.10s}
.stagger-list > *:nth-child(4){animation-delay:0.13s}
.stagger-list > *:nth-child(5){animation-delay:0.16s}
.stagger-list > *:nth-child(n+6){animation-delay:0.19s}

/* Collapsible section */
.section-wrap{margin-bottom:8px}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-radius:10px;cursor:pointer;
  user-select:none;transition:background 0.15s;
  background:var(--bg3);border:1px solid var(--border);
  margin-bottom:6px;
}
.section-header:hover{background:rgba(99,102,241,0.06);border-color:rgba(99,102,241,0.2)}
.section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);display:flex;align-items:center;gap:8px}
.section-badge{background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.2);color:#a5b4fc;border-radius:20px;padding:1px 8px;font-size:9px;font-weight:800}
.section-toggle{font-size:11px;color:var(--text3);transition:transform 0.25s cubic-bezier(.4,0,.2,1);display:inline-block}
.section-toggle.collapsed{transform:rotate(-90deg)}
.section-body{overflow:hidden;transition:max-height 0.32s cubic-bezier(.4,0,.2,1),opacity 0.25s ease}
.section-body.collapsed{max-height:0!important;opacity:0}

/* Card hover lift */
.result-card{transition:transform 0.18s cubic-bezier(.4,0,.2,1),box-shadow 0.18s ease,border-color 0.18s ease}
.result-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.25);border-color:rgba(99,102,241,0.3)}
.result-card:active{transform:translateY(0) scale(0.99)}
.light .result-card:hover{box-shadow:0 6px 24px rgba(99,102,241,0.12)}

/* AI card glow on hover */
.ai-card{transition:transform 0.18s cubic-bezier(.4,0,.2,1),box-shadow 0.18s ease,border-color 0.18s ease}
.ai-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(168,85,247,0.2);border-color:rgba(168,85,247,0.4)}
.ai-card:active{transform:translateY(0) scale(0.99)}

/* Section header press */
.section-header:active{transform:scale(0.99)}

/* Tab switch animation */
.tab-content-enter{animation:tabEnter 0.2s cubic-bezier(.4,0,.2,1) both}
@keyframes tabEnter{from{opacity:0;transform:translateY(6px) scale(0.99)}to{opacity:1;transform:none}}

/* Floating glow animation */
@keyframes floatGlow{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-18px)}}
.glow1{animation:floatGlow 8s ease-in-out infinite}
@keyframes floatGlow2{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.glow2{animation:floatGlow2 10s ease-in-out infinite}

/* Input focus ring */
@keyframes focusRing{from{box-shadow:0 0 0 0 rgba(99,102,241,0.4)}to{box-shadow:0 0 0 4px rgba(99,102,241,0.08)}}

/* Copy button success */
@keyframes copyPop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.copy-btn.copied{animation:copyPop 0.25s ease}

/* Badge pulse on new AI result */
@keyframes badgePulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px rgba(192,132,252,0.5)}}
.ai-result-new{animation:badgePulse 1s ease 2}

/* Step number bounce */
@keyframes stepBounce{0%{transform:scale(0.7);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.chain-step-num{animation:stepBounce 0.3s cubic-bezier(.4,0,.2,1) both}

/* Loading shimmer */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,rgba(99,102,241,0.08) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
.glow1{position:fixed;top:-250px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,rgba(79,70,229,0.13) 0%,transparent 65%);pointer-events:none;z-index:0}
.glow2{position:fixed;bottom:-150px;right:-80px;width:450px;height:350px;background:radial-gradient(ellipse,rgba(14,165,233,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}
.light .glow1{background:radial-gradient(ellipse,rgba(99,102,241,0.06) 0%,transparent 65%)}
.light .glow2{background:radial-gradient(ellipse,rgba(14,165,233,0.04) 0%,transparent 70%)}
.wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:40px 20px 100px}
.spinner{width:18px;height:18px;border:2px solid rgba(99,102,241,0.3);border-top-color:#818cf8;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}

/* ── Pill buttons (app filters) ── */
.pill{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;
  border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  cursor:pointer;transition:background 0.15s,border-color 0.15s,color 0.15s;
  white-space:nowrap;font-family:inherit;
}
.pill:hover{background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.3);color:#a5b4fc}
.pill.active{border-color:var(--pill-c,rgba(99,102,241,0.5));background:var(--pill-bg,rgba(99,102,241,0.15));color:var(--pill-color,#c7d2fe)}

/* ── Type filter chips ── */
.chip{
  border-radius:16px;padding:4px 12px;font-size:10px;font-weight:800;
  border:1px solid var(--border);background:var(--bg3);color:var(--text3);
  cursor:pointer;transition:background 0.15s,border-color 0.15s,color 0.15s;
  letter-spacing:0.3px;font-family:inherit;
}
.chip:hover{filter:brightness(1.15)}
.chip.active{background:var(--chip-bg,rgba(99,102,241,0.15));border-color:var(--chip-border,rgba(99,102,241,0.4));color:var(--chip-color,#c7d2fe)}

/* ── Tab buttons ── */
/* ── Sidebar ── */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:199;animation:fadeIn 0.2s ease}
.sidebar{position:fixed;top:0;left:0;height:100%;width:260px;background:var(--bg2);border-right:1px solid var(--border);z-index:200;display:flex;flex-direction:column;gap:0;box-shadow:4px 0 32px rgba(0,0,0,0.25);animation:slideFromLeft 0.25s cubic-bezier(.4,0,.2,1) both;overflow-y:auto;padding:0 0 24px}
@keyframes slideFromLeft{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-logo{font-size:15px;font-weight:900;color:var(--text);letter-spacing:0.5px}
.sidebar-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px 8px;border-radius:8px;transition:background 0.15s;font-family:inherit}
.sidebar-close:hover{background:var(--bg3);color:var(--text)}
.sidebar-section{padding:10px 10px 4px;font-size:9px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:1.8px}
.sidebar-btn{display:flex;align-items:center;gap:10px;width:100%;background:transparent;border:1px solid transparent;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:all 0.15s;font-family:inherit;text-align:left;margin:1px 8px;width:calc(100% - 16px)}
.sidebar-btn:hover{background:var(--bg3);color:var(--text)}
.sidebar-btn.active{background:rgba(99,102,241,0.12);border-color:rgba(99,102,241,0.25);color:#818cf8;font-weight:800}
.sidebar-btn .sb-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.menu-toggle-btn{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:8px 14px;font-size:12px;font-weight:800;color:var(--text2);cursor:pointer;font-family:inherit;transition:all 0.18s;margin-bottom:16px}
.menu-toggle-btn:hover{background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.2);color:var(--text)}
.tab-btn{
  flex:1;background:transparent;border:1px solid transparent;
  border-radius:10px;padding:9px;font-size:12px;font-weight:800;
  color:var(--text2);cursor:pointer;transition:background 0.18s,color 0.18s,border-color 0.18s;
  display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;
}
.tab-btn:hover{background:rgba(99,102,241,0.07);color:var(--text)}
.tab-btn.active{background:rgba(99,102,241,0.18);border-color:rgba(99,102,241,0.35);color:#c7d2fe}

/* ── Suggestion chips ── */
.sug{
  background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:5px 11px;font-size:11px;color:var(--text2);cursor:pointer;
  transition:background 0.15s,border-color 0.15s,color 0.15s;font-family:inherit;
}
.sug:hover{color:#a5b4fc;border-color:rgba(99,102,241,0.35);background:rgba(99,102,241,0.07)}

/* ── Copy button ── */
.copy-btn{
  background:var(--copy-bg);border:1px solid var(--copy-border);color:var(--copy-color);
  border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;font-weight:700;
  transition:background 0.15s,color 0.15s,border-color 0.15s;flex-shrink:0;font-family:inherit;
}
.copy-btn:hover{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.3);color:#c7d2fe}
.copy-btn.copied{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.4);color:#4ade80}

/* ── AI toggle button ── */
.ai-btn{
  border-radius:14px;padding:0 16px;height:44px;font-size:11px;font-weight:800;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
  display:flex;align-items:center;gap:6px;font-family:inherit;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
}
.ai-btn:hover{background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.35);color:#c084fc}
.ai-btn.active{background:rgba(168,85,247,0.18);border-color:rgba(168,85,247,0.5);color:#c084fc}

/* ── Light theme improvements ── */
.light body{background:#f0f4ff;color:#0f172a}
.light .pill{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1);color:#374151}
.light .pill:hover{background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.25);color:#4f46e5}
.light .pill.active{color:#4338ca}
.light .chip{background:rgba(0,0,0,0.05);color:#374151;border-color:rgba(0,0,0,0.12);font-weight:700}
.light .chip.active{color:#3730a3}
.light .tab-btn{color:#374151;font-weight:700}
.light .tab-btn:hover{background:rgba(99,102,241,0.08);color:#3730a3}
.light .tab-btn.active{background:rgba(99,102,241,0.12);border-color:rgba(99,102,241,0.3);color:#3730a3}
.light .sug{background:#fff;border-color:rgba(0,0,0,0.12);color:#374151}
.light .sug:hover{background:rgba(99,102,241,0.06);border-color:rgba(99,102,241,0.2);color:#4f46e5}
.light .copy-btn{background:rgba(99,102,241,0.06);border-color:rgba(99,102,241,0.18);color:#4338ca}
.light .copy-btn:hover{background:rgba(99,102,241,0.12);color:#3730a3}
.light .ai-btn{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.12);color:#374151}
.light .section-header{background:rgba(99,102,241,0.04);border-color:rgba(99,102,241,0.14)}
.light .section-title{color:#374151}
.light .section-badge{background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.2);color:#4338ca}
.light .section-toggle{color:#374151}
.light .result-card{border-color:rgba(0,0,0,0.1)!important;background:#fff!important}
.light .result-card p,.light .result-card div{color:#374151}
.light .ai-card{background:#fafbff!important;border-color:rgba(99,102,241,0.2)!important}
.light .spinner{border-color:rgba(99,102,241,0.2);border-top-color:#6366f1}
/* Light theme text fixes */
.light .result-card .section-title,.light [style*="color:var(--text2)"]{color:#374151!important}
.light [style*="color:var(--text3)"]{color:#6b7280!important}
.light [style*="color:#fcd34d"]{color:#b45309!important}
.light [style*="color:#c7d2fe"]{color:#4338ca!important}
.light [style*="color:#c084fc"]{color:#7c3aed!important}
.light [style*="color:#a5f3fc"]{color:#0e7490!important}
.light [style*="color:var(--code-color)"]{color:#3730a3!important}
.light [style*="color:var(--formula-color)"]{color:#0369a1!important}
.light [style*="color:#4ade80"]{color:#15803d!important}
.light [style*="background:var(--chain-bg)"]{background:#f5f3ff!important;border-color:rgba(99,102,241,0.25)!important}

/* ── Responsive ── */
@media(max-width:640px){
  .wrap{padding:20px 12px 80px!important}
  h1{font-size:clamp(26px,10vw,40px)!important;letter-spacing:-1px!important}
  .pill{font-size:10px!important;padding:4px 9px!important}
  .pill span{display:none}
  .chip{font-size:9px!important;padding:3px 9px!important}
  .tab-btn{font-size:11px!important;padding:7px 4px!important;gap:3px!important}
  .result-card,.ai-card{padding:11px 12px!important}
  .copy-btn{padding:4px 8px!important;font-size:10px!important}
  .ai-btn{padding:0 10px!important;font-size:10px!important;height:40px!important}
  #prog-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
  #prog-scroll::-webkit-scrollbar{display:none}
  #type-row{flex-wrap:nowrap!important;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
  #type-row::-webkit-scrollbar{display:none}
  #input-row{flex-wrap:wrap!important;gap:6px!important}
  #input-row .ai-btn{width:100%!important;justify-content:center!important}
  #ai-hint{font-size:10px!important}
  .section-header{padding:7px 10px!important}
  .section-title{font-size:9px!important}
  #update-banner{top:8px!important;right:8px!important;left:8px!important;padding:11px 14px!important}
}
@media(max-width:400px){
  .tab-btn{font-size:10px!important;padding:6px 2px!important}
  .result-card{flex-direction:column!important;gap:8px!important}
}

/* ── Onboarding ── */
.ob-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:600;display:flex;align-items:flex-end;justify-content:center}
.ob-sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:0 0 32px;box-shadow:0 -8px 48px rgba(0,0,0,0.4);animation:slideUp 0.35s cubic-bezier(.4,0,.2,1)}
.ob-header{position:sticky;top:0;background:var(--bg2);padding:20px 22px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:1}
.ob-card{margin:12px 16px 0;background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:18px;overflow:hidden;position:relative}

// ── Universal AI caller ──
async function callAI(sp, userMsg, maxTok){
  const provider = settings.aiProvider||'claude';
  const km={claude:settings.aiKey,giga:settings.gigaKey,openai:settings.openaiKey,
    gemini:settings.geminiKey,groq:settings.groqKey,deepseek:settings.deepseekKey,
    mistral:settings.mistralKey,yandex:settings.yandexKey,custom:settings.customKey};
  const key = km[provider]||'';
  if(!key && provider!=='giga') throw new Error('❌ Нет API ключа для '+provider);
  maxTok = maxTok||400;

  if(provider==='claude'){
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTok,system:sp,
        messages:[{role:'user',content:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'Claude error');
    return d.content?.[0]?.text||'';
  }

  if(provider==='giga'){
    const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
    if(!invoke) throw new Error('GigaChat доступен только в десктоп-приложении');
    const ak=key.startsWith('Basic ')?key.slice(6).trim():key;
    return await invoke('giga_search',{authKey:ak,systemPrompt:sp,query:userMsg});
  }

  if(provider==='openai'){
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'gpt-4o-mini',max_tokens:maxTok,
        messages:[{role:'system',content:sp},{role:'user',content:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'OpenAI error');
    return d.choices?.[0]?.message?.content||'';
  }

  if(provider==='gemini'){
    const model='gemini-2.0-flash-lite';
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{role:'user',parts:[{text:sp+'\n\n'+userMsg}]}],
        generationConfig:{maxOutputTokens:maxTok}})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'Gemini error');
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }

  if(provider==='groq'){
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'llama-3.1-8b-instant',max_tokens:maxTok,
        messages:[{role:'system',content:sp},{role:'user',content:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'Groq error');
    return d.choices?.[0]?.message?.content||'';
  }

  if(provider==='deepseek'){
    const r=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'deepseek-chat',max_tokens:maxTok,
        messages:[{role:'system',content:sp},{role:'user',content:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'DeepSeek error');
    return d.choices?.[0]?.message?.content||'';
  }

  if(provider==='mistral'){
    const r=await fetch('https://api.mistral.ai/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'mistral-small-latest',max_tokens:maxTok,
        messages:[{role:'system',content:sp},{role:'user',content:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'Mistral error');
    return d.choices?.[0]?.message?.content||'';
  }

  if(provider==='yandex'){
    const folder=settings.yandexFolder||'';
    const r=await fetch('https://llm.api.cloud.yandex.net/foundationModels/v1/completion',
      {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Api-Key '+key,
        'x-folder-id':folder},
      body:JSON.stringify({modelUri:`gpt://${folder}/yandexgpt-lite`,
        completionOptions:{maxTokens:maxTok,temperature:0.6},
        messages:[{role:'system',text:sp},{role:'user',text:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'YandexGPT error');
    return d.result?.alternatives?.[0]?.message?.text||'';
  }

  // custom (OpenAI-compatible)
  const url=(settings.customUrl||'').trim()||'https://api.openai.com/v1';
  const base=url.endsWith('/')?url.slice(0,-1):url;
  const r=await fetch(base+'/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:'gpt-4o-mini',max_tokens:maxTok,
      messages:[{role:'system',content:sp},{role:'user',content:userMsg}]})});
  const d=await r.json();
  if(d.error) throw new Error(d.error.message||'Custom API error');
  return d.choices?.[0]?.message?.content||'';
}
// ── Universal download helper ──
async function downloadPNG(canvas, fname){
  return new Promise(resolve=>{
    canvas.toBlob(async blob=>{
      if(!blob){ resolve(false); return; }
      // 1. Try Tauri v2 FS (desktop)
      try{
        const tauri = window.__TAURI__;
        if(tauri){
          const arr = await blob.arrayBuffer();
          const bytes = Array.from(new Uint8Array(arr));
          // Tauri v2
          if(tauri.fs?.writeBinaryFile){
            await tauri.fs.writeBinaryFile(fname+'.png', new Uint8Array(arr));
            resolve({path: fname+'.png', method:'tauri'}); return;
          }
          // Tauri v2 core path
          if(tauri.core?.invoke){
            const dlDir = await tauri.core.invoke('get_download_dir').catch(()=>null);
            if(dlDir){
              await tauri.path && (async()=>{})();
            }
          }
        }
      } catch(e){ /* fall through */ }
      // 2. Android share (Web Share API with files)
      try{
        if(navigator.canShare && navigator.canShare({files:[new File([blob],fname+'.png',{type:'image/png'})]})){
          await navigator.share({files:[new File([blob],fname+'.png',{type:'image/png'})], title:fname});
          resolve({path: fname+'.png', method:'share'}); return;
        }
      } catch(e){ /* user cancelled or not supported */ }
      // 3. Standard anchor download (works on Desktop + Android Chrome)
      try{
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fname+'.png';
        document.body.appendChild(a);
        a.click();
        setTimeout(()=>{ URL.revokeObjectURL(url); document.body.removeChild(a); }, 1500);
        resolve({path: fname+'.png', method:'blob'}); return;
      } catch(e){}
      // 4. Fallback: data URL (old WebView)
      const dataUrl = canvas.toDataURL('image/png');
      const a2 = document.createElement('a');
      a2.href = dataUrl; a2.download = fname+'.png';
      document.body.appendChild(a2); a2.click();
      setTimeout(()=>document.body.removeChild(a2), 500);
      resolve({path: fname+'.png', method:'dataurl'});
    }, 'image/png');
  });
}

  // Close btn
  const x = document.createElement('div');
  x.style.cssText='margin-left:8px;color:#64748b;cursor:pointer;font-size:16px;line-height:1';
  x.textContent='×'; x.onclick=()=>dismissToast();
  toast.appendChild(x);
  document.body.appendChild(toast);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    toast.style.transform='translateX(-50%) translateY(0)';
  }));
  function dismissToast(){
    toast.style.transform='translateX(-50%) translateY(80px)';
    toast.style.opacity='0';
    setTimeout(()=>toast.remove(), 400);
  }
  setTimeout(dismissToast, 4000);
}

function parseEmoji(el){
  if(!window.twemoji||!el) return;
  twemoji.parse(el,{folder:'svg',ext:'.svg'});
}

// "посчитать, скопировать и вставить" → [{action:"посчитать"},{action:"скопировать"},{action:"вставить"}]
const CHAIN_SPLITTERS=/[,;]|(?:\s+(?:и|и\s+ещ[её]|then|затем|после|потом|далее|and\s+then|after\s+that)\s+)/gi;
function detectChainQuery(q){
  const parts=q.split(CHAIN_SPLITTERS).map(s=>s.trim()).filter(s=>s.length>2);
  return parts.length>=2?parts:null;
}

// Найти лучшее вхождение для одного шага цепочки
function findStepItem(stepText, progs){
  let best=null,bestScore=0;
  for(const prog of progs){
    for(const item of DB[prog]||[]){
      const s=scoreItem(stepText,item);
      if(s>bestScore){bestScore=s;best={...item,program:prog,score:s};}
    }
  }
  return bestScore>0?best:null;
}

// Собрать цепочку из запроса
function buildActionChain(q,progs){
  const parts=detectChainQuery(q);
  if(!parts) return null;
  const steps=[];
  for(let i=0;i<parts.length;i++){
    const part=parts[i];
    const item=findStepItem(part,progs);
    steps.push({step:i+1,text:part,item});
  }
  // Показываем цепочку только если хотя бы половина шагов найдена
  const found=steps.filter(s=>s.item).length;
  if(found===0) return null;
  return steps;
}

// Найти шаблонную цепочку из столбцов Excel
function buildColumnChain(query,items){
  const cols=extractColumns(query);
  if(cols.length<2) return null;
  const base=items.find(i=>i.template&&!i.complex)||items[0];
  if(!base||!base.template) return null;
  return cols.map((col,i)=>({
    step:i+1,col,
    formula:base.template.replace(/\{col\}/g,col),
    desc:getDesc(base),program:base.program
  }));
}

function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function fixLayout(s){
  const ruChars='йцукенгшщзхъфывапролджэячсмитьбю';
  const enChars='qwertyuiop[]asdfghjkl;\'zxcvbnm,.';
  let r='';
  for(const c of s.toLowerCase()){
    const i=ruChars.indexOf(c);
    r+=i>=0?enChars[i]:c;
  }
  return r;
}

function expandQuery(q){
  const words=new Set([q]);
  words.add(fixLayout(q));
  const low=q.toLowerCase();
  for(const [key,syns] of Object.entries(SYNONYMS)){
    if(low.includes(key)){syns.forEach(s=>words.add(s));}
    for(const s of syns) if(low.includes(s)){words.add(key);syns.forEach(x=>words.add(x));}
  }
  return [...words];
}

function extractFormulaName(query){
  // Detect formula queries like "=ВПР(...)" or "=SUM(...)" or just "ВПР"
  const formulaMatch = query.match(/^=?([A-ZА-ЯЁ][A-ZА-ЯЁ0-9]*)/i);
  if(formulaMatch) return formulaMatch[1].toUpperCase();
  return null;
}

const FORMULA_MAP={
  'ВПР':'VLOOKUP','ВЛOOKUP':'VLOOKUP','СУММ':'SUM','СРЗНАЧ':'AVERAGE',
  'ЕСЛИ':'IF','СЧЁТЕСЛИ':'COUNTIF','СУММЕСЛИ':'SUMIF','ИНДЕКС':'INDEX',
  'ПОИСКПОЗ':'MATCH','ЕСЛИОШИБКА':'IFERROR','СЦЕПИТЬ':'CONCATENATE',
  'СЕГОДНЯ':'TODAY','ОКРУГЛ':'ROUND','СЖПРОБЕЛЫ':'TRIM','ДЛСТР':'LEN',
  'ТЕКСТ':'TEXT','СУММПРОИЗВ':'SUMPRODUCT','УНИКАЛЬНЫЕ':'UNIQUE',
  'МАКС':'MAX','МИН':'MIN','ЛЕВСИМВ':'LEFT','ПРАВСИМВ':'RIGHT','ПСТР':'MID',
};

function parseComplexFormula(query){
  // Detects queries like "Сумма столбца I и B", "сложить A и C", "средние столбцов D F"
  const q=query.toLowerCase().trim();
  const colMatch=q.match(/(?:столб(?:ца?|цов)?|column[s]?)\s+([a-zа-яёa-z,\s]+?)(?:\s+и\s+|\s*,\s*|\s+and\s+)([a-zа-яёa-z]+)/i);
  const opWords={
    'сумм':['сумм','сложить','total','сложи','итого','sum'],'среднее':['средн','average','avg','mean'],
    'количество':['количеств','счёт','сколько','count'],'максимум':['макс','maximum','max','наибольш'],
    'минимум':['миним','minimum','min','наименьш']
  };
  for(const [op,kws] of Object.entries(opWords)){
    for(const kw of kws){
      if(q.includes(kw)){
        // Extract column letters
        const cols=[...q.matchAll(/\b([a-zA-Z]{1,3})\b/g)]
          .map(m=>m[1].toUpperCase())
          .filter(l=>/^[A-Z]{1,3}$/.test(l)&&!/^(И|I|ИЛИ|ОТ|ДО|AND|OR|OF)$/i.test(l));
        if(cols.length>=2) return {op,cols};
        if(cols.length===1) return {op,cols};
        return {op,cols:[]};
      }
    }
  }
  return null;
}

function scoreItem(query,item){
  if(!query||query.trim().length<2) return 0;
  // Bonus: if query looks like a formula (=ВПР(...) or =SUM), match by name
  const fname = extractFormulaName(query.trim());
  if(fname){
    const mapped = FORMULA_MAP[fname]||fname;
    const keysStr = (typeof item.keys==='string'?item.keys:Object.values(item.keys||{}).join(' ')).toUpperCase();
    if(keysStr.includes(mapped)||keysStr.includes(fname)) return 20;
  }
  const q=query.toLowerCase().trim();
  const desc=getDesc(item).toLowerCase();
  const tags=getTags(item).join(' ').toLowerCase();
  const keysStr=(typeof item.keys==='string'?item.keys:Object.values(item.keys||{}).join(' ')).toLowerCase();
  const allText=desc+' '+tags+' '+keysStr;
  const expanded=expandQuery(q);
  let s=0;
  for(const eq of expanded){
    const e=eq.toLowerCase();
    if(allText.includes(e)) s+=e===q?10:6;
    else{
      const words=e.split(/\s+/);
      for(const w of words) if(w.length>2&&allText.includes(w)) s+=w===q?5:3;
    }
    for(const w of e.split(/\s+/)){
      if(w.length<3) continue;
      for(const word of allText.split(/\s+/)){
        if(word.length>2&&levenshtein(w,word)<=1) s+=2;
      }
    }
  }
  return s;
}

function doSearch(query,progs,typeFilter){
  if(query.trim().length<2) return [];
  // Handle complex formula queries first
  const complex=parseComplexFormula(query);
  if(complex&&(progs.includes('Excel')||typeFilter==='formula')){
    const colStr=complex.cols.length?complex.cols.join(':'): 'A:A';
    const opMap={
      'сумм':'SUM','среднее':'AVERAGE','количество':'COUNT',
      'максимум':'MAX','минимум':'MIN'
    };
    const fnName=opMap[complex.op]||'SUM';
    // Find the matching formula item and boost it massively
    const synth=complex.cols.length>=2
      ? `=${fnName}(${complex.cols.join(':')})` // range like =SUM(A:B)  
      : `=${fnName}(${colStr})`;
    // Mark synthetic result on the item
    const out=[];
    for(const prog of progs){
      for(const item of DB[prog]||[]){
        if(typeFilter!=='all'&&item.type!==typeFilter) continue;
        if(item.type==='formula'&&item.keys&&typeof item.keys==='string'&&item.keys.toUpperCase()===fnName){
          out.push({...item,_synth:synth,_synthCols:complex.cols,program:prog,score:50});
          continue;
        }
        const s=scoreItem(query,item);
        if(s>0) out.push({...item,program:prog,score:s});
      }
    }
    out.sort((a,b)=>b.score-a.score);
    return out.slice(0,16);
  }
  const out=[];
  for(const prog of progs){
    for(const item of DB[prog]||[]){
      if(typeFilter!=='all'&&item.type!==typeFilter) continue;
      const s=scoreItem(query,item);
      if(s>0) out.push({...item,program:prog,score:s});
    }
  }
  return out.sort((a,b)=>b.score-a.score).slice(0,16);
}

  function startHold(clientX, clientY){
    if(holdTimer) return;

    holdRing.innerHTML = `
      <svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}">

        <circle

        <circle class="hold-ring-fill"
          cx="${SIZE/2}" cy="${SIZE/2}" r="${R}"
          fill="none"
          stroke="url(#hg${SIZE})"
          stroke-width="3.5"
          stroke-linecap="round"
          stroke-dasharray="${circ}"
          transform="rotate(-90 ${SIZE/2} ${SIZE/2})"
          style="--full-circ:${circ}px"/>
        <defs>
          <linearGradient id="hg${SIZE}" x1="0%" y1="0%" x2="100%" y2="0%">

            <stop offset="100%" stop-color="#c084fc"/>
          </linearGradient>
        </defs>
      </svg>`;

    card.style.position = 'relative';
    card.appendChild(holdRing);
    card.classList.add('hold-card-active');

    // Kick off CSS transition on next paint
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        const arc = holdRing.querySelector('.hold-ring-fill');
        if(arc) arc.style.strokeDashoffset = '0';
      });
    });

    holdTimer = setTimeout(()=>{
      holdTimer = null;

  function cleanHold(){
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}

      const r=holdRing;
      setTimeout(()=>r.remove(),150);

    }
    card.style.borderColor='';
  }

  card.addEventListener('mousedown', e=>{
    if(e.button !== 0) return;

  });
  card.addEventListener('mouseup', ()=>{
    // Don't clean if picker already opened from this hold

    if(!holdTimer) return;

  },{passive:true});
  card.addEventListener('touchend', ()=>{

// ── GigaChat response parser (3 уровня fallback) ──
function parseAIResponse(rawText, query, activeProgs){
  try{
    const clean=rawText.replace(/```json|```/g,'').trim();
    const start=clean.indexOf('[');const end=clean.lastIndexOf(']');
    if(start<0||end<0) return [];
    const arr=JSON.parse(clean.slice(start,end+1));
    if(!Array.isArray(arr)) return [];
    return arr.filter(x=>x&&(x.keys||x.desc)).map(x=>({
      id:Date.now()+Math.random(),
      keys:x.keys||'',
      desc:{ru:x.desc||'',en:x.desc||''},
      example:x.example||'',
      type:x.type||(x.keys&&x.keys.startsWith('=')?'formula':'hotkey'),
      tags:{ru:[],en:[]},
      program:x.program||activeProgs,
      step:x.step,
      _ai:true
    }));
  }catch(e){ return []; }
}

function parseGigaResponse(text, query, activeProgs){
  // Шаг 1: чистим markdown-обёртку
  let clean = text
    .replace(/^```json\s*/i,'').replace(/\s*```$/,'')  // ```json ... ```
    .replace(/^```\s*/,'').replace(/\s*```$/,'')        // ``` ... ```
    .trim();

  // Шаг 2: пробуем распарсить как JSON массив
  const fb = clean.indexOf('[');
  const lb = clean.lastIndexOf(']');
  if(fb !== -1 && lb > fb){
    try{
      const arr = JSON.parse(clean.slice(fb, lb+1));
      if(Array.isArray(arr) && arr.length > 0){
        // Нормализуем поля — GigaChat может называть их по-другому
        return arr.map(item => ({
          keys:   item.keys   || item.shortcut || item.hotkey || item.key       || item.команда  || item.сочетание || '?',
          desc:   item.desc   || item.description || item.name || item.action   || item.описание || item.действие  || '',
          example:item.example|| item.use  || item.usage    || item.пример     || item.использование || '',
          program:item.program|| item.app  || item.software || item.приложение || activeProgs.split(',')[0].trim(),
        })).filter(i => i.keys && i.keys !== '?');
      }
    }catch(e){ console.log('[GigaChat] JSON parse failed:', e.message); }
  }

  // Шаг 3: GigaChat ответил обычным текстом — парсим строки
  // Форматы которые может выдать GigaChat:
  //   "Ctrl+C — копировать"
  //   "1. Ctrl+C - копировать"
  //   "- **Ctrl+C** — копировать"
  //   "Ctrl+C: копировать"
  const lines = clean.split('\n').map(l=>l.trim()).filter(l=>l.length>3);
  const items = [];
  const progName = activeProgs.split(',')[0].trim();

  for(const line of lines){
    // Убираем нумерацию и маркеры списка
    let l = line.replace(/^\d+[\.\)]\s*/,'').replace(/^[-•*]\s*/,'').replace(/\*\*/g,'').trim();
    if(!l) continue;

    // Ищем разделитель между клавишей и описанием
    // Разделители: " — ", " - ", ": ", " – "
    const sep = l.match(/^(.+?)\s*(?:—|–|-{1,2}|:)\s*(.+)$/);
    if(sep){
      const keyPart  = sep[1].trim();
      const descPart = sep[2].trim();
      // Клавиша обычно содержит +, буквы, цифры, Ctrl/Alt/Shift/Win/⌘/⌥/F1-F12
      const looksLikeKey = /Ctrl|Alt|Shift|Win|Cmd|⌘|⌥|F\d|[A-Z]\d?|\+/.test(keyPart)
                        || keyPart.length < 30;
      if(looksLikeKey && descPart.length > 1){
        items.push({ keys:keyPart, desc:descPart, example:'', program:progName });
        continue;
      }
    }

    // Формат "Формула: =SUM(A:A) — сумма столбца"
    const formulaMatch = l.match(/^(=\w+[^—\-:]*?)(?:\s*[—\-–:]\s*)(.+)$/);
    if(formulaMatch){
      items.push({ keys:formulaMatch[1].trim(), desc:formulaMatch[2].trim(), example:formulaMatch[1].trim(), program:progName });
    }
  }

  return items;
}

  const osHint=osKeyHint[lang][settings.os||'win'];

  // ── Пример JSON для цепочки ──
  const macChainEx='[{"step":1,"keys":"⌘+C","desc":"Копировать","example":"","program":"Excel"},{"step":2,"keys":"⌘+V","desc":"Вставить","example":"","program":"Excel"}]';
  const winChainEx='[{"step":1,"keys":"Ctrl+C","desc":"Копировать","example":"","program":"Excel"},{"step":2,"keys":"Ctrl+V","desc":"Вставить","example":"","program":"Excel"}]';
  const macEx='[{"keys":"⌘+C","desc":"Копировать","example":"","program":"Excel"}]';
  const winEx='[{"keys":"Ctrl+C","desc":"Копировать","example":"","program":"Excel"}]';
  const isMacOS=settings.os==='mac';
  const chainExample=tf==='chain'?(isMacOS?macChainEx:winChainEx):(isMacOS?macEx:winEx);

  // Промпт для Claude
  const claudePrompt=lang==='ru'
    ?`Ты эксперт по горячим клавишам, формулам и командам для десктопных приложений.
Приложения: ${activeProgs}. ОС пользователя: ${osName}.
${osHint}
${typeHint}
НЕ выдавай нерелевантные клавиши.
Формат ответа — ТОЛЬКО JSON массив без markdown. Пример: ${chainExample}
Поля каждого элемента: "keys", "desc", "example", "program"${tf==='chain'?', "step"':''}.
Максимум 8 элементов. Только JSON, без пояснений.`
    :`You are an expert in hotkeys, formulas and commands for desktop apps.
Apps: ${activeProgs}. User OS: ${osName}.
${osHint}
${typeHint}
Do NOT return irrelevant results.
Reply format — ONLY a JSON array, no markdown. Example: ${chainExample}
Fields per item: "keys", "desc", "example", "program"${tf==='chain'?', "step"':''}.
Maximum 8 items. JSON only, no explanations.`;

  // Промпт для GigaChat
  const gigaSystemPrompt=`Отвечай ТОЛЬКО валидным JSON массивом. Никакого текста до или после. Никакого markdown.
Формат: [{"keys":"...","desc":"...","example":"...","program":"..."}]
Приложения: ${activeProgs}. ОС пользователя: ${osName}.
${osHint}
${typeHint}`;
  const gigaUserPrompt=`Запрос: ${query}
${osHint}
Верни JSON массив из 3-6 элементов. ТОЛЬКО JSON.`;

  const systemPrompt=provider==='giga'?gigaSystemPrompt:claudePrompt;

  try{
    let items=[];

    if(provider==='claude'){
      console.log('[Claude] sending request...');
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':settings.aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5',max_tokens:1000,system:systemPrompt,messages:[{role:'user',content:query}]})
      });
      console.log('[Claude] response status:',res.status);
      if(!res.ok){
        const errText=await res.text();
        throw new Error('Claude API '+res.status+': '+errText.slice(0,300));
      }
      const data=await res.json();
      const rawText=data.content?.[0]?.text||'';
      console.log('[Claude raw response]',rawText);
      // Parse: strip markdown fences, find first [ to last ]
      let cr = rawText.replace(/```json/gi,'').replace(/```/g,'').trim();
      const fb = cr.indexOf('[');
      const lb = cr.lastIndexOf(']');
      if(fb === -1 || lb <= fb){
        throw new Error('Claude ответил без JSON. Ответ: ' + cr.slice(0,200));
      }
      try{ items = JSON.parse(cr.slice(fb, lb+1)); }
      catch(pe){ throw new Error('Claude JSON parse error: ' + pe.message + ' | ' + cr.slice(fb, fb+100)); }

    } else if(provider==='giga'){
      const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
      if(!invoke) throw new Error('GigaChat работает только в десктоп-приложении');
      const rawKey=settings.gigaKey.trim();
      const authKey=rawKey.startsWith('Basic ')?rawKey.slice(6).trim():rawKey;
      console.log('[GigaChat] invoke start, key length=',authKey.length);
      const text=await invoke('giga_search',{authKey,systemPrompt:gigaSystemPrompt,query:gigaUserPrompt});
      console.log('[GigaChat raw]',JSON.stringify(text));
      if(!text||text.trim()==='') throw new Error('GigaChat вернул пустой ответ');
      items = parseGigaResponse(text, query, activeProgs);
      console.log('[GigaChat parsed items]', items.length, items);
      if(items.length===0) throw new Error('GigaChat ответил, но данные не распознаны. Ответ: '+text.slice(0,200));
    }

    // Если фильтр "Цепочки" и AI вернул шаги — преобразуем в chain-формат
    if(tf==='chain' && items.some(i=>i.step!=null)){
      items.sort((a,b)=>(a.step||0)-(b.step||0));
      state.aiResult={items,query,provider,isChain:true};
    } else if(provider==='giga'){
      const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
      if(!invoke) throw new Error('GigaChat работает только в десктоп-приложении');
      const rawKey=settings.gigaKey.trim();
      const authKey=rawKey.startsWith('Basic ')?rawKey.slice(6).trim():rawKey;
      const text=await invoke('giga_search',{authKey,systemPrompt:gigaSystemPrompt,query:gigaUserPrompt});
      if(!text||text.trim()==='') throw new Error('GigaChat вернул пустой ответ');
      items=parseGigaResponse(text,query,activeProgs);
      if(items.length===0) throw new Error('GigaChat ответил, но данные не распознаны. Ответ: '+text.slice(0,200));

    } else if(provider==='openai'){
      const res=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.openaiKey},
        body:JSON.stringify({model:'gpt-4o-mini',max_tokens:1000,
          messages:[{role:'system',content:systemPrompt},{role:'user',content:query}]})
      });
      if(!res.ok) throw new Error('OpenAI '+res.status+': '+(await res.text()).slice(0,200));
      const d=await res.json();
      items=parseAIResponse(d.choices?.[0]?.message?.content||'',query,activeProgs);

    } else if(provider==='gemini'){
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${settings.geminiKey}`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:systemPrompt+'\n\n'+query}]}],generationConfig:{maxOutputTokens:1000}})
      });
      if(!res.ok) throw new Error('Gemini '+res.status+': '+(await res.text()).slice(0,200));
      const d=await res.json();
      items=parseAIResponse(d.candidates?.[0]?.content?.parts?.[0]?.text||'',query,activeProgs);

    } else if(provider==='groq'){
      const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.groqKey},
        body:JSON.stringify({model:'llama3-70b-8192',max_tokens:1000,
          messages:[{role:'system',content:systemPrompt},{role:'user',content:query}]})
      });
      if(!res.ok) throw new Error('Groq '+res.status+': '+(await res.text()).slice(0,200));
      const d=await res.json();
      items=parseAIResponse(d.choices?.[0]?.message?.content||'',query,activeProgs);

    } else if(provider==='custom'){
      const baseUrl=(settings.customUrl||'https://api.openai.com/v1').replace(/\/$/,'');
      const res=await fetch(baseUrl+'/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.customKey},
        body:JSON.stringify({model:'gpt-4o-mini',max_tokens:1000,
          messages:[{role:'system',content:systemPrompt},{role:'user',content:query}]})
      });
      if(!res.ok) throw new Error('Custom API '+res.status+': '+(await res.text()).slice(0,200));
      const d=await res.json();
      items=parseAIResponse(d.choices?.[0]?.message?.content||'',query,activeProgs);
    }

    // Handle chain format
    if(tf==='chain' && items.some(i=>i.step!=null)){
      items.sort((a,b)=>(a.step||0)-(b.step||0));
      state.aiResult={items,query,provider,isChain:true};
    } else {
      state.aiResult={items,query,provider};
    }
  }catch(e){
    const errMsg=typeof e==='string'?e:(e?.message||String(e));
    console.error('AI search error:',errMsg);
    state.aiResult={error:true,msg:'❌ '+errMsg};
  }
  state.aiLoading=false;
  renderResults();
}

      const latest=data.tag_name?.replace('v','').trim();
      if(latest&&latest!==cur.trim()){
        updBtn.innerHTML=`✨ ${settings.lang==='ru'?'Доступна v'+latest+'! Обновляю...':'v'+latest+' available! Updating...'}`;
        updBtn.style.color='#4ade80';updBtn.style.borderColor='rgba(52,211,153,0.4)';
        await checkForUpdates(false);
      } else {
        updBtn.innerHTML=`✅ ${settings.lang==='ru'?'У вас последняя версия v'+cur:'You have the latest v'+cur}`;
        updBtn.style.color='#4ade80';updBtn.style.borderColor='rgba(52,211,153,0.4)';
        setTimeout(()=>{updBtn.innerHTML=`🔄 ${settings.lang==='ru'?'Проверить обновления':'Check for updates'}`;updBtn.style.color='var(--text2)';updBtn.style.borderColor='var(--border)';updBtn.disabled=false;},3000);
        return;
      }
    }catch(e){
      updBtn.innerHTML=`❌ ${String(e.message||e).slice(0,60)}`;
      updBtn.style.color='#fca5a5';
      setTimeout(()=>{updBtn.innerHTML=`🔄 ${settings.lang==='ru'?'Проверить обновления':'Check for updates'}`;updBtn.style.color='var(--text2)';updBtn.disabled=false;},3000);
      return;
    }
    updBtn.disabled=false;
  };
  wrap.appendChild(updBtn);

  wrap.appendChild(el('div',"text-align:center;color:var(--text3);font-size:10px;margin-top:28px;padding-bottom:8px",t.footer));
  return wrap;
}

  textarea.placeholder=settings.lang==='ru'
    ?'Например: как быстро переключаться между вкладками? Какие горячие клавиши для работы с файлами?'
    :'E.g.: how to quickly switch between tabs? What are the hotkeys for working with files?';
  textarea.onfocus=()=>{textarea.style.borderColor='rgba(168,85,247,0.5)';textarea.style.boxShadow='0 0 0 3px rgba(168,85,247,0.08)'};

  if(!hasKeyAsk){askBtn.style.opacity='0.38';askBtn.style.cursor='not-allowed';askBtn.style.animation='dimPulse 2.8s ease-in-out infinite';askBtn.title=settings.lang==='ru'?'Нет API ключа — проверь ⚙ Настройки':'No API key — check ⚙ Settings';}
  else{askBtn.classList.add('anim-glow-purple');}
  askBtn.innerHTML=`<span>✦</span>${hasKeyAsk?(settings.lang==='ru'?'Спросить AI':'Ask AI'):(settings.lang==='ru'?'🔑 Нет ключа — Настройки':'🔑 No key — Settings')}`;
  askBtn.onmouseover=()=>askBtn.style.background='linear-gradient(135deg,rgba(168,85,247,0.3),rgba(99,102,241,0.3))';
  askBtn.onmouseout=()=>askBtn.style.background='linear-gradient(135deg,rgba(168,85,247,0.2),rgba(99,102,241,0.2))';

    const question=textarea.value.trim();

    const provider=settings.aiProvider||'claude';
    const keyMap={claude:settings.aiKey,giga:settings.gigaKey,openai:settings.openaiKey,gemini:settings.geminiKey,groq:settings.groqKey,custom:settings.customKey};
  const hasKey=!!(keyMap[provider]);
    if(!hasKey){
      resultArea.innerHTML=`<div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:14px;color:#fca5a5;font-size:12px">${settings.lang==='ru'?'❌ Нет API ключа. Проверь ⚙ Настройки.':'❌ No API key. Check ⚙ Settings.'}</div>`;
      return;
    }
    // Show loading
    askBtn.innerHTML=`<div class="spinner"></div>${settings.lang==='ru'?'Думаю...':'Thinking...'}`;
    askBtn.disabled=true;
    resultArea.innerHTML=`<div style="display:flex;flex-direction:column;gap:6px">${[1,2,3].map(()=>'<div class="skeleton" style="height:52px;border-radius:12px"></div>').join('')}</div>`;

    const osName=askOS==='mac'?'macOS':askOS==='linux'?'Linux':'Windows';
    const osKeyInstr=askOS==='mac'
      ?'Use Command instead of Ctrl, Option instead of Alt, Shift stays. Example: "Command+C".'

      :'Use Ctrl, Alt, Shift, Win. Example: "Ctrl+C".';

    const sysPrompt=settings.lang==='ru'
      ?`Ты эксперт по приложению ${askApp} на ${osName}. Отвечай ТОЛЬКО на вопросы про ${askApp} — горячие клавиши, функции, настройки, работу с интерфейсом. Если вопрос не про ${askApp} — скажи: «Я отвечаю только на вопросы про ${askApp}». ${osKeyInstr} Горячие клавиши пиши прямо в тексте в скобках: (Command+C). Обычный текст на русском, максимум 4-5 предложений. ЗАПРЕЩЕНО: JSON, [], {}, код, markdown, обратные кавычки.`
      :`You are an expert on ${askApp} for ${osName}. Answer ONLY questions about ${askApp} — shortcuts, features, settings, interface. If the question is unrelated to ${askApp} — say: "I only answer questions about ${askApp}." ${osKeyInstr} Write hotkeys inline: (Command+C). Plain text only, max 4-5 sentences. FORBIDDEN: JSON, [], {}, code, markdown, backticks.`;

    try{
      let rawText='';
      if(provider==='claude'){
        const res=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':settings.aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
          body:JSON.stringify({model:'claude-haiku-4-5',max_tokens:1200,system:sysPrompt,messages:[{role:'user',content:question}]})
        });
        if(!res.ok)throw new Error('Claude API '+res.status);
        const data=await res.json();
        rawText=data.content?.[0]?.text||'';
      } else {
        const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
        if(!invoke)throw new Error('GigaChat только в десктоп-приложении');
        const authKey=settings.gigaKey.startsWith('Basic ')?settings.gigaKey.slice(6).trim():settings.gigaKey;
        rawText=await invoke('giga_search',{authKey,systemPrompt:sysPrompt,query:question});
      }

      // Always render as plain text — no JSON parsing
      // Strip any JSON/code artifacts AI might still produce
      let cleanText = rawText
        .replace(/```[\s\S]*?```/g, '')   // remove code blocks
        .replace(/`[^`]+`/g, m => m.slice(1,-1)) // strip backticks
        .replace(/^\s*[\[\{][\s\S]*?[\]\}]\s*$/gm, '') // remove standalone JSON lines
        .trim();

      resultArea.innerHTML='';
      const box=el('div',"background:var(--card-bg);border:1px solid rgba(168,85,247,0.2);border-radius:14px;padding:18px;animation:fadeUp 0.3s ease");
      const badge=el('div',"display:inline-flex;align-items:center;gap:6px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);border-radius:20px;padding:3px 10px;font-size:10px;color:#c084fc;font-weight:800;margin-bottom:12px");
      badge.innerHTML=`✦ ${provider==='giga'?'GigaChat':'Claude'} · ${askApp} · ${osName}`;
      const text=el('div',"font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap");
      text.textContent=cleanText;
      box.appendChild(badge);box.appendChild(text);
      resultArea.appendChild(box);
    }catch(e){
      const msg=typeof e==='string'?e:(e?.message||String(e));
      resultArea.innerHTML=`<div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:14px;color:#fca5a5;font-size:12px">❌ ${msg.slice(0,200)}</div>`;
    }
    askBtn.innerHTML=`<span>✦</span>${settings.lang==='ru'?'Спросить AI':'Ask AI'}`;
    askBtn.disabled=false;
  };

  // Enter in textarea = submit (Shift+Enter = newline)
  textarea.onkeydown=e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();askBtn.click();}
  };

  return wrap;
}

const QUIZ_Q_COUNT = 10;
const QUIZ_PERIOD_MS = 11 * 3600 * 1000;

function getQuizSeed(){
  return Math.floor(Date.now() / QUIZ_PERIOD_MS);
}
function msToNextQuiz(){
  const now = Date.now();
  return QUIZ_PERIOD_MS - (now % QUIZ_PERIOD_MS);
}
function fmtCountdown(ms){
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// Seeded PRNG — mulberry32
function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, rng){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(rng()*( i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildDailyQuestions(seed){
  const allHotkeys = Object.entries(DB).flatMap(([app,items])=>
    items.filter(x=>x.type==='hotkey').map(x=>({...x,app})));
  const rng = mulberry32(seed);
  const shuffled = seededShuffle(allHotkeys, rng);
  return shuffled.slice(0, QUIZ_Q_COUNT).map(item => {
    const correct = getOsKeyQ(item);
    const others = seededShuffle(
      allHotkeys.filter(x=>getOsKeyQ(x)!==correct), rng
    ).slice(0,3).map(x=>getOsKeyQ(x));
    const opts = seededShuffle([correct,...others], rng);
    return {item, correct, opts};
  });
}

function getOsKeyQ(item){
  const os = settings.os||'win';
  if(typeof item.keys==='object') return item.keys[os]||item.keys.win||item.keys.mac||'?';
  return item.keys||'?';
}

// Stats storage
function getStats(){
  try{ return Object.assign(
    {totalQuizzes:0,totalCorrect:0,totalQ:0,bestScore:0,superStreak:0,
     lastPerfectSeed:-1,nickname:'',lastCompletedSeed:-1},
    JSON.parse(localStorage.getItem('sc_stats_v1')||'{}')
  ); }catch{ return {totalQuizzes:0,totalCorrect:0,totalQ:0,bestScore:0,superStreak:0,lastPerfectSeed:-1,nickname:'',lastCompletedSeed:-1}; }
}
function saveStats(s){ localStorage.setItem('sc_stats_v1', JSON.stringify(s)); }

// Daily quiz save/load
function getDailyRecord(){
  try{ return JSON.parse(localStorage.getItem('sc_daily_record')||'null'); }catch{ return null; }
}
function saveDailyRecord(r){ localStorage.setItem('sc_daily_record', JSON.stringify(r)); }

function finishQuiz(correct, perfect, answers, seed, ru, stats, wrap){
  // Save record
  const record = {seed, correct, total:QUIZ_Q_COUNT, perfect, ts:Date.now()};
  saveDailyRecord(record);

  // Update stats
  const s = getStats();
  s.totalQuizzes++;
  s.totalCorrect += correct;
  s.totalQ += QUIZ_Q_COUNT;
  s.bestScore = Math.max(s.bestScore, correct);
  if(perfect){
    s.superStreak = (s.lastPerfectSeed === seed-1) ? s.superStreak+1 : 1;
  } else {
    s.superStreak = 0;
  }
  if(perfect) s.lastPerfectSeed = seed;
  s.lastCompletedSeed = seed;
  saveStats(s);

  // Re-render done screen
  wrap.innerHTML = '';
  renderDoneScreen(wrap, record, s, seed, ru);
}

  function drawResultCard(ctx, W, H, nick){
    const dark = !document.documentElement.classList.contains('light');
    const accentColor = perfect?'#fbbf24':pct>=80?'#34d399':'#818cf8';
    // BG
    const bg = ctx.createLinearGradient(0,0,W,H);
    if(dark){bg.addColorStop(0,'#0d0e1a');bg.addColorStop(1,'#111322');}
    else{bg.addColorStop(0,'#f4f6ff');bg.addColorStop(1,'#eaedff');}
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    // Grid
    ctx.strokeStyle=dark?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.02)';ctx.lineWidth=1;
    for(let gx=0;gx<W;gx+=32){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
    for(let gy=0;gy<H;gy+=32){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
    // Glow
    const grd=ctx.createRadialGradient(W/2,H*0.35,0,W/2,H*0.35,W*0.6);
    grd.addColorStop(0,accentColor+'28');grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
    // Top border
    const topG=ctx.createLinearGradient(0,0,W,0);
    topG.addColorStop(0,'transparent');topG.addColorStop(0.3,accentColor+'cc');topG.addColorStop(0.7,accentColor+'cc');topG.addColorStop(1,'transparent');
    ctx.fillStyle=topG;ctx.fillRect(0,0,W,3);
    // Trophy emoji
    ctx.font='52px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(perfect?'🏆':pct>=80?'🎯':'⭐',W/2,60);
    // Score big
    ctx.font='bold 56px system-ui,-apple-system,sans-serif';
    ctx.fillStyle=accentColor;ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.fillText(`${correct}/${total}`,W/2,150);
    // Pct
    ctx.font='24px system-ui,-apple-system,sans-serif';
    ctx.fillStyle=dark?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.4)';
    ctx.fillText(`${pct}% · ${ru?'Ежедневная викторина':'Daily Quiz'} #${record.seed}`,W/2,182);
    // Nick
    if(nick){
      ctx.font='bold 18px system-ui,-apple-system,sans-serif';
      ctx.fillStyle=dark?'rgba(255,255,255,0.7)':'rgba(0,0,0,0.6)';
      ctx.fillText('@'+nick, W/2, 212);
    }
    // Superstreak badge
    if(stats.superStreak>0){
      const badgeW=180,badgeH=34;const bx=(W-badgeW)/2,by=228;
      ctx.fillStyle=accentColor+'20';
      roundRect2(ctx,bx,by,badgeW,badgeH,17);ctx.fill();
      ctx.strokeStyle=accentColor+'55';ctx.lineWidth=1.5;
      roundRect2(ctx,bx,by,badgeW,badgeH,17);ctx.stroke();
      ctx.font='bold 13px system-ui,-apple-system,sans-serif';
      ctx.fillStyle=accentColor;
      ctx.fillText(`💪 ${ru?'Суперсерия':'Superstreak'}: ${stats.superStreak}`,W/2,by+22);
    }
    // Stats row
    const statY=280;
    [['🏆',stats.bestScore+'/'+total,ru?'Рекорд':'Best'],['🔥',stats.totalQuizzes,ru?'Пройдено':'Done'],['🎯',stats.totalQ>0?Math.round(stats.totalCorrect/stats.totalQ*100)+'%':'—',ru?'Точность':'Acc']].forEach(([icon,val,label],i)=>{
      const sx=80+i*(W-160)/2;
      ctx.fillStyle=dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.04)';
      roundRect2(ctx,sx-40,statY,80,54,10);ctx.fill();
      ctx.font='bold 18px system-ui,-apple-system,sans-serif';
      ctx.fillStyle=dark?'#f1f5f9':'#0f172a';
      ctx.fillText(String(val),sx,statY+26);
      ctx.font='10px system-ui,-apple-system,sans-serif';
      ctx.fillStyle=dark?'#64748b':'#94a3b8';
      ctx.fillText(icon+' '+label,sx,statY+44);
    });
    // Footer
    ctx.font='bold 11px system-ui,-apple-system,sans-serif';
    ctx.fillStyle=dark?'rgba(255,255,255,0.25)':'rgba(0,0,0,0.25)';
    ctx.fillText('SearchCopy · RENDERGAMES',W/2,H-16);
    ctx.font='10px system-ui,-apple-system,sans-serif';
    ctx.fillStyle=dark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.12)';
    ctx.fillText('rendergames.tilda.ws · @rendergm',W/2,H-4);
  }

  function roundRect2(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

  function updateCard(){

// ── Modal builder helper ──
function buildModal(title){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease';
  const sheet=document.createElement('div');
  sheet.style.cssText='background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:20px;box-sizing:border-box;animation:slideUp 0.25s cubic-bezier(.4,0,.2,1)';
  if(!document.querySelector('style[data-modal]')){
    const st=document.createElement('style');st.dataset.modal='1';
    st.textContent='@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}';
    document.head.appendChild(st);
  }
  if(title){
    const h=document.createElement('div');h.style.cssText='font-size:16px;font-weight:900;color:var(--text);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between';
    h.innerHTML=`<span>${title}</span>`;
    const cl=document.createElement('button');cl.style.cssText='background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:8px;font-family:inherit';cl.textContent='✕';
    cl.onclick=()=>overlay.remove();h.appendChild(cl);sheet.appendChild(h);
  }
  const content=document.createElement('div');
  sheet.appendChild(content);overlay.appendChild(sheet);
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
  return {content, close:()=>overlay.remove()};
}

    btn.innerHTML=`<div style="font-size:13px;font-weight:800;color:${exportFmt===val?'#818cf8':'var(--text)'}">${label}</div><div style="font-size:10px;color:var(--text3);margin-top:2px">${hint}</div>`;
    btn.dataset.fmt=val;

        const active=b.dataset.fmt===val;

  // ── Tags toggle (only shown for favorites preset) ──
  const tagsToggleRow=document.createElement('div');
  tagsToggleRow.style.cssText='display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:12px;transition:opacity 0.2s';
  tagsToggleRow.id='tags-toggle-row';
  const tagsLabel=document.createElement('div');
  tagsLabel.innerHTML=`<div style="font-size:12px;font-weight:800;color:var(--text)">${ru?'Показывать теги реакций':'Show reaction tags'}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${ru?'Эмодзи у каждой карточки в шпаргалке':'Emoji badge per item in cheat sheet'}</div>`;
  const tagsSwitch=document.createElement('button');
  function updateTagsSwitch(){
    tagsSwitch.style.cssText=`width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;transition:background 0.2s;position:relative;flex-shrink:0;background:${exportShowTags?'#6366f1':'rgba(148,163,184,0.2)'}`;
    tagsSwitch.innerHTML=`<span style="position:absolute;top:3px;left:${exportShowTags?'23px':'3px'};width:18px;height:18px;border-radius:50%;background:#fff;transition:left 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></span>`;
  }
  updateTagsSwitch();

  tagsToggleRow.appendChild(tagsLabel);
  tagsToggleRow.appendChild(tagsSwitch);
  wrap.appendChild(tagsToggleRow);

  syncTagsToggleVisibility();

  // Preview canvas
  const previewWrap=document.createElement('div');

  const canvas=document.createElement('canvas');
  canvas.style.cssText='width:100%;display:block';
  previewWrap.appendChild(canvas);
  wrap.appendChild(previewWrap);

  // Export button
  const exportBtn=document.createElement('button');
  exportBtn.style.cssText='width:100%;background:linear-gradient(135deg,rgba(52,211,153,0.2),rgba(14,165,233,0.15));border:1px solid rgba(52,211,153,0.4);color:#34d399;border-radius:12px;padding:12px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.2s;animation:glowGreen 3s ease-in-out infinite';
  exportBtn.textContent=ru?'⬇ Скачать шпаргалку':'⬇ Download cheat sheet';
  wrap.appendChild(exportBtn);

  function getExportItems(){
    let items;
    if(exportPreset==='favorites'){
      // Use ANY item with any reaction (not just ⭐)
      const reactions=getReactions();
      const allItems=Object.values(DB).flat();
      items=allItems.filter(x=>getItemReactions(x.id).length>0);
      if(exportType!=='all')items=items.filter(x=>x.type===exportType);
    } else {
      items=DB[exportApp]||[];
      if(exportType!=='all')items=items.filter(x=>x.type===exportType);
    }
    return items;
  }

  function drawCard(ctx,W,H,items){
    const DPR=2;// rendered at 2x then scaled down = crisp
    const dark=!document.documentElement.classList.contains('light');
    const appColor=(exportPreset==='favorites'?'#fbbf24':COLORS[exportApp])||'#6366f1';
    const PAD=40;
    // Background gradient
    const bg=ctx.createLinearGradient(0,0,W,H);
    if(dark){bg.addColorStop(0,'#0d0e1a');bg.addColorStop(0.5,'#111322');bg.addColorStop(1,'#0a0c18');}
    else{bg.addColorStop(0,'#f4f6ff');bg.addColorStop(1,'#eaedff');}
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    // Subtle grid pattern
    ctx.strokeStyle=dark?'rgba(255,255,255,0.025)':'rgba(0,0,0,0.025)';
    ctx.lineWidth=1;
    for(let gx=0;gx<W;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
    for(let gy=0;gy<H;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
    // Accent glow top-left
    const grd=ctx.createRadialGradient(80,80,0,80,80,200);
    grd.addColorStop(0,appColor+'30');grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,Math.min(H,300));
    // Top border accent
    const topGrad=ctx.createLinearGradient(0,0,W,0);
    topGrad.addColorStop(0,'transparent');topGrad.addColorStop(0.3,appColor+'cc');topGrad.addColorStop(0.7,appColor+'cc');topGrad.addColorStop(1,'transparent');
    ctx.fillStyle=topGrad;ctx.fillRect(0,0,W,3);
    // Header section
    ctx.fillStyle=dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.04)';
    roundRect(ctx,PAD-10,PAD-10,W-PAD*2+20,68,14);ctx.fill();
    // App icon pill
    ctx.fillStyle=appColor+'22';
    roundRect(ctx,PAD,PAD,36,36,10);ctx.fill();
    ctx.strokeStyle=appColor+'55';ctx.lineWidth=1.5;roundRect(ctx,PAD,PAD,36,36,10);ctx.stroke();
    ctx.font='bold 18px system-ui,-apple-system,sans-serif';
    ctx.fillStyle=appColor;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ICONS[exportApp]||'◉',PAD+18,PAD+18);
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    // Title
    ctx.font='bold 22px system-ui,-apple-system,sans-serif';
    ctx.fillStyle=dark?'#f1f5f9':'#0f172a';
    const title=exportPreset==='favorites'?(ru?'★ Избранное':'★ Favorites'):exportApp;
    ctx.fillText(title,PAD+46,PAD+20);
    ctx.font='13px system-ui,-apple-system,sans-serif';
    ctx.fillStyle=dark?'#64748b':'#94a3b8';
    const osName=settings.os==='mac'?'macOS':settings.os==='linux'?'Linux':'Windows';
    const typeLabel=exportType==='formula'?(ru?'Формулы':'Formulas'):(exportType==='all'?(ru?'Все':'All'):(ru?'Горячие клавиши':'Shortcuts'));
    ctx.fillText(typeLabel+' · '+osName,PAD+46,PAD+40);
    // Divider
    ctx.strokeStyle=dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD,PAD+60);ctx.lineTo(W-PAD,PAD+60);ctx.stroke();
    // Items grid
    const maxItems=Math.min(items.length,18);
    const COLS=2;const ITEM_H=50;const ITEM_W=(W-PAD*2-10)/COLS;
    const startY=PAD+74;
    for(let i=0;i<maxItems;i++){
      const item=items[i];const col=i%COLS;const row=Math.floor(i/COLS);
      const x=PAD+col*(ITEM_W+10);const y=startY+row*ITEM_H;
      // Card background
      ctx.fillStyle=dark?'rgba(255,255,255,0.04)':'rgba(255,255,255,0.8)';
      roundRect(ctx,x,y,ITEM_W,ITEM_H-6,10);ctx.fill();
      ctx.strokeStyle=dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.08)';ctx.lineWidth=1;
      roundRect(ctx,x,y,ITEM_W,ITEM_H-6,10);ctx.stroke();
      // Left accent bar
      ctx.fillStyle=appColor+'99';roundRect(ctx,x,y,3,ITEM_H-6,2);ctx.fill();
      // Key badge — hotkey or formula
      const isFormula=item.type==='formula';
      const formulaColor='#34d399';
      const badgeColor=isFormula?formulaColor:appColor;
      const rawKeys=getKeys(item);
      const keysText=isFormula?(item.example||'='+rawKeys).slice(0,22):rawKeys.slice(0,20);
      ctx.font='bold 11px ui-monospace,monospace';
      const kw=Math.min(ctx.measureText(keysText).width, ITEM_W-30);
      ctx.fillStyle=badgeColor+'25';roundRect(ctx,x+10,y+7,kw+16,20,6);ctx.fill();
      ctx.strokeStyle=badgeColor+'44';ctx.lineWidth=1;roundRect(ctx,x+10,y+7,kw+16,20,6);ctx.stroke();
      // type micro-label for formulas
      if(isFormula){
        ctx.font='700 8px system-ui,sans-serif';
        ctx.fillStyle=formulaColor+'99';
        ctx.fillText('fx',x+10,y+8);
      }
      ctx.font='bold 11px ui-monospace,monospace';
      ctx.fillStyle=badgeColor;
      // clip text to badge width
      ctx.save();ctx.beginPath();ctx.rect(x+10,y+4,kw+16,22);ctx.clip();
      ctx.fillText(keysText,x+18,y+21);
      ctx.restore();
      // Description
      ctx.font='11px system-ui,-apple-system,sans-serif';
      ctx.fillStyle=dark?'#94a3b8':'#475569';
      const descMaxW=ITEM_W-20-(exportPreset==='favorites'&&exportShowTags&&getItemReactions(item.id).length?30:0);
      const descStr=(item.desc?.[settings.lang]||item.desc?.ru||'');
      // truncate desc to fit
      let descTxt=descStr;
      while(descTxt.length>0&&ctx.measureText(descTxt).width>descMaxW)descTxt=descTxt.slice(0,-1);
      if(descTxt.length<descStr.length)descTxt=descTxt.slice(0,-1)+'…';
      ctx.fillText(descTxt,x+10,y+38);
      // Reaction tag badge (favorites only)
      if(exportPreset==='favorites'&&exportShowTags){
        const reactions=getItemReactions(item.id);
        if(reactions.length){
          const tagEmoji=reactions[0];
          // Small pill at top-right of card
          const pillW=22, pillH=18;
          const px=x+ITEM_W-pillW-6, py=y+6;
          ctx.fillStyle=dark?'rgba(99,102,241,0.25)':'rgba(99,102,241,0.12)';
          roundRect(ctx,px,py,pillW,pillH,6);ctx.fill();
          ctx.strokeStyle=dark?'rgba(99,102,241,0.4)':'rgba(99,102,241,0.25)';
          ctx.lineWidth=1;roundRect(ctx,px,py,pillW,pillH,6);ctx.stroke();
          ctx.font='11px system-ui,-apple-system,sans-serif';
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillStyle=dark?'#fff':'#000';
          ctx.fillText(tagEmoji,px+pillW/2,py+pillH/2);
          ctx.textAlign='left';ctx.textBaseline='alphabetic';
        }
      }
    }
    // Footer
    const footY=startY+Math.ceil(maxItems/COLS)*ITEM_H+12;
    ctx.strokeStyle=dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD,footY);ctx.lineTo(W-PAD,footY);ctx.stroke();
    // Logo text
    ctx.font='bold 12px system-ui,-apple-system,sans-serif';
    ctx.fillStyle=dark?'rgba(255,255,255,0.35)':'rgba(0,0,0,0.3)';
    ctx.fillText('SearchCopy',PAD,footY+18);
    ctx.font='12px system-ui,-apple-system,sans-serif';
    ctx.fillStyle=dark?'rgba(255,255,255,0.18)':'rgba(0,0,0,0.18)';
    ctx.fillText(' by RENDERGAMES · 2026',PAD+ctx.measureText('SearchCopy').width+1,footY+18);
    ctx.font='10px system-ui,-apple-system,sans-serif';
    ctx.fillStyle=dark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.12)';
    ctx.textAlign='right';
    ctx.fillText('rendergames.tilda.ws · @rendergm',W-PAD,footY+18);
    ctx.textAlign='left';
  }

  function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

  function updatePreview(){
    const items=getExportItems();
    const rows=Math.ceil(Math.min(items.length,18)/2);
    const W=600;const H=40+74+rows*50+50;
    const DPR=window.devicePixelRatio||2;
    canvas.width=W*DPR;canvas.height=H*DPR;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    const ctx=canvas.getContext('2d');
    ctx.scale(DPR,DPR);
    drawCard(ctx,W,H,items);
  }

  exportBtn.onclick=async()=>{
    const items=getExportItems();
    const rows=Math.ceil(Math.min(items.length,16)/2);
    const W=600;const H=40+74+rows*50+50;
    const DPR=3;// 3x for ultra-crisp export
    const offscreen=document.createElement('canvas');
    offscreen.width=W*DPR;offscreen.height=H*DPR;
    const ctx=offscreen.getContext('2d');
    ctx.scale(DPR,DPR);
    drawCard(ctx,W,H,items);
    const fname=`SearchCopy_${exportApp.replace(/\s/g,'_')}_${settings.os||'win'}`;
    if(exportFmt==='png'){
      const result=await downloadPNG(offscreen,fname);
      if(result) showDownloadToast(fname, result.method);
    } else {
      // PDF via print-ready HTML in new window
      const dataURL=offscreen.toDataURL('image/png');
      const win2=window.open('','_blank');
      if(win2){
        win2.document.write(`<html><head><title>${fname}</title><style>body{margin:0;background:#fff}img{width:100%;max-width:600px;display:block;margin:0 auto}@media print{body{margin:0}}</style></head><body><img src="${dataURL}"><script>window.onload=()=>{window.print();}<\/script></body></html>`);
        win2.document.close();
      }
    }
    // Flash button
    exportBtn.style.background='linear-gradient(135deg,rgba(52,211,153,0.35),rgba(14,165,233,0.3))';
    setTimeout(()=>exportBtn.style.background='linear-gradient(135deg,rgba(52,211,153,0.2),rgba(14,165,233,0.15))',600);
  };

  updatePreview();
  return wrap;
}

  wrap.appendChild(qLabel2);

  const keyInput=document.createElement('input');
  keyInput.style.cssText='width:100%;background:var(--input-bg);border:1.5px solid var(--border);border-radius:14px;padding:12px 16px;font-size:16px;color:var(--text);outline:none;font-family:monospace;font-weight:700;letter-spacing:1px;box-sizing:border-box;transition:border-color 0.2s,box-shadow 0.2s;margin-bottom:8px';
  keyInput.placeholder=ru?'Например: Ctrl+K, ⌘+Shift+P, F5':'E.g.: Ctrl+K, ⌘+Shift+P, F5';
  keyInput.onfocus=()=>{keyInput.style.borderColor='rgba(14,165,233,0.5)';keyInput.style.boxShadow='0 0 0 3px rgba(14,165,233,0.08)';};
  keyInput.onblur=()=>{keyInput.style.borderColor='var(--border)';keyInput.style.boxShadow='none';};
  wrap.appendChild(keyInput);

  // Quick key buttons
  const quickKeys=['Ctrl','Alt','Shift','Win/⌘','F1-F12','Enter','Esc','Tab'];
  const qkRow=document.createElement('div');
  qkRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px';
  quickKeys.forEach(k=>{
    const btn=document.createElement('button');
    btn.style.cssText='background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;font-family:monospace;transition:all 0.15s';
    btn.textContent=k;

// ── Collapsible section helper ──
function makeSection(emoji, titleText, badge, color, contentEl, storageKey){
  const isCollapsed = localStorage.getItem('sc_collapse_'+storageKey)==='1';
  const wrap = document.createElement('div');
  wrap.className = 'section-wrap';
  wrap.style.animation = 'scaleIn 0.22s cubic-bezier(.4,0,.2,1) both';

  const header = document.createElement('div');
  header.className = 'section-header';
  const titleWrap = document.createElement('span');
  titleWrap.className = 'section-title';

  const emojiSpan = document.createElement('span');
  emojiSpan.textContent = emoji;
  emojiSpan.style.cssText = 'font-size:13px';

  const textSpan = document.createElement('span');
  textSpan.textContent = titleText;

  const badgeSpan = document.createElement('span');
  badgeSpan.className = 'section-badge';
  badgeSpan.textContent = badge;
  if(color){
    badgeSpan.style.background = color+'18';
    badgeSpan.style.borderColor = color+'44';
    badgeSpan.style.color = color;
  }

  titleWrap.appendChild(emojiSpan);
  titleWrap.appendChild(textSpan);
  titleWrap.appendChild(badgeSpan);

  const toggle = document.createElement('span');
  toggle.className = 'section-toggle' + (isCollapsed ? ' collapsed' : '');
  toggle.textContent = '▾';

  header.appendChild(titleWrap);
  header.appendChild(toggle);

  const body = document.createElement('div');
  body.className = 'section-body' + (isCollapsed ? ' collapsed' : '');
  body.style.maxHeight = isCollapsed ? '0' : '4000px';
  body.appendChild(contentEl);

  header.onclick = () => {
    const now = body.classList.contains('collapsed');
    body.classList.toggle('collapsed', !now);
    toggle.classList.toggle('collapsed', !now);
    body.style.maxHeight = now ? '4000px' : '0';
    localStorage.setItem('sc_collapse_'+storageKey, now ? '0' : '1');
    // ripple effect on header
    const rpl = document.createElement('span');
    rpl.style.cssText='position:absolute;width:30px;height:30px;border-radius:50%;background:rgba(99,102,241,0.25);pointer-events:none;animation:ripple 0.5s ease forwards;left:50%;top:50%;transform-origin:center';
    header.style.position='relative';header.style.overflow='hidden';
    header.appendChild(rpl);setTimeout(()=>rpl.remove(),500);
  };

  wrap.appendChild(header);
  wrap.appendChild(body);
  return wrap;
}
