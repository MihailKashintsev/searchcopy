button{cursor:pointer}

// ── Detect OS ──
function detectOS(){
  const p = navigator.platform || navigator.userAgent;
  if(/Mac/.test(p)) return 'mac';
  if(/Win/.test(p)) return 'win';
  if(/Linux|Android/.test(p)) return 'linux';
  return 'win';
}

// ── Settings ──
const SETTINGS_KEY = 'sc_settings';
function loadSettings(){
  try{ return JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}'); }catch{ return {}; }
}
function saveSettings(s){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

const detectedOS = detectOS();
let settings = {
  lang: 'ru',
  theme: 'dark',
  os: detectedOS,
  autoUpdate: true,
  ...loadSettings()
};

function applyTheme(){
  document.body.classList.toggle('light', settings.theme === 'light');
}
applyTheme();

// ── OS key adapter ──
function adaptKeys(keys){
  if(settings.os === 'mac'){
    return keys
      .replace(/Ctrl/g, '⌘ Cmd')
      .replace(/Alt/g, '⌥ Alt')
      .replace(/Shift/g, '⇧ Shift');
  }
  return keys;
}

// ── Helpers ──
function extractColumns(q){
  const parts=q.toUpperCase().split(/[\s,+иand&]+/);
  const cols=[];
  for(const p of parts) if(/^[A-Z]{1,2}$/.test(p.trim())) cols.push(p.trim());
  return [...new Set(cols)];
}

function getDesc(item){ return typeof item.desc==='object'?item.desc[settings.lang]:item.desc; }
function getTags(item){ return typeof item.tags==='object'?(item.tags[settings.lang]||[]):(item.tags||[]); }

function scoreItem(query,item){
  const q=query.toLowerCase().trim(); let s=0;
  const fields=[getDesc(item).toLowerCase(), item.keys.toLowerCase(), ...getTags(item)];
  for(const f of fields){
    if(f===q){s+=10;continue}
    if(f.includes(q)){s+=5;continue}
    for(const w of q.split(/[\s,]+/)) if(w.length>2&&f.includes(w)) s+=2;
  }
  return s;
}

function doSearch(query,progs){
  if(query.trim().length<2) return [];
  const out=[];
  for(const prog of progs)
    for(const item of DB[prog]||[]){
      const s=scoreItem(query,item);
      if(s>0) out.push({...item,program:prog,score:s});
    }
  return out.sort((a,b)=>b.score-a.score).slice(0,14);
}

function buildChain(query,items){
  const cols=extractColumns(query);
  if(cols.length<2) return null;
  const base=items.find(i=>i.template)||items[0];
  if(!base) return null;
  return cols.map((col,i)=>({
    step:i+1, col,
    formula:base.template?base.template.replace(/\{col\}/g,col):(base.example||base.keys),
    desc:getDesc(base), program:base.program
  }));
}

function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.textContent;
    btn.textContent="✓";
    btn.style.color="#4ade80";
    btn.style.borderColor="rgba(34,197,94,0.5)";
    btn.style.background="rgba(34,197,94,0.2)";
    setTimeout(()=>{
      btn.textContent=orig;
      btn.style.color="";btn.style.borderColor="";btn.style.background="";
    },1400);
  });
}

function makeCopyBtn(text){
  const btn=document.createElement('button');
  btn.textContent="⎘";
  btn.style.cssText="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#64748b;border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;font-weight:700;transition:all 0.18s;flex-shrink:0;font-family:inherit";
  btn.onclick=()=>copyText(text,btn);
  return btn;
}

function el(tag,style,html){
  const e=document.createElement(tag);
  if(style) e.style.cssText=style;
  if(html!==undefined) e.innerHTML=html;
  return e;
}

  function renderResults(){
    const rw=document.getElementById('results-wrap');
    if(!rw) return;
    rw.innerHTML='';
    const q=state.query;
    const results=doSearch(q,state.progs);
    const chain=buildChain(q,results);
    const cols=extractColumns(q);
    if(sugWrap) sugWrap.style.display=q?"none":"block";
    if(clrBtn) clrBtn.style.display=q?"flex":"none";

    if(chain||results.length>0){
      const label=el('p',"color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px");
      label.textContent=chain?t.foundChain(results.length):t.found(results.length);
      rw.appendChild(label);
      if(chain) rw.appendChild(renderChainCard(chain));
      const list=el('div',"display:flex;flex-direction:column;gap:8px");
      results.forEach((item,i)=>list.appendChild(renderResultCard(item,i,cols)));
      rw.appendChild(list);
    } else if(q.trim().length>1){
      const empty=el('div',"text-align:center;padding:60px 20px;color:var(--text3)");
      empty.innerHTML=`<div style="font-size:36px;margin-bottom:12px;opacity:0.4">⌕</div><p style="margin:0;font-size:13px">${t.notFound(q)}</p><p style="margin:6px 0 0;font-size:11px;color:var(--text3)">${t.notFoundHint}</p>`;
      rw.appendChild(empty);
    }
  }
}

// ── Auto-updater ──
async function checkForUpdates(){
  if(!settings.autoUpdate) return;
  try{
    const {check} = await import('@tauri-apps/plugin-updater');
    const {relaunch} = await import('@tauri-apps/plugin-process');
    const update = await check();
    if(!update) return;
    const t=T[settings.lang];
    const banner=el('div',"position:fixed;bottom:60px;right:20px;background:rgba(12,10,28,0.97);border:1px solid rgba(99,102,241,0.4);border-radius:12px;padding:14px 18px;z-index:999;display:flex;align-items:center;gap:14px;backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(0,0,0,0.6);animation:fadeUp 0.4s ease both;max-width:320px");
    banner.innerHTML=`<div style="flex:1"><div style="font-size:11px;font-weight:800;color:#c7d2fe;margin-bottom:3px">${t.updateBanner(updateObj.version||'?')}</div><div style="font-size:10px;color:#475569">${updateObj.body||t.updateBody}</div></div><button id="install-btn" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:800;color:#fff;cursor:pointer;white-space:nowrap;font-family:inherit">${t.install}</button>`;
    document.body.appendChild(banner);
    document.getElementById('install-btn').onclick=async()=>{
      document.getElementById('install-btn').textContent=t.installing;
      await invoke('plugin:updater|download_and_install');
      await invoke('plugin:process|restart');
    };
  }catch(e){ console.log('Updater:',e); }
}

if(window.__TAURI__) setTimeout(checkForUpdates, 2000);

render();
</script>
