const VERSION="1.0.0";

function detectOS(){
  const p=navigator.platform||navigator.userAgent;
  if(/Mac/.test(p)) return 'mac';
  if(/Linux|Android/.test(p)) return 'linux';
  return 'win';
}
const detectedOS=detectOS();

const SETTINGS_KEY='sc_settings_v2';
function loadSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')}catch{return{}}}
function saveSettings(s){localStorage.setItem(SETTINGS_KEY,JSON.stringify(s))}

let settings={lang:'ru',theme:'dark',os:detectedOS,autoUpdate:true,...loadSettings()};
function applyTheme(){document.body.classList.toggle('light',settings.theme==='light')}
applyTheme();

function adaptKeys(keys){
  if(settings.os==='mac'){
    return keys.replace(/\bCtrl\b/g,'⌘ Cmd').replace(/\bAlt\b/g,'⌥ Option').replace(/\bShift\b/g,'⇧ Shift');
  }
  return keys;
}

const COLORS={Excel:"#22c55e",Word:"#3b82f6",PowerPoint:"#f97316","VS Code":"#a78bfa",Photoshop:"#38bdf8"};
const ICONS={Excel:"⊞",Word:"W",PowerPoint:"P","VS Code":"</>",Photoshop:"Ps"};

let state={query:"",progs:["Excel"],tab:"search"};

function extractColumns(q){
  const parts=q.toUpperCase().split(/[\s,+иand&]+/);
  const cols=[];
  for(const p of parts) if(/^[A-Z]{1,2}$/.test(p.trim())) cols.push(p.trim());
  return [...new Set(cols)];
}
function getDesc(item){return typeof item.desc==='object'?item.desc[settings.lang]:item.desc}
function getTags(item){return typeof item.tags==='object'?(item.tags[settings.lang]||[]):(item.tags||[])}

function scoreItem(query,item){
  const q=query.toLowerCase().trim();let s=0;
  const fields=[getDesc(item).toLowerCase(),item.keys.toLowerCase(),...getTags(item)];
  for(const f of fields){
    if(f===q){s+=10;continue}
    if(f.includes(q)){s+=5;continue}
    for(const w of q.split(/[\s,]+/)) if(w.length>2&&f.includes(w)) s+=2;
  }
  return s;
}

function doSearch(query,progs){
  if(query.trim().length<2) return [];
  const out=[];
  for(const prog of progs)
    for(const item of DB[prog]||[]){
      const s=scoreItem(query,item);
      if(s>0) out.push({...item,program:prog,score:s});
    }
  return out.sort((a,b)=>b.score-a.score).slice(0,14);
}

function buildChain(query,items){
  const cols=extractColumns(query);
  if(cols.length<2) return null;
  const base=items.find(i=>i.template)||items[0];
  if(!base) return null;
  return cols.map((col,i)=>({
    step:i+1,col,
    formula:base.template?base.template.replace(/\{col\}/g,col):(base.example||base.keys),
    desc:getDesc(base),program:base.program
  }));
}

function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="✓";btn.style.color="#4ade80";
    btn.style.borderColor="rgba(34,197,94,0.5)";btn.style.background="rgba(34,197,94,0.2)";
    setTimeout(()=>{btn.textContent="⎘";btn.style.color="";btn.style.borderColor="";btn.style.background=""},1400);
  });
}

function makeCopyBtn(text){
  const btn=document.createElement('button');
  btn.textContent="⎘";
  btn.style.cssText="background:var(--copy-bg);border:1px solid var(--copy-border);color:var(--copy-color);border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;font-weight:700;transition:all 0.18s;flex-shrink:0;font-family:inherit";
  btn.onclick=()=>copyText(text,btn);
  return btn;
}

function el(tag,style,html){
  const e=document.createElement(tag);
  if(style) e.style.cssText=style;
  if(html!==undefined) e.innerHTML=html;
  return e;
}

    btn.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${current?"#4ade80":"#475569"};display:inline-block"></span>${current?t.on:t.off}`;
    btn.onclick=()=>onChange(!current);
    return btn;
  }

  wrap.appendChild(section(t.sLang));
  wrap.appendChild(settingRow("🌐",t.sLang,t.sLangDesc,
    segmented([{val:'ru',label:'RU'},{val:'en',label:'EN'}],settings.lang,val=>{settings.lang=val;saveSettings(settings);render()})));

  wrap.appendChild(section(t.sTheme));
  wrap.appendChild(settingRow("🎨",t.sTheme,t.sThemeDesc,
    segmented([{val:'dark',label:t.dark},{val:'light',label:t.light}],settings.theme,val=>{settings.theme=val;saveSettings(settings);applyTheme();render()})));

  wrap.appendChild(section(t.sOS));
  wrap.appendChild(settingRow("💻",t.sOS,`${t.sOSDesc} (${t.sDetected}: ${detectedOS})`,
    segmented([{val:'win',label:'Windows'},{val:'mac',label:'macOS'},{val:'linux',label:'Linux'}],settings.os,val=>{settings.os=val;saveSettings(settings);render()})));

  body.appendChild(meta);
  const descEl=el('p',"margin:0 0 7px;color:var(--text2);font-size:12px");
  descEl.textContent=desc;body.appendChild(descEl);
  if(display){
    const fr=el('div',"display:flex;align-items:center;gap:8px");
    const fb=el('div',"background:var(--code-bg);border:1px solid var(--code-border);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--code-color);flex:1;word-break:break-all;font-weight:600");
    fb.textContent=display;fr.appendChild(fb);fr.appendChild(makeCopyBtn(display));body.appendChild(fr);
  }
  card.appendChild(body);return card;
}

// ── About tab ──
function renderAbout(){
  const t=T[settings.lang];
  const wrap=el('div',"animation:fadeUp 0.35s ease both");
  function infoRow(icon,title,body){
    const d=el('div',"display:flex;gap:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px");
    d.innerHTML=`<span style="font-size:20px;flex-shrink:0;line-height:1;margin-top:1px">${icon}</span><div><div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px">${title}</div><div style="font-size:12px;color:var(--text2);line-height:1.65">${body}</div></div>`;
    return d;
  }
  function errRow(title,fix){
    const d=el('div',"background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.18);border-radius:10px;padding:14px 16px;margin-bottom:8px");
    d.innerHTML=`<div style="font-size:12px;font-weight:700;color:#fca5a5;margin-bottom:5px">⚠ ${title}</div><div style="font-size:12px;color:var(--text2);line-height:1.65">${fix}</div>`;
    return d;
  }
  function heading(txt){
    const d=el('p',"color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:2px;font-weight:800;margin:24px 0 10px");
    d.textContent=txt;return d;
  }
  const hero=el('div',"background:linear-gradient(135deg,rgba(79,70,229,0.1),rgba(14,165,233,0.07));border:1px solid rgba(99,102,241,0.2);border-radius:16px;padding:24px;text-align:center;margin-bottom:6px");
  hero.innerHTML=`<div style="font-size:32px;margin-bottom:10px">⌘</div><h2 style="margin:0 0 5px;font-size:20px;font-weight:900;color:var(--text);letter-spacing:-0.5px">SearchCopy</h2><p style="margin:0 0 10px;color:#818cf8;font-size:10px;letter-spacing:2.5px;text-transform:uppercase">by RENDERGAMES</p><p style="margin:0;color:var(--text2);font-size:12px;line-height:1.6">${t.aboutHero}</p>`;
  wrap.appendChild(hero);
  wrap.appendChild(heading(t.h_howto));
  t.rows.slice(0,3).forEach(r=>wrap.appendChild(infoRow(r[0],r[1],r[2])));
  wrap.appendChild(heading(t.h_filters));wrap.appendChild(infoRow(t.rows[3][0],t.rows[3][1],t.rows[3][2]));
  wrap.appendChild(heading(t.h_updates));wrap.appendChild(infoRow(t.rows[4][0],t.rows[4][1],t.rows[4][2]));
  wrap.appendChild(heading(t.h_errors));t.errs.forEach(r=>wrap.appendChild(errRow(r[0],r[1])));
  wrap.appendChild(el('div',"text-align:center;color:var(--text3);font-size:10px;margin-top:28px;padding-bottom:8px",t.footer));
  return wrap;
}

// ── Main render ──
function render(){
  const t=T[settings.lang];
  const app=document.getElementById('app');app.innerHTML='';

  const hdr=el('div',"text-align:center;margin-bottom:30px");
  hdr.innerHTML=`
    <div style="display:inline-flex;align-items:center;gap:8px;background:var(--badge-bg);border:1px solid var(--badge-border);border-radius:999px;padding:5px 16px;margin-bottom:14px;font-size:10px;color:#818cf8;letter-spacing:2.5px;text-transform:uppercase">
      <span style="animation:pulse 2.5s infinite">●</span> RENDERGAMES
    </div>
    <h1 style="font-size:clamp(30px,6vw,48px);font-weight:900;margin:0 0 7px;background:linear-gradient(135deg,#f1f5f9 0%,#c7d2fe 50%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-2px;line-height:1">SearchCopy</h1>
    <p style="color:var(--text3);font-size:11px;margin:0;letter-spacing:0.5px">${t.tagline}</p>`;
  app.appendChild(hdr);

  const tabBar=el('div',"display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:22px");
  [{id:"search",label:t.tabSearch},{id:"about",label:t.tabAbout},{id:"settings",label:t.tabSettings}].forEach(tb=>{
    const on=state.tab===tb.id;
    const btn=el('button',`flex:1;background:${on?"rgba(99,102,241,0.18)":"transparent"};border:1px solid ${on?"rgba(99,102,241,0.35)":"transparent"};border-radius:9px;padding:9px 12px;font-size:12px;font-weight:700;color:${on?"#c7d2fe":"var(--text2)"};cursor:pointer;transition:all 0.2s`);
    btn.textContent=tb.label;btn.onclick=()=>{state.tab=tb.id;render()};tabBar.appendChild(btn);
  });
  app.appendChild(tabBar);

  if(state.tab==="about"){app.appendChild(renderAbout());return;}
  if(state.tab==="settings"){app.appendChild(renderSettings());return;}

  const sw=el('div',"animation:fadeUp 0.3s ease both");

  const filters=el('div',"display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:18px");
  PROGRAMS.forEach(p=>{
    const on=state.progs.includes(p);const c=COLORS[p];
    const btn=el('button',`background:${on?c+"16":"var(--bg3)"};border:1px solid ${on?c+"70":"var(--border)"};color:${on?c:"var(--text2)"};border-radius:999px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:5px`);
    btn.innerHTML=`<span style="font-size:10px">${ICONS[p]}</span>${p}`;
    btn.onclick=()=>{if(on&&state.progs.length===1)return;state.progs=on?state.progs.filter(x=>x!==p):[...state.progs,p];render()};
    filters.appendChild(btn);
  });
  sw.appendChild(filters);

  const iw=el('div',"position:relative;margin-bottom:16px;border-radius:14px;box-shadow:var(--shadow);transition:box-shadow 0.3s");
  iw.appendChild(el('span',"position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:17px;color:#4f46e5;pointer-events:none;font-weight:700","⌘"));
  const input=document.createElement('input');
  input.value=state.query;input.placeholder=t.placeholder;
  input.style.cssText="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:14px;padding:16px 46px 16px 48px;font-size:15px;color:var(--text);outline:none;font-family:inherit;transition:border 0.25s";
  input.oninput=e=>{state.query=e.target.value;renderResults()};
  input.onfocus=()=>{iw.style.boxShadow=`var(--shadow-focus)`;input.style.borderColor="rgba(99,102,241,0.55)"};
  input.onblur=()=>{iw.style.boxShadow="var(--shadow)";input.style.borderColor="var(--border)"};
  iw.appendChild(input);
  const clrBtn=el('button',"position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center","✕");
  clrBtn.style.display=state.query?"flex":"none";
  clrBtn.onclick=()=>{state.query="";render()};
  iw.appendChild(clrBtn);sw.appendChild(iw);

  const sugWrap=el('div',"margin-bottom:28px");
  sugWrap.style.display=state.query?"none":"block";
  sugWrap.appendChild(el('p',"color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px",t.tryLabel));
  const sugRow=el('div',"display:flex;flex-wrap:wrap;gap:6px");
  t.suggestions.forEach(s=>{
    const btn=el('button',"background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 11px;font-size:11px;color:var(--text2);cursor:pointer;transition:all 0.15s");
    btn.textContent=s;
    btn.onmouseenter=()=>{btn.style.color="#a5b4fc";btn.style.borderColor="rgba(99,102,241,0.35)";btn.style.background="rgba(99,102,241,0.07)"};
    btn.onmouseleave=()=>{btn.style.color="";btn.style.borderColor="";btn.style.background=""};
    btn.onclick=()=>{state.query=s;render();setTimeout(()=>document.querySelector('input')?.focus(),50)};
    sugRow.appendChild(btn);
  });
  sugWrap.appendChild(sugRow);sw.appendChild(sugWrap);

  const rw=el('div',"");rw.id="results-wrap";sw.appendChild(rw);app.appendChild(sw);
  renderResults();

  function renderResults(){
    const rw=document.getElementById('results-wrap');if(!rw)return;rw.innerHTML='';
    const q=state.query;
    const results=doSearch(q,state.progs);
    const chain=buildChain(q,results);
    const cols=extractColumns(q);
    if(sugWrap)sugWrap.style.display=q?"none":"block";
    if(clrBtn)clrBtn.style.display=q?"flex":"none";
    if(chain||results.length>0){
      const label=el('p',"color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px");
      label.textContent=chain?t.foundChain(results.length):t.found(results.length);
      rw.appendChild(label);
      if(chain)rw.appendChild(renderChainCard(chain));
      const list=el('div',"display:flex;flex-direction:column;gap:8px");
      results.forEach((item,i)=>list.appendChild(renderResultCard(item,i,cols)));
      rw.appendChild(list);
    } else if(q.trim().length>1){
      const empty=el('div',"text-align:center;padding:60px 20px;color:var(--empty-color)");
      empty.innerHTML=`<div style="font-size:36px;margin-bottom:12px;opacity:0.4">⌕</div><p style="margin:0;font-size:13px">${t.notFound(q)}</p><p style="margin:6px 0 0;font-size:11px">${t.notFoundHint}</p>`;
      rw.appendChild(empty);
    }
  }
}

// ── Auto-updater via GitHub API ──
function compareVersions(a,b){
  const pa=a.replace(/^v/,'').split('.').map(Number);
  const pb=b.replace(/^v/,'').split('.').map(Number);
  for(let i=0;i<3;i++){if((pa[i]||0)>(pb[i]||0))return 1;if((pa[i]||0)<(pb[i]||0))return -1;}
  return 0;
}

async function checkForUpdates(){
  if(!settings.autoUpdate)return;
  try{
    const res=await fetch('https://api.github.com/repos/MihailKashintsev/searchcopy/releases/latest',{
      headers:{'Accept':'application/vnd.github.v3+json'}
    });
    if(!res.ok)return;
    const data=await res.json();
    const latestVersion=data.tag_name||'';
    if(!latestVersion)return;
    if(compareVersions(latestVersion,VERSION)<=0)return;

    const t=T[settings.lang];
    // find installer for current platform
    const assets=data.assets||[];
    let downloadUrl=data.html_url; // fallback to release page
    const isMac=/Mac/.test(navigator.platform);
    const isWin=/Win/.test(navigator.platform);
    const asset=assets.find(a=>{
      const n=a.name.toLowerCase();
      if(isMac) return n.endsWith('.dmg');
      if(isWin) return n.endsWith('.exe')&&n.includes('setup');
      return n.endsWith('.appimage')||n.endsWith('.deb');
    });
    if(asset) downloadUrl=asset.browser_download_url;

    // Remove old banner if any
    document.getElementById('update-banner')?.remove();
    const banner=el('div',"position:fixed;bottom:60px;right:20px;background:var(--chain-bg);border:1px solid rgba(99,102,241,0.4);border-radius:12px;padding:14px 18px;z-index:999;display:flex;align-items:center;gap:14px;backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(0,0,0,0.4);animation:fadeUp 0.4s ease both;max-width:340px");
    banner.id='update-banner';
    const body=data.body?data.body.split('\n')[0].slice(0,80):'';
    banner.innerHTML=`
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:800;color:#c7d2fe;margin-bottom:3px">${t.updateBanner(latestVersion)}</div>
        ${body?`<div style="font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${body}</div>`:''}
      </div>
      <a id="install-btn" href="${downloadUrl}" target="_blank" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:800;color:#fff;cursor:pointer;white-space:nowrap;font-family:inherit;text-decoration:none;display:block">${t.install}</a>
      <button onclick="document.getElementById('update-banner').remove()" style="background:transparent;border:none;color:var(--text2);font-size:16px;cursor:pointer;padding:2px 4px;line-height:1">×</button>
    `;
    document.body.appendChild(banner);
  }catch(e){console.log('Updater:',e);}
}

// Check on load + every 30 min
setTimeout(checkForUpdates,3000);
setInterval(checkForUpdates,30*60*1000);

render();
</script>
