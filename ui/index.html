// ── Logic ──
function extractColumns(q){
  const parts = q.toUpperCase().split(/[\s,+иand&]+/);
  const cols=[];
  for(const p of parts) if(/^[A-Z]{1,2}$/.test(p.trim())) cols.push(p.trim());
  return [...new Set(cols)];
}

function scoreItem(query,item){
  const q=query.toLowerCase().trim(); let s=0;
  const fields=[item.desc.toLowerCase(),item.keys.toLowerCase(),...(item.tags||[])];
  for(const f of fields){
    if(f===q){s+=10;continue}
    if(f.includes(q)){s+=5;continue}
    for(const w of q.split(/[\s,]+/)) if(w.length>2&&f.includes(w)) s+=2;
  }
  return s;
}

function doSearch(query,progs){
  if(query.trim().length<2) return [];
  const out=[];
  for(const prog of progs)
    for(const item of DB[prog]||[]){
      const s=scoreItem(query,item);
      if(s>0) out.push({...item,program:prog,score:s});
    }
  return out.sort((a,b)=>b.score-a.score).slice(0,14);
}

function buildChain(query,items){
  const cols=extractColumns(query);
  if(cols.length<2) return null;
  const base=items.find(i=>i.template)||items[0];
  if(!base) return null;
  return cols.map((col,i)=>({
    step:i+1, col,
    formula: base.template ? base.template.replace(/\{col\}/g,col) : (base.example||base.keys),
    desc:base.desc, program:base.program
  }));
}

// ── Copy ──
function copyText(text, btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="✓";
    btn.style.color="#4ade80";
    btn.style.borderColor="rgba(34,197,94,0.5)";
    btn.style.background="rgba(34,197,94,0.2)";
    setTimeout(()=>{
      btn.textContent="⎘";
      btn.style.color="#64748b";
      btn.style.borderColor="rgba(255,255,255,0.12)";
      btn.style.background="rgba(255,255,255,0.06)";
    },1400);
  });
}

function makeCopyBtn(text){
  const btn=document.createElement('button');
  btn.textContent="⎘";
  btn.style.cssText="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#64748b;border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;font-weight:700;transition:all 0.18s;flex-shrink:0;font-family:inherit";
  btn.onclick=()=>copyText(text,btn);
  return btn;
}

function el(tag,style,html){

  if(style) e.style.cssText=style;
  if(html) e.innerHTML=html;
  return e;
}

    row.appendChild(num);

    const content=el('div',"flex:1");
    const meta=el('div',"display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap");
    meta.innerHTML=`<span style="background:rgba(99,102,241,0.18);border:1px solid rgba(99,102,241,0.4);border-radius:6px;padding:3px 10px;font-size:12px;color:#c7d2fe;font-weight:700">столбец ${step.col}</span><span style="font-size:11px;color:#475569">${step.desc}</span>`;
    content.appendChild(meta);

    const formulaRow=el('div',"display:flex;align-items:center;gap:8px");
    const formulaBox=el('div',"background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.3);border-radius:8px;padding:8px 14px;font-size:13px;color:#bae6fd;font-weight:700;flex:1;word-break:break-all;letter-spacing:0.3px");
    formulaBox.textContent=step.formula;
    formulaRow.appendChild(formulaBox);
    formulaRow.appendChild(makeCopyBtn(step.formula));
    content.appendChild(formulaRow);
    row.appendChild(content);
    steps.appendChild(row);
  });

  const footer=el('div',"margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center");
  footer.appendChild(el('span',"font-size:10px;color:#334155","Скопировать все формулы"));
  footer.appendChild(makeCopyBtn(chain.map(s=>s.formula).join('\n')));
  wrap.appendChild(footer);
  return wrap;
}

  const isFormula=item.type==="formula";

  if(adapted){
    const ab=el('span',"font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.3);color:#38bdf8","✦ Адаптировано");

  }
  body.appendChild(meta);

  const desc=el('p',"margin:0 0 7px;color:#64748b;font-size:12px");

  body.appendChild(desc);

  if(display){
    const fr=el('div',"display:flex;align-items:center;gap:8px");

    fr.appendChild(fb);
    fr.appendChild(makeCopyBtn(display));
    body.appendChild(fr);
  }
  card.appendChild(body);
  return card;
}

  }

  const hero=el('div',"background:linear-gradient(135deg,rgba(79,70,229,0.1),rgba(14,165,233,0.07));border:1px solid rgba(99,102,241,0.2);border-radius:16px;padding:24px;text-align:center;margin-bottom:6px");
  hero.innerHTML=`<div style="font-size:32px;margin-bottom:10px">⌘</div><h2 style="margin:0 0 5px;font-size:20px;font-weight:900;color:#e2e8f0;letter-spacing:-0.5px">SearchCopy</h2><p style="margin:0 0 10px;color:#818cf8;font-size:10px;letter-spacing:2.5px;text-transform:uppercase">by RENDERGAMES</p><p style="margin:0;color:#475569;font-size:12px;line-height:1.6">Ищи горячие клавиши и формулы на русском — просто напиши что хочешь сделать.</p>`;
  wrap.appendChild(hero);

  wrap.appendChild(heading("Как пользоваться поиском"));
  wrap.appendChild(infoRow("🔍","Пиши по-русски, как обычно","Введи в строку поиска что хочешь сделать: «посчитать сумму», «удалить строку», «найти значение». Приложение само найдёт нужные формулы и горячие клавиши."));
  wrap.appendChild(infoRow("⛓","Цепочки действий","Укажи несколько столбцов — получишь цепочку. Например: «посчитай столбец G и B» выдаст =SUM(G:G) и =SUM(B:B) по отдельности."));
  wrap.appendChild(infoRow("✦","Адаптация под твои столбцы","Напиши «сумма столбца C» — формула подстроится как =SUM(C:C). Такие результаты помечены тегом «Адаптировано»."));

  wrap.appendChild(heading("Фильтры по программам"));
  wrap.appendChild(infoRow("🏷","Кнопки над строкой поиска","Выбирай нужные программы — поиск ведётся только по ним. Минимум одна всегда активна. По умолчанию — Excel."));

  wrap.appendChild(heading("Обновления"));
  wrap.appendChild(infoRow("🔔","Автообновление","Когда выйдет новая версия — в правом нижнем углу появится баннер. Нажми «Установить» — приложение обновится и перезапустится само."));

  wrap.appendChild(heading("Частые ошибки"));
  wrap.appendChild(errRow("Ничего не найдено","Попробуй переформулировать: вместо «calc» пиши «посчитать». Убедись, что нужная программа включена в фильтрах."));
  wrap.appendChild(errRow("Формула выглядит странно","Если в запросе нет конкретного столбца — подставляется стандартный пример. Просто замени A:A на нужный столбец."));

  const copy=el('div',"text-align:center;color:#1e293b;font-size:10px;margin-top:28px;padding-bottom:8px","RENDERGAMES © 2025");
  wrap.appendChild(copy);
  return wrap;
}

// ── Main render ──
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';

  // Header
  const hdr=el('div',"text-align:center;margin-bottom:30px");
  hdr.innerHTML=`
    <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.22);border-radius:999px;padding:5px 16px;margin-bottom:14px;font-size:10px;color:#818cf8;letter-spacing:2.5px;text-transform:uppercase">
      <span style="animation:pulse 2.5s infinite">●</span> RENDERGAMES
    </div>
    <h1 style="font-size:clamp(30px,6vw,48px);font-weight:900;margin:0 0 7px;background:linear-gradient(135deg,#f1f5f9 0%,#c7d2fe 50%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-2px;line-height:1">SearchCopy</h1>
    <p style="color:#334155;font-size:11px;margin:0;letter-spacing:0.5px">Горячие клавиши · Формулы · Цепочки действий</p>
  `;
  app.appendChild(hdr);

  // Tabs
  const tabBar=el('div',"display:flex;gap:4px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:4px;margin-bottom:22px");
  [{id:"search",label:"⌘ Поиск"},{id:"about",label:"◎ О приложении"}].forEach(t=>{
    const on=state.tab===t.id;
    const btn=el('button',`flex:1;background:${on?"rgba(99,102,241,0.18)":"transparent"};border:1px solid ${on?"rgba(99,102,241,0.35)":"transparent"};border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;color:${on?"#c7d2fe":"#475569"};cursor:pointer;transition:all 0.2s;letter-spacing:0.3px`);
    btn.textContent=t.label;
    btn.onclick=()=>{state.tab=t.id;render()};
    tabBar.appendChild(btn);
  });
  app.appendChild(tabBar);

  if(state.tab==="about"){
    app.appendChild(renderAbout());
    return;
  }

  // Search tab
  const searchWrap=el('div',"animation:fadeUp 0.3s ease both");

  // Program filters
  const filters=el('div',"display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:18px");
  PROGRAMS.forEach(p=>{
    const on=state.progs.includes(p);
    const c=COLORS[p];
    const btn=el('button',`background:${on?c+"16":"rgba(255,255,255,0.03)"};border:1px solid ${on?c+"70":"rgba(255,255,255,0.07)"};color:${on?c:"#475569"};border-radius:999px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:5px;letter-spacing:0.3px`);
    btn.innerHTML=`<span style="font-size:10px">${ICONS[p]}</span>${p}`;
    btn.onclick=()=>{
      if(on && state.progs.length===1) return;
      state.progs=on?state.progs.filter(x=>x!==p):[...state.progs,p];
      render();
    };
    filters.appendChild(btn);
  });
  searchWrap.appendChild(filters);

  // Search input
  const inputWrap=el('div',"position:relative;margin-bottom:16px;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,0.4);transition:box-shadow 0.3s");
  const icon=el('span',"position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:17px;color:#4f46e5;pointer-events:none;font-weight:700","⌘");
  inputWrap.appendChild(icon);

  const input=document.createElement('input');
  input.value=state.query;
  input.placeholder='Например: "посчитай столбец G и B"...';
  input.style.cssText="width:100%;background:rgba(12,12,22,0.98);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:16px 46px 16px 48px;font-size:15px;color:#e2e8f0;outline:none;font-family:inherit;transition:border 0.25s";
  input.oninput=e=>{state.query=e.target.value;renderResults()};
  input.onfocus=()=>{inputWrap.style.boxShadow="0 0 0 2px rgba(99,102,241,0.4),0 24px 60px rgba(0,0,0,0.55)";input.style.borderColor="rgba(99,102,241,0.55)"};
  input.onblur=()=>{inputWrap.style.boxShadow="0 8px 40px rgba(0,0,0,0.4)";input.style.borderColor="rgba(255,255,255,0.07)"};
  inputWrap.appendChild(input);

  const clearBtn=el('button',"position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.07);border:none;color:#64748b;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:12px","✕");
  clearBtn.style.display=state.query?"flex":"none";
  clearBtn.style.alignItems="center";
  clearBtn.style.justifyContent="center";
  clearBtn.onclick=()=>{state.query="";render()};
  inputWrap.appendChild(clearBtn);
  searchWrap.appendChild(inputWrap);

  // Suggestions
  const suggestWrap=el('div',"margin-bottom:28px");
  suggestWrap.style.display=state.query?"none":"block";
  const suggestLabel=el('p',"color:#1e293b;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px","Попробуй:");
  suggestWrap.appendChild(suggestLabel);
  const suggestRow=el('div',"display:flex;flex-wrap:wrap;gap:6px");
  SUGGESTIONS.forEach(s=>{
    const btn=el('button',"background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:7px;padding:5px 11px;font-size:11px;color:#475569;cursor:pointer;transition:all 0.15s");
    btn.textContent=s;
    btn.onmouseenter=()=>{btn.style.color="#a5b4fc";btn.style.borderColor="rgba(99,102,241,0.3)"};
    btn.onmouseleave=()=>{btn.style.color="#475569";btn.style.borderColor="rgba(255,255,255,0.06)"};
    btn.onclick=()=>{state.query=s;render();document.querySelector('input').focus()};
    suggestRow.appendChild(btn);
  });
  suggestWrap.appendChild(suggestRow);
  searchWrap.appendChild(suggestWrap);

  // Results container
  const resultsWrap=el('div',"");
  resultsWrap.id="results-wrap";
  searchWrap.appendChild(resultsWrap);

  app.appendChild(searchWrap);
  renderResults();

  function renderResults(){
    const rw=document.getElementById('results-wrap');
    if(!rw) return;
    rw.innerHTML='';
    const q=state.query;
    const results=doSearch(q,state.progs);
    const chain=buildChain(q,results);
    const cols=extractColumns(q);

    if(suggestWrap) suggestWrap.style.display=q?"none":"block";
    if(clearBtn) clearBtn.style.display=q?"flex":"none";

    if(chain||results.length>0){
      const label=el('p',"color:#1e293b;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px");
      label.textContent=chain?`Цепочка + ${results.length} результатов`:`Найдено: ${results.length}`;
      rw.appendChild(label);
      if(chain) rw.appendChild(renderChainCard(chain));
      const list=el('div',"display:flex;flex-direction:column;gap:8px");
      results.forEach((item,i)=>list.appendChild(renderResultCard(item,i,cols)));
      rw.appendChild(list);
    } else if(q.trim().length>1){
      const empty=el('div',"text-align:center;padding:60px 20px;color:#1e293b");
      empty.innerHTML=`<div style="font-size:36px;margin-bottom:12px;opacity:0.4">⌕</div><p style="margin:0;font-size:13px">Ничего не найдено по «${q}»</p><p style="margin:6px 0 0;font-size:11px;color:#0f172a">Попробуй другие слова или включи больше программ</p>`;
      rw.appendChild(empty);
    }
  }
}

render();
</script>
</body>
</html>
