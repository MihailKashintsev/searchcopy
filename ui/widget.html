<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SearchCopy</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0d16;--bg2:#111220;--bg3:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --accent:#818cf8;--accent2:#a855f7;--green:#34d399;--orange:#f97316;--red:#f87171;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',system-ui,sans-serif;
  --r:12px;
}
html,body{width:100%;height:100%;min-height:100vh;background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:13px;overflow:hidden;-webkit-user-select:none;user-select:none;}

/* ── Drag bar ── */
#bar{height:32px;background:rgba(255,255,255,0.025);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:flex-end;padding:0 8px;
  flex-shrink:0;}

.bar-actions{display:flex;gap:3px;-webkit-app-region:no-drag;}
.bar-btn{width:24px;height:24px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--text3);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
  font-family:var(--sans);padding:0;line-height:1;}
.bar-btn:hover{background:rgba(255,255,255,0.07);color:var(--text);}
.bar-btn.active{border-color:var(--accent)44;background:rgba(129,140,248,0.12);color:var(--accent);}

/* ── Search ── */
#search-box{padding:10px 10px 6px;flex-shrink:0;}
.sq-wrap{position:relative;display:flex;align-items:center;gap:6px;}
.sq-icon{position:absolute;left:10px;color:var(--text3);font-size:13px;pointer-events:none;
  transition:color 0.2s;}
#q{width:100%;background:rgba(255,255,255,0.06);border:1.5px solid var(--border);
  border-radius:10px;padding:9px 60px 9px 32px;font-size:clamp(11px,3.5vw,13px);font-family:var(--sans);
  color:var(--text);outline:none;transition:all 0.2s;}
#q::placeholder{color:var(--text3);}
#q:focus{border-color:rgba(129,140,248,0.5);background:rgba(255,255,255,0.08);}
#q:focus ~ .sq-shortcuts .sq-icon{color:var(--accent);}
.sq-shortcuts{position:absolute;right:8px;display:flex;align-items:center;gap:4px;}
.sq-kbd{font-size:9px;font-weight:700;color:var(--text3);background:rgba(255,255,255,0.06);
  border:1px solid var(--border);border-radius:4px;padding:1px 4px;font-family:var(--mono);
  cursor:pointer;transition:all 0.15s;letter-spacing:0;}
.sq-kbd:hover{background:rgba(255,255,255,0.1);color:var(--text2);}
.sq-kbd.ai-active{color:var(--accent);border-color:var(--accent)44;background:rgba(129,140,248,0.12);}

/* ── Mode tabs ── */
#mode-tabs{display:flex;gap:4px;padding:0 10px 6px;flex-shrink:0;}
.mode-tab{flex:1;padding:4px 0;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--text3);font-size:10px;font-weight:700;
  font-family:var(--sans);cursor:pointer;transition:all 0.15s;text-align:center;}
.mode-tab.active{background:rgba(129,140,248,0.12);border-color:var(--accent)55;color:var(--accent);}
.mode-tab:hover:not(.active){background:rgba(255,255,255,0.04);color:var(--text2);}

/* ── Program pills ── */
#pills{display:flex;gap:4px;padding:0 10px 6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
#pills::-webkit-scrollbar{display:none;}
.pill{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;
  border:1px solid var(--border);background:transparent;color:var(--text3);
  font-size:10px;font-weight:700;font-family:var(--sans);cursor:pointer;
  white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.pill:hover:not(.active){border-color:rgba(255,255,255,0.2);color:var(--text2);}

/* ── Results ── */
#results{flex:1;overflow-y:auto;padding:0 8px 6px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent;}
#results::-webkit-scrollbar{width:3px;}
#results::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

/* ── Card ── */
.card{border-radius:10px;border:1px solid var(--border);background:var(--bg3);
  margin-bottom:5px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.card:hover{background:rgba(255,255,255,0.06);border-color:var(--border2);}
.card:active{transform:scale(0.98);}
.card-inner{padding:8px 10px;}

/* Left accent stripe */
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;border-radius:10px 0 0 10px;background:var(--card-color,#818cf8);}

/* Card header row */
.card-head{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.card-app-badge{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:800;
  letter-spacing:0.4px;text-transform:uppercase;padding:2px 6px;border-radius:5px;}
.card-type{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:auto;}
.type-formula{background:rgba(52,211,153,0.12);color:var(--green);}
.type-hotkey{background:rgba(129,140,248,0.12);color:var(--accent);}

/* Key display */
.card-key{font-family:var(--mono);font-size:clamp(11px,3.5vw,13px);font-weight:700;
  line-height:1.3;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;}
.key-chip{display:inline-block;background:rgba(255,255,255,0.06);border:1px solid var(--border);
  border-radius:5px;padding:1px 6px;font-size:11px;white-space:nowrap;}
.formula-text{color:var(--green);}

/* Description */
.card-desc{font-size:clamp(10px,3vw,11.5px);color:var(--text2);line-height:1.45;margin-bottom:4px;}

/* Template (for formulas) */
.card-template{font-family:var(--mono);font-size:10px;color:var(--text3);
  background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.12);
  border-radius:6px;padding:3px 7px;margin-bottom:4px;display:none;}
/* template shown via JS hover */

/* Tags */
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
.tag{font-size:9px;color:var(--text3);background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:1px 5px;}

/* Actions row */
.card-actions{display:flex;gap:4px;margin-top:6px;align-items:center;}
.act-btn{font-size:10px;font-weight:700;font-family:var(--sans);padding:3px 9px;
  border-radius:6px;border:1px solid var(--border);background:transparent;
  color:var(--text3);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.act-btn:hover{background:rgba(255,255,255,0.07);color:var(--text);}
.act-btn.primary{border-color:var(--accent)44;background:rgba(129,140,248,0.1);color:var(--accent);}
.act-btn.primary:hover{background:rgba(129,140,248,0.18);}
.act-btn.green{border-color:rgba(52,211,153,0.35);background:rgba(52,211,153,0.08);color:var(--green);}
.act-btn.green:hover{background:rgba(52,211,153,0.15);}

/* Copy flash overlay */
.copy-flash{position:absolute;inset:0;border-radius:10px;
  background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.35);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:var(--green);pointer-events:none;
  opacity:0;transition:opacity 0.12s;}
.card.flash .copy-flash{opacity:1;}

/* ── AI result card ── */
.ai-card{border-radius:10px;border:1px solid rgba(129,140,248,0.25);
  background:linear-gradient(135deg,rgba(129,140,248,0.06),rgba(168,85,247,0.04));
  padding:10px;margin-bottom:5px;}
.ai-card-head{font-size:10px;font-weight:800;color:var(--accent);margin-bottom:6px;
  display:flex;align-items:center;gap:5px;}
.ai-card-body{font-size:12px;color:var(--text2);line-height:1.6;}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:11px;padding:8px 0;}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);
  animation:pulse 1.2s ease-in-out infinite;}
.ai-dot:nth-child(2){animation-delay:0.2s;}
.ai-dot:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

/* ── Empty state ── */
.empty{text-align:center;padding:20px 12px;color:var(--text3);}
.empty-icon{font-size:26px;margin-bottom:8px;display:block;}
.empty-t{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:3px;}
.empty-h{font-size:11px;}

/* ── Footer ── */
#footer{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;
  border-top:1px solid var(--border);flex-shrink:0;}
.ft-stat{font-size:10px;color:var(--text3);font-weight:600;}
.ft-open{font-size:10px;font-weight:700;color:var(--accent);cursor:pointer;
  border:1px solid rgba(129,140,248,0.3);border-radius:6px;padding:2px 8px;
  background:transparent;font-family:var(--sans);transition:all 0.15s;}
.ft-open:hover{background:rgba(129,140,248,0.12);}

/* ── App layout ── */
#app{display:flex;flex-direction:column;height:100vh;}

/* ── Glow bg ── */
body::before{content:'';position:fixed;top:-80px;left:-80px;width:240px;height:240px;
  background:radial-gradient(circle,rgba(129,140,248,0.07) 0%,transparent 70%);pointer-events:none;}
body::after{content:'';position:fixed;bottom:-60px;right:-60px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(168,85,247,0.05) 0%,transparent 70%);pointer-events:none;}

@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.card,.ai-card{animation:fadeUp 0.18s ease both;}

/* ── Scrollbar visible state ── */
#results:hover::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);}

/* ════ RESPONSIVE ════ */

/* Narrow window (<260px) — icon-only pills, no tags, compact cards */
@container style(--narrow: 1) { }

/* Use vw-based breakpoints */
@media (max-width:260px){
  #pills .pill span:last-child{display:none;}       /* hide pill labels */
  .pill{padding:3px 5px;gap:0;}
  .card-inner{padding:5px 7px;}
  .card-key{font-size:11px;}
  .card-desc{display:none;}                          /* hide desc, key is enough */
  .card-tags{display:none;}
  .card-actions{display:none;}
  .ft-open{display:none;}
  #search-box{padding:6px 6px 4px;}
  #pills{padding:0 6px 4px;}
  #results{padding:0 4px 4px;}
}

@media (max-width:300px){
  .card-tags{display:none;}
  .act-btn:not(.primary):not(.green){display:none;} /* hide secondary btns */
  .card-inner{padding:6px 8px;}
  .card-key{font-size:11px;}
  #q{padding:7px 44px 7px 28px;font-size:12px;}
  .sq-icon{font-size:12px;}
  .ft-open{font-size:9px;padding:2px 6px;}
}

@media (max-width:340px){
  .card-desc{font-size:10.5px;}
  .tag{font-size:8px;padding:1px 4px;}
  #q{font-size:12px;}
  .act-btn{font-size:9px;padding:2px 7px;}
}

/* Compact height */
@media (max-height:380px){
  #bar{height:26px;}
  #search-box{padding:6px 8px 4px;}
  #pills{padding:0 8px 4px;}
  .card-inner{padding:5px 8px;}
  .card-tags{display:none;}
  .card-actions{margin-top:4px;}
  .act-btn{padding:2px 7px;}
  #footer{padding:3px 8px;}
  .empty{padding:10px 12px;}
  .empty-icon{font-size:20px;margin-bottom:4px;}
}

@media (max-height:300px){
  #pills{display:none;}
  .card-tags{display:none;}
  .card-actions{display:none;}
  #bar{height:24px;}
  #footer{padding:2px 8px;}
}

/* Width-adaptive pills: when narrow, pills wrap into 2 rows */
@media (max-width:300px){
  #pills{flex-wrap:wrap;max-height:52px;overflow:hidden;}
}

/* ════ MINI MODE ════ */
body.mini #pills{display:none;}
body.mini #footer{display:none;}
body.mini .card-tags{display:none;}
body.mini .card-actions{display:none;}
body.mini .card-desc{display:none;}
body.mini .card-head{margin-bottom:2px;}
body.mini .card-inner{padding:5px 8px;}
body.mini .card{margin-bottom:3px;border-radius:8px;}
body.mini .card-key{font-size:12px;margin-bottom:0;}
body.mini #search-box{padding:6px 8px 4px;}
body.mini #bar{height:28px;}
body.mini #results{padding:0 6px 4px;}
body.mini #app{min-height:80px;}

/* Only show top 3 results in mini mode */
body.mini .card:nth-child(n+4){display:none;}

/* Mini mode indicator on search */
body.mini #q{border-color:rgba(129,140,248,0.4);background:rgba(129,140,248,0.06);}
body.mini #mini-btn{color:var(--accent);border-color:var(--accent)44;background:rgba(129,140,248,0.12);}

/* ── ULTRA-MINI: window height < 200px ── */
body.ultra #pills{display:none;}
body.ultra #footer{display:none;}
body.ultra #bar{height:24px;}
body.ultra #search-box{padding:4px 6px 3px;}
body.ultra #results{padding:0 4px 3px;}
body.ultra .card-tags{display:none;}
body.ultra .card-actions{display:none;}
body.ultra .card-desc{display:none;}
body.ultra .card-head{margin-bottom:1px;}
body.ultra .card-inner{padding:3px 7px;}
body.ultra .card{margin-bottom:2px;border-radius:6px;}
body.ultra .card-key{font-size:11px;margin-bottom:0;}
body.ultra .card:nth-child(n+4){display:none;}
body.ultra #q{padding:5px 36px 5px 26px;font-size:11px;border-radius:7px;}
body.ultra .sq-icon{font-size:11px;}
body.ultra .bar-btn{width:20px;height:20px;font-size:11px;}
body.ultra .bar-actions{gap:2px;}

/* ── NANO: window height < 120px — just search bar ── */
body.nano #pills{display:none;}
body.nano #footer{display:none;}
body.nano #bar{height:20px;}
body.nano #results{display:none;}
body.nano #search-box{padding:3px 5px;}
body.nano #q{padding:4px 28px 4px 24px;font-size:11px;border-radius:6px;}
body.nano .bar-btn{width:18px;height:18px;font-size:10px;}
body.nano .bar-actions{gap:2px;}
body.nano .sq-icon{font-size:10px;left:7px;}
</style>
</head>
<body>
<div id="app">

  <!-- Compact toolbar under native titlebar -->
  <div id="bar">
    <div class="bar-actions">
      <button class="bar-btn" id="ai-toggle-btn" title="AI поиск">✦ AI</button>
      <button class="bar-btn active" id="pin-btn" title="Поверх окон">📌</button>
      <button class="bar-btn" id="mini-btn" title="Мини режим">⊡</button>
      <button class="bar-btn" id="main-btn" title="Открыть SearchCopy">↗</button>
    </div>
  </div>

  <!-- Search -->
  <div id="search-box">
    <div class="sq-wrap">
      <span class="sq-icon">🔍</span>
      <input id="q" type="text" placeholder="Что хочешь сделать?" autocomplete="off" autofocus spellcheck="false">
      <div class="sq-shortcuts">
        <span class="sq-kbd" id="clear-btn" title="Очистить">✕</span>
      </div>
    </div>
  </div>

  <!-- Program pills -->
  <div id="pills"></div>

  <!-- Results -->
  <div id="results"></div>

  <!-- Footer -->
  <div id="footer">
    <span class="ft-stat" id="ft-stat"></span>
    <button class="ft-open" id="ft-open">Открыть SearchCopy ↗</button>
  </div>

</div>

<script>
// ═══ INJECTED ENGINE ═══

const DB={
  Excel:[
    // ── Формулы ──
    {id:1,keys:"SUM",type:"formula",template:"=SUM({col}:{col})",example:"=SUM(A:A)",
      desc:{ru:"Сумма столбца",en:"Sum of column"},

    {id:7,keys:"INDEX+MATCH",type:"formula",template:"=INDEX(B:B,MATCH({col}2,A:A,0))",example:"=INDEX(B:B,MATCH(A2,A:A,0))",

    {id:9,keys:"CONCATENATE / СЦЕПИТЬ",type:"formula",template:'={col}1&" "&{col}2',example:'=A1&" "&B1',
      desc:{ru:"Склеить ячейки",en:"Merge cells text"},
      tags:{ru:["объединить","склеить","сцепить","соединить","concat"],en:["merge","join","concatenate","combine"]}},
    {id:10,keys:"TODAY / СЕГОДНЯ",type:"formula",template:"=TODAY()",example:"=TODAY()",

      tags:{ru:["дата","сегодня","текущая дата"],en:["date","today","current date"]}},
    {id:11,keys:"ROUND / ОКРУГЛ",type:"formula",template:"=ROUND({col}1,2)",example:"=ROUND(A1,2)",
      desc:{ru:"Округлить число",en:"Round number"},
      tags:{ru:["округлить","округление","round"],en:["round","rounding"]}},
    {id:12,keys:"TRIM / СЖПРОБЕЛЫ",type:"formula",template:"=TRIM({col}1)",example:"=TRIM(A1)",

function fixLayout(s){
  const ruChars='йцукенгшщзхъфывапролджэячсмитьбю';
  const enChars='qwertyuiop[]asdfghjkl;\'zxcvbnm,.';
  let r='';
  for(const c of s.toLowerCase()){
    const i=ruChars.indexOf(c);
    r+=i>=0?enChars[i]:c;
  }
  return r;
}

function expandQuery(q){
  const words=new Set([q]);
  words.add(fixLayout(q));
  const low=q.toLowerCase();
  for(const [key,syns] of Object.entries(SYNONYMS)){
    if(low.includes(key)){syns.forEach(s=>words.add(s));}
    for(const s of syns) if(low.includes(s)){words.add(key);syns.forEach(x=>words.add(x));}
  }
  return [...words];
}

function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function extractFormulaName(query){
  // Detect formula queries like "=ВПР(...)" or "=SUM(...)" or just "ВПР"
  const formulaMatch = query.match(/^=?([A-ZА-ЯЁ][A-ZА-ЯЁ0-9]*)/i);
  if(formulaMatch) return formulaMatch[1].toUpperCase();
  return null;
}

function parseComplexFormula(query){
  // Detects queries like "Сумма столбца I и B", "сложить A и C", "средние столбцов D F"
  const q=query.toLowerCase().trim();
  const colMatch=q.match(/(?:столб(?:ца?|цов)?|column[s]?)\s+([a-zа-яёa-z,\s]+?)(?:\s+и\s+|\s*,\s*|\s+and\s+)([a-zа-яёa-z]+)/i);
  const opWords={
    'сумм':['сумм','сложить','total','сложи','итого','sum'],'среднее':['средн','average','avg','mean'],
    'количество':['количеств','счёт','сколько','count'],'максимум':['макс','maximum','max','наибольш'],
    'минимум':['миним','minimum','min','наименьш']
  };
  for(const [op,kws] of Object.entries(opWords)){
    for(const kw of kws){
      if(q.includes(kw)){
        // Extract column letters
        const cols=[...q.matchAll(/\b([a-zA-Z]{1,3})\b/g)]
          .map(m=>m[1].toUpperCase())
          .filter(l=>/^[A-Z]{1,3}$/.test(l)&&!/^(И|I|ИЛИ|ОТ|ДО|AND|OR|OF)$/i.test(l));
        if(cols.length>=2) return {op,cols};
        if(cols.length===1) return {op,cols};
        return {op,cols:[]};
      }
    }
  }
  return null;
}

function scoreItem(query,item){
  if(!query||query.trim().length<2) return 0;
  // Bonus: if query looks like a formula (=ВПР(...) or =SUM), match by name
  const fname = extractFormulaName(query.trim());
  if(fname){
    const mapped = FORMULA_MAP[fname]||fname;
    const keysStr = (typeof item.keys==='string'?item.keys:Object.values(item.keys||{}).join(' ')).toUpperCase();
    if(keysStr.includes(mapped)||keysStr.includes(fname)) return 20;
  }
  const q=query.toLowerCase().trim();
  const desc=getDesc(item).toLowerCase();
  const tags=getTags(item).join(' ').toLowerCase();
  const keysStr=(typeof item.keys==='string'?item.keys:Object.values(item.keys||{}).join(' ')).toLowerCase();
  const allText=desc+' '+tags+' '+keysStr;
  const expanded=expandQuery(q);
  let s=0;
  for(const eq of expanded){
    const e=eq.toLowerCase();
    if(allText.includes(e)) s+=e===q?10:6;
    else{
      const words=e.split(/\s+/);
      for(const w of words) if(w.length>2&&allText.includes(w)) s+=w===q?5:3;
    }
    for(const w of e.split(/\s+/)){
      if(w.length<3) continue;
      for(const word of allText.split(/\s+/)){
        if(word.length>2&&levenshtein(w,word)<=1) s+=2;
      }
    }
  }
  return s;
}

function adaptKeys(keys){
  if(typeof keys==='string') return keys;
  if(!keys) return '';
  const os = settings.os || 'win';
  return keys[os] || keys.win || keys.mac || Object.values(keys)[0] || '';
}

function getDesc(item){if(!item.desc)return '';if(typeof item.desc==='object')return item.desc[settings.lang||'ru']||item.desc.ru||item.desc.en||'';return item.desc||''}

function getTags(item){return typeof item.tags==='object'?(item.tags[settings.lang]||[]):(item.tags||[])}

function getKeys(item){return adaptKeys(item.keys)}

function doSearch(query,progs,typeFilter){
  if(query.trim().length<2) return [];
  // Handle complex formula queries first
  const complex=parseComplexFormula(query);
  if(complex&&(progs.includes('Excel')||typeFilter==='formula')){
    const colStr=complex.cols.length?complex.cols.join(':'): 'A:A';
    const opMap={
      'сумм':'SUM','среднее':'AVERAGE','количество':'COUNT',
      'максимум':'MAX','минимум':'MIN'
    };
    const fnName=opMap[complex.op]||'SUM';
    // Find the matching formula item and boost it massively
    const synth=complex.cols.length>=2
      ? `=${fnName}(${complex.cols.join(':')})` // range like =SUM(A:B)  
      : `=${fnName}(${colStr})`;
    // Mark synthetic result on the item
    const out=[];
    for(const prog of progs){
      for(const item of DB[prog]||[]){
        if(typeFilter!=='all'&&item.type!==typeFilter) continue;
        if(item.type==='formula'&&item.keys&&typeof item.keys==='string'&&item.keys.toUpperCase()===fnName){
          out.push({...item,_synth:synth,_synthCols:complex.cols,program:prog,score:50});
          continue;
        }
        const s=scoreItem(query,item);
        if(s>0) out.push({...item,program:prog,score:s});
      }
    }
    out.sort((a,b)=>b.score-a.score);
    return out.slice(0,16);
  }
  const out=[];
  for(const prog of progs){
    for(const item of DB[prog]||[]){
      if(typeFilter!=='all'&&item.type!==typeFilter) continue;
      const s=scoreItem(query,item);
      if(s>0) out.push({...item,program:prog,score:s});
    }
  }
  return out.sort((a,b)=>b.score-a.score).slice(0,16);
}

async function callAI(sp, userMsg, maxTok){
  const provider = settings.aiProvider||'claude';
  const km={claude:settings.aiKey,giga:settings.gigaKey,openai:settings.openaiKey,
    gemini:settings.geminiKey,groq:settings.groqKey,deepseek:settings.deepseekKey,
    mistral:settings.mistralKey,yandex:settings.yandexKey,custom:settings.customKey};
  const key = km[provider]||'';
  if(!key && provider!=='giga') throw new Error('❌ Нет API ключа для '+provider);
  maxTok = maxTok||400;

  if(provider==='claude'){
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTok,system:sp,
        messages:[{role:'user',content:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'Claude error');
    return d.content?.[0]?.text||'';
  }

  if(provider==='giga'){
    const invoke=window.__TAURI__?.core?.invoke||window.__TAURI__?.tauri?.invoke;
    if(!invoke) throw new Error('GigaChat доступен только в десктоп-приложении');
    const ak=key.startsWith('Basic ')?key.slice(6).trim():key;
    return await invoke('giga_search',{authKey:ak,systemPrompt:sp,query:userMsg});
  }

  if(provider==='openai'){
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'gpt-4o-mini',max_tokens:maxTok,
        messages:[{role:'system',content:sp},{role:'user',content:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'OpenAI error');
    return d.choices?.[0]?.message?.content||'';
  }

  if(provider==='gemini'){
    const model='gemini-2.0-flash-lite';
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{role:'user',parts:[{text:sp+'\n\n'+userMsg}]}],
        generationConfig:{maxOutputTokens:maxTok}})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'Gemini error');
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }

  if(provider==='groq'){
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'llama-3.1-8b-instant',max_tokens:maxTok,
        messages:[{role:'system',content:sp},{role:'user',content:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'Groq error');
    return d.choices?.[0]?.message?.content||'';
  }

  if(provider==='deepseek'){
    const r=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'deepseek-chat',max_tokens:maxTok,
        messages:[{role:'system',content:sp},{role:'user',content:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'DeepSeek error');
    return d.choices?.[0]?.message?.content||'';
  }

  if(provider==='mistral'){
    const r=await fetch('https://api.mistral.ai/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'mistral-small-latest',max_tokens:maxTok,
        messages:[{role:'system',content:sp},{role:'user',content:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'Mistral error');
    return d.choices?.[0]?.message?.content||'';
  }

  if(provider==='yandex'){
    const folder=settings.yandexFolder||'';
    const r=await fetch('https://llm.api.cloud.yandex.net/foundationModels/v1/completion',
      {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Api-Key '+key,
        'x-folder-id':folder},
      body:JSON.stringify({modelUri:`gpt://${folder}/yandexgpt-lite`,
        completionOptions:{maxTokens:maxTok,temperature:0.6},
        messages:[{role:'system',text:sp},{role:'user',text:userMsg}]})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'YandexGPT error');
    return d.result?.alternatives?.[0]?.message?.text||'';
  }

  // custom (OpenAI-compatible)
  const url=(settings.customUrl||'').trim()||'https://api.openai.com/v1';
  const base=url.endsWith('/')?url.slice(0,-1):url;
  const r=await fetch(base+'/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:'gpt-4o-mini',max_tokens:maxTok,
      messages:[{role:'system',content:sp},{role:'user',content:userMsg}]})});
  const d=await r.json();
  if(d.error) throw new Error(d.error.message||'Custom API error');
  return d.choices?.[0]?.message?.content||'';
}

function renderPills() {

    const color  = COLORS[prog] || '#818cf8';

    }
    pill.innerHTML = `<span>${ICONS[prog]||'●'}</span><span>${prog}</span>`;

// ═══ SEARCH ═══
function getDisplayKey(item) {
  if (item.type === 'formula') {
    return item._synth || item.example || ('=' + (typeof item.keys === 'string' ? item.keys : Object.values(item.keys||{})[0] || ''));
  }
  const k = item.keys;
  if (!k) return '';
  if (typeof k === 'string') return k;
  return k[os] || k.win || k.mac || Object.values(k)[0] || '';
}

function getCopyText(item) {
  return getDisplayKey(item);
}

function renderResults(items, query) {
  const el = document.getElementById('results');
  const ft = document.getElementById('ft-stat');
  el.innerHTML = '';

  if (!items.length) {
    el.innerHTML = `<div class="empty">
      <span class="empty-icon">${query.length < 2 ? '⌘' : '🔭'}</span>
      <div class="empty-t">${query.length < 2 ? (ru?'Начни вводить запрос':'Start typing') : (ru?'Ничего не найдено':'Nothing found')}</div>
      <div class="empty-h">${query.length < 2 ? (ru?'Поиск по '+Object.keys(DB).length+' командам':'Search across '+Object.keys(DB).length+' shortcuts') : (ru?'Попробуй другие слова или AI ✦':'Try AI search ✦ or rephrase')}</div>
    </div>`;
    ft.textContent = '';
    return;
  }

  ft.textContent = ru ? `Найдено: ${items.length}` : `Found: ${items.length}`;
  requestAnimationFrame(applyAutoMode);

  items.forEach((item, i) => {
    const prog  = item.program || activeProgs[0] || '';
    const color = COLORS[prog] || '#818cf8';
    const isFx  = item.type === 'formula';
    const keyTxt = getDisplayKey(item);
    const desc  = getDesc(item);
    const tmpl  = item.template || '';
    const tags  = (typeof item.tags === 'object' ? (item.tags[lang] || item.tags.ru || item.tags.en || []) : (item.tags || [])).slice(0, 4);
    const ex    = item.example || '';

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i, 6) * 25}ms`;
    card.style.setProperty('--c', color);
    card.querySelector?.('before')?.style?.setProperty('background', color);

    // Left stripe via CSS var on element
    card.style.setProperty('--card-color', color);

    // Key rendering
    const keyParts = keyTxt.split(/\s*\+\s*/);
    let keyHtml = '';
    if (isFx) {
      keyHtml = `<span class="formula-text">${keyTxt}</span>`;
    } else if (keyParts.length > 1) {
      keyHtml = keyParts.map(p => `<span class="key-chip">${p}</span>`).join('<span style="color:var(--text3);padding:0 2px">+</span>');
    } else {
      keyHtml = `<span class="key-chip">${keyTxt}</span>`;
    }

    // OS key (secondary)
    let otherKey = '';
    if (!isFx && typeof item.keys === 'object') {
      const altOs = os === 'mac' ? 'win' : 'mac';
      const altKey = item.keys[altOs];
      if (altKey && altKey !== keyTxt) {
        const altLabel = altOs === 'mac' ? 'Mac' : 'Win';
        otherKey = `<span style="font-size:9px;color:var(--text3);font-family:var(--mono)">${altLabel}: ${altKey}</span>`;
      }
    }

    // Template (formula)
    let templateHtml = '';
    if (isFx && tmpl) {
      templateHtml = `<div class="card-template">template: ${tmpl}</div>`;
    }

    // Tags
    const tagsHtml = tags.length
      ? `<div class="card-tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`
      : '';

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-head">
          <div class="card-app-badge" style="background:${color}14;color:${color}">${ICONS[prog]||'●'}&nbsp;${prog}</div>
          <div class="card-type ${isFx?'type-formula':'type-hotkey'}">${isFx?'fx':'⌨'}</div>
        </div>
        <div class="card-key">${keyHtml}</div>
        ${otherKey ? `<div style="margin-bottom:4px">${otherKey}</div>` : ''}
        ${templateHtml}
        <div class="card-desc">${desc}</div>
        ${tagsHtml}
        <div class="card-actions">
          <button class="act-btn ${isFx?'green':'primary'}" data-copy="${keyTxt.replace(/"/g,'&quot;')}">
            ${ru?'📋 Скопировать':'📋 Copy'}
          </button>
          ${ex && ex !== keyTxt ? `<button class="act-btn" data-copy="${ex.replace(/"/g,'&quot;')}" style="color:var(--text2)">⎘ ${ex}</button>` : ''}
          ${isFx && item.template ? `<button class="act-btn" data-copy="${(item.template||'').replace(/"/g,'&quot;')}" style="color:var(--text3)">${ru?'Шаблон':'Template'}</button>` : ''}
        </div>
      </div>
      <div class="copy-flash">✓ ${ru?'Скопировано!':'Copied!'}</div>
    `;

    // Copy buttons
    card.querySelectorAll('[data-copy]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const text = btn.getAttribute('data-copy');
        navigator.clipboard?.writeText(text).catch(() => {});
        card.classList.add('flash');
        setTimeout(() => card.classList.remove('flash'), 800);
      });
    });

    // Card click = copy main key
    // Show template on hover
    if (isFx && tmpl) {
      const tmplEl = card.querySelector('.card-template');
      card.addEventListener('mouseenter', () => { if(tmplEl) tmplEl.style.display='block'; });
      card.addEventListener('mouseleave', () => { if(tmplEl) tmplEl.style.display='none'; });
    }

    card.addEventListener('click', e => {
      if (e.target.closest('[data-copy]')) return;
      navigator.clipboard?.writeText(keyTxt).catch(() => {});
      card.classList.add('flash');
      setTimeout(() => card.classList.remove('flash'), 800);
    });

    el.appendChild(card);
  });
}

// ═══ MAIN SEARCH ═══
async function runSearch() {
  const q = document.getElementById('q').value.trim();

  if (aiMode && widgetAiEnabled() && hasApiKey() && q.length > 2) {
    // Show local results first instantly, then AI
    const localResults = doSearch(q, activeProgs, 'all').slice(0, 5);
    renderResults(localResults, q);
    // Debounced AI call
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doAiSearch(q), 600);
    return;
  }

  if (q.length < 2) {
    const sample = activeProgs.flatMap(p => (DB[p] || []).slice(0, 3)).slice(0, 9);
    renderResults(sample, q);
    document.getElementById('ft-stat').textContent = '';
    return;
  }

  const results = doSearch(q, activeProgs, 'all');
  renderResults(results.slice(0, 12), q);
}

async function doAiSearch(q) {
  if (!q || q.length < 3) return;
  renderAiLoading();
  // Also show local results below loader
  const localResults = doSearch(q, activeProgs, 'all').slice(0, 5);

  const sp = ru
    ? `Ты помощник по горячим клавишам и формулам Excel/Word/Figma и других приложений. Отвечай кратко и по делу — 2-3 предложения максимум. Только если вопрос по теме приложений и горячих клавиш. Язык ответа: русский.`
    : `You are a hotkeys and formulas assistant for Excel, Word, Figma and other apps. Answer briefly — 2-3 sentences max. Only answer if related to apps and hotkeys. Answer in English.`;

  try {
    const text = await callAI(sp, q, 200);
    renderAiLoading(); // re-show loader area
    const el = document.getElementById('results');
    el.innerHTML = '';
    renderAiResult(text.trim(), q);
    // Append local results below
    localResults.forEach((item, i) => {
      const prog = item.program || '';
      const color = COLORS[prog] || '#818cf8';
      const isFx = item.type === 'formula';
      const keyTxt = getDisplayKey(item);
      const desc = getDesc(item);
      const mini = document.createElement('div');
      mini.className = 'card';
      mini.style.animationDelay = `${(i+1)*30}ms`;
      mini.innerHTML = `
        <div class="card-inner" style="padding:6px 10px">
          <div class="card-head" style="margin-bottom:3px">
            <div class="card-app-badge" style="background:${color}14;color:${color}">${ICONS[prog]||'●'}&nbsp;${prog}</div>
            <div class="card-type ${isFx?'type-formula':'type-hotkey'}">${isFx?'fx':'⌨'}</div>
          </div>
          <div class="card-key" style="font-size:12px">${isFx?`<span class="formula-text">${keyTxt}</span>`:`<span class="key-chip">${keyTxt}</span>`}</div>
          <div class="card-desc" style="font-size:11px">${desc}</div>
        </div>
        <div class="copy-flash">✓ ${ru?'Скопировано!':'Copied!'}</div>
      `;
      mini.onclick = () => {
        navigator.clipboard?.writeText(keyTxt).catch(()=>{});
        mini.classList.add('flash');
        setTimeout(()=>mini.classList.remove('flash'),800);
      };
      // Add style for ::before
      mini.style.setProperty('--card-color', color);
      el.appendChild(mini);
    });
    document.getElementById('ft-stat').textContent = ru ? `✦ AI + ${localResults.length} локальных` : `✦ AI + ${localResults.length} local`;
  } catch(e) {
    const el = document.getElementById('results');
    el.innerHTML = `<div class="ai-card">
      <div class="ai-card-head" style="color:var(--red)">✦ ${ru?'Ошибка AI':'AI Error'}</div>
      <div class="ai-card-body" style="color:var(--red)">${String(e.message||e).slice(0,120)}</div>
    </div>`;
    // Show local anyway
    const localResults2 = doSearch(q, activeProgs, 'all').slice(0, 5);
    renderResults(localResults2, q);
  }
}

function updateAiBtn() {
  const btn = document.getElementById('ai-toggle-btn');
  const canUseAi = widgetAiEnabled() && hasApiKey();
  if (aiMode && canUseAi) {
    btn.classList.add('active');
    btn.title = `AI вкл (${providerName()})`;
    document.getElementById('q').placeholder = ru ? '✦ AI-поиск...' : '✦ AI search...';
  } else {
    btn.classList.remove('active');
    btn.title = canUseAi ? (ru?'AI выкл':'AI off') : (ru?'Нет API ключа':'No API key');
    document.getElementById('q').placeholder = ru ? 'Что хочешь сделать?' : 'What do you want to do?';
  }
}

document.getElementById('ai-toggle-btn').onclick = () => {
  if (!widgetAiEnabled() || !hasApiKey()) {
    // Show hint
    const btn = document.getElementById('ai-toggle-btn');
    btn.title = ru ? 'Включи AI в настройках SearchCopy' : 'Enable AI in SearchCopy settings';
    btn.style.color = 'var(--red)';
    setTimeout(() => { btn.style.color=''; }, 1500);
    return;
  }
  aiMode = !aiMode;
  updateAiBtn();
  runSearch();
};

document.getElementById('q').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(runSearch, aiMode ? 100 : 80);
});

document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('q').value) {
      document.getElementById('q').value = '';
      runSearch();
    } else {
      if (invoke) invoke('hide_widget'); else window.close();
    }
  }
  if (e.key === 'Enter' && aiMode) {
    clearTimeout(searchTimer);
    runSearch();
  }
});

  document.getElementById('q').value = '';
  document.getElementById('q').focus();
  runSearch();

function applyPin(val) {
  pinned = val;
  localStorage.setItem('sc_widget_pinned', String(val));
  const btn = document.getElementById('pin-btn');
  if (btn) {
    btn.classList.toggle('active', pinned);
    btn.title = pinned ? (ru ? 'Закреплено поверх окон' : 'Pinned on top') : (ru ? 'Не закреплено' : 'Not pinned');
    btn.textContent = pinned ? '📌' : '📍';
  }
  if (invoke) invoke('set_widget_always_on_top', { value: pinned }).catch(()=>{});
}

document.getElementById('pin-btn').onclick = () => applyPin(!pinned);

// Apply saved pin state on load

// ── Mini mode ──
let miniMode = localStorage.getItem('sc_widget_mini') === 'true';

function applyMini(val) {
  miniMode = val;
  localStorage.setItem('sc_widget_mini', String(val));
  document.body.classList.toggle('mini', miniMode);
  const btn = document.getElementById('mini-btn');
  if (btn) {
    btn.title = miniMode ? (ru ? 'Обычный режим' : 'Normal mode') : (ru ? 'Мини режим' : 'Mini mode');
    btn.textContent = miniMode ? '⊞' : '⊡';
    btn.classList.toggle('active', miniMode);
  }
  // In mini mode only show 3 results max
  runSearch();
}

document.getElementById('mini-btn').onclick = () => applyMini(!miniMode);
applyMini(miniMode);


// ── Auto mode by window size ──
function applyAutoMode() {
  const h = window.innerHeight;
  const w = window.innerWidth;
  document.body.classList.remove('nano', 'ultra');
  if (h < 120) {
    document.body.classList.add('nano');
  } else if (h < 200 || w < 220) {
    document.body.classList.add('ultra');
  }
  // Also limit visible results dynamically
  const maxCards = h < 120 ? 0 : h < 200 ? 2 : h < 300 ? 3 : miniMode ? 3 : 12;
  document.querySelectorAll('#results .card').forEach((card, i) => {
    card.style.display = i < maxCards ? '' : 'none';
  });
}

const resizeObs = new ResizeObserver(() => applyAutoMode());
resizeObs.observe(document.documentElement);
window.addEventListener('resize', applyAutoMode);
applyAutoMode();

applyPin(pinned);

// ═══ INIT ═══
renderPills();
updateAiBtn();
runSearch();
document.getElementById('q').focus();

// Refresh settings when window gets focus (in case user changed settings)
window.addEventListener('focus', () => {
  Object.assign(ws, (() => { try { return JSON.parse(localStorage.getItem('sc_settings_v2')||'{}'); } catch { return {}; } })());
  // settings is same reference as ws, no need to reassign
  updateAiBtn();
});
</script>
