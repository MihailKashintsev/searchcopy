name: Release SearchCopy

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm deps
        run: npm ci

      - name: Read changelog
        id: changelog
        shell: bash
        run: |
          if [ -f .changelog ]; then
            echo "text=$(cat .changelog)" >> $GITHUB_OUTPUT
          else
            echo "text=Обновление ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SearchCopy ${{ github.ref_name }}"
          releaseBody: |
            ## Что нового
            ${{ steps.changelog.outputs.text }}

            ---

            ## Скачать

            | Платформа | Файл |
            |-----------|------|
            | macOS (M1/M2 + Intel) | SearchCopy_*_universal.dmg |
            | Windows | SearchCopy_*_x64-setup.exe |
            | Linux (универсальный) | SearchCopy_*_amd64.AppImage |
            | Linux (Debian/Ubuntu) | SearchCopy_*_amd64.deb |
            | Android | app-universal-debug.apk |

            ---
            SearchCopy by RENDERGAMES
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  android:
    runs-on: ubuntu-22.04
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install npm deps
        run: npm ci

      - name: Init Tauri Android
        run: npm run tauri android init

      - name: Find APK path
        run: find src-tauri/gen/android -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Build Android APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npm run tauri android build --apk --debug --debug

      - name: Find APK
        run: find src-tauri/gen/android -name "*.apk" | tee /tmp/apk_list.txt

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk