name: Release SearchCopy

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm deps
        run: npm ci

      - name: Read changelog
        id: changelog
        shell: bash
        run: |
          NOTE=$(cat .changelog 2>/dev/null || echo "Обновление ${{ github.ref_name }}")
          echo "text=$NOTE" >> $GITHUB_OUTPUT

      - name: Create Release (only once)
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SearchCopy ${{ github.ref_name }}"
          body: |
            ## Что нового
            ${{ steps.changelog.outputs.text }}

            ---

            ## Скачать

            | Платформа | Файл |
            |-----------|------|
            | macOS (M1/M2 + Intel) | SearchCopy_*_universal.dmg |
            | Windows | SearchCopy_*_x64-setup.exe |
            | Linux (универсальный) | SearchCopy_*_amd64.AppImage |
            | Linux (Debian/Ubuntu) | SearchCopy_*_amd64.deb |
            | Android | SearchCopy-release.apk |

            ---
            SearchCopy by RENDERGAMES
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS: ad-hoc signing, без Apple Developer сертификата
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SearchCopy ${{ github.ref_name }}"
          releaseBody: |
            ## Что нового
            ${{ steps.changelog.outputs.text }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  android:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install npm deps
        run: npm ci

      - name: Init Tauri Android
        run: npm run tauri android init

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > searchcopy.jks

      - name: Build Android Release APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npm run tauri android build --apk

      - name: Find and Sign APK
        run: |
          echo "=== All APK files ==="
          find . -name "*.apk" 2>/dev/null | head -20 || echo "none"

          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" 2>/dev/null | grep -v "\-signed" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" 2>/dev/null | grep -v "\-signed" | head -1)
          fi

          if [ -z "$APK" ]; then
            echo "ERROR: APK not found!"
            exit 1
          fi
          echo "=== Signing: $APK ==="

          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)

          $BUILD_TOOLS/apksigner sign \
            --ks searchcopy.jks \
            --ks-key-alias searchcopy \
            --ks-pass pass:${{ secrets.ANDROID_STORE_PASSWORD }} \
            --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            --out SearchCopy-release.apk \
            "$APK"

          $BUILD_TOOLS/apksigner verify --verbose SearchCopy-release.apk | head -3
          echo "=== Done ==="

      - name: Upload APK to Release
        run: |
          gh release upload "${{ github.ref_name }}" SearchCopy-release.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}